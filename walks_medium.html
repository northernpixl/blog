            { id: 307, category: "7+", name: "Cold Law", length: "7.5 miles", difficulty: "Strenuous", elevation: "450m", lat: 55.519, lng: -2.037, desc: "A wild walk into the dramatic Cheviots. Often deserted.", highlights: "Cold Law summit, Remote wilderness, Amazing views.", route: [[55.5191500, -2.0373400]] },

            { id: 308, category: "7+", name: "Hedgehope Hill", length: "7.5 miles", difficulty: "Strenuous", elevation: "714m", lat: 55.497, lng: -2.071, desc: "The second highest peak. Steeper and more conical than the Cheviot. Best views in the park by far.", highlights: "Hedgehope Hill summit, Langlee Crags, Housey Crags.", route: [[55.4975200, -2.0715100]] },

            { id: 309, category: "7+", name: "Pilgrim's Way - Holy Island", length: "8 miles", difficulty: "Moderate", elevation: "100m", lat: 55.677, lng: -1.895, desc: "Holy Island across the pilgrim's causeway over the mud flats. Follow the posts that guide you to Holy Island. Please check tides! You must walk barefoot across the mud.", highlights: "Pilgrim's Causeway, Holy Island mudflats.", route: [[55.67740, -1.89542]] },

            { id: 310, category: "7+", name: "The Schil", length: "12 miles", difficulty: "Very Strenuous", elevation: "601m", lat: 55.496, lng: -2.189, desc: "A distinctive rocky peak on the Scottish border. Start at the Mounthooly, a permit will need to be booked in advance via the College Valley website. A real lung-buster.", highlights: "The Schil summit, Border Ridge, College Valley.", route: [[55.4966821, -2.1890438]] },

            { id: 311, category: "7+", name: "Craster & Howick Coast", length: "9 miles", difficulty: "Moderate", elevation: "50m", lat: 55.472, lng: -1.596, desc: "A beautiful coastal walk heading south from Craster past Cullernose Point to the Bathing House at Howick, reaching Boulmer before heading back.", highlights: "Cullernose Point, Howick Hall coastline, Rumbling Kern.", route: [[55.4717300, -1.5960800]] },

            { id: 312, category: "7+", name: "Ingram & Cochrane Pike", length: "8 miles", difficulty: "Strenuous", elevation: "350m", lat: 55.441, lng: -1.973, desc: "A tough climb in the Breamish Valley, taking in the summit of Cochrane Pike and the prehistoric landscapes of Ingram.", highlights: "Cochrane Pike, Iron Age hillforts, Breamish Valley views.", route: [[55.4412600, -1.9739500]] },

            { id: 313, category: "7+", name: "Sycamore Gap & Vindolanda", length: "8.5 miles", difficulty: "Strenuous", elevation: "300m", lat: 54.991, lng: -2.354, desc: "Extends the classic wall walk to drop down to the Roman fort of Vindolanda before climbing back up to the crags.", highlights: "Vindolanda Fort, Sycamore Gap site, Crag Lough.", route: [[54.9919000, -2.3545900]] },

            { id: 314, category: "7+", name: "Yeavering Bell & Newton Tors", length: "8 miles", difficulty: "Strenuous", elevation: "500m", lat: 55.560, lng: -2.069, desc: "A challenging twin-peak walk. Climb the hillfort of Yeavering Bell then cross the glen to the dramatic Newton Tors.", highlights: "Yeavering Bell hillfort, Newton Tors, College Valley views.", route: [[55.5609800, -2.0693000]] },

            { id: 315, category: "7+", name: "Kielder North Shore Walk", length: "9 miles", difficulty: "Moderate", elevation: "120m", lat: 55.187, lng: -2.461, desc: "A long forest track walk following the northern shoreline of the massive reservoir. Remote and peaceful.", highlights: "Kielder Water, Osprey platforms, Forest sculpture trail.", route: [[55.1876200, -2.4617500]] },

            { id: 316, category: "7+", name: "The Drake Stone & Harbottle", length: "9 miles", difficulty: "Moderate", elevation: "250m", lat: 55.337, lng: -2.112, desc: "Starts with the Drake Stone but continues high onto the moors of the military ranges before descending.", highlights: "Drake Stone, Harbottle Lake, expansive moorland.", route: [[55.3368800, -2.1121900]] },

            { id: 317, category: "7+", name: "Berwick Coastal Walk", length: "8 miles", difficulty: "Easy", elevation: "60m", lat: 55.775, lng: -1.997, desc: "Heading north from Berwick along the cliffs towards the Scottish border at Marshall Meadows, returning via the same route.", highlights: "Dramatic cliffs, Scottish Border, Berwick Walls.", route: [[55.7757100, -1.9975600]] },

            { id: 318, category: "7+", name: "Simonside & Tosson Hill", length: "7.5 miles", difficulty: "Strenuous", elevation: "440m", lat: 55.283, lng: -1.919, desc: "Extends the Simonside ridge walk to include the highest point, Tosson Hill. Rough terrain but incredible views.", highlights: "Tosson Hill summit, Ravensheugh Crags, Simonside ridge.", route: [[55.2833300, -1.9188100]] },

            { id: 319, category: "7+", name: "Warkworth to Amble Loop", length: "8.5 miles", difficulty: "Easy", elevation: "30m", lat: 55.350, lng: -1.600, desc: "Follows the river Coquet to the harbour town of Amble, exploring the marina and pier before returning.", highlights: "Warkworth Castle, Amble Harbour, Coquet Island views.", route: [[55.3505000, -1.6002400]] },

            { id: 320, category: "7+", name: "Haltwhistle & The Wall", length: "7.5 miles", difficulty: "Moderate", elevation: "200m", lat: 54.969, lng: -2.461, desc: "Starts in Haltwhistle, follows the Haltwhistle Burn up to the Wall at Cawfields, walks the crags.", highlights: "Haltwhistle Burn, Cawfields Quarry, Milecastle 42.", route: [[54.9698000, -2.4616300]] }

        ];



        const App = () => {

            const [selectedWalk, setSelectedWalk] = useState(null);

            const [isNavOpen, setIsNavOpen] = useState(false);

            const walkMapContainerRef = useRef(null);

            const walkMapInstanceRef = useRef(null);



            const filteredWalks = useMemo(() => WALKS.filter(w => w.category === '4-7'), []);



            useEffect(() => {

                const params = new URLSearchParams(window.location.search);

                const walkId = params.get('id');

                if (walkId) {

                    const walk = filteredWalks.find(w => w.id === parseInt(walkId));

                    if (walk) setSelectedWalk(walk);

                }



                const onPopState = () => setSelectedWalk(null);

                window.addEventListener('popstate', onPopState);

                return () => window.removeEventListener('popstate', onPopState);

            }, [filteredWalks]);



            useEffect(() => {

                if (selectedWalk) {

                    setTimeout(() => {

                        if (walkMapInstanceRef.current) {

                            walkMapInstanceRef.current.remove();

                        }

                        

                        if (walkMapContainerRef.current) {

                            const map = L.map(walkMapContainerRef.current, { zoomControl: false });

                            walkMapInstanceRef.current = map;



                            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {

                                attribution: '&copy; OpenStreetMap'

                            }).addTo(map);



                            const polyline = L.polyline(selectedWalk.route, {color: '#f59e0b', weight: 5}).addTo(map);

                            L.circleMarker(selectedWalk.route[0], { radius: 6, fillColor: '#000', color: "#fff", weight: 2, fillOpacity: 1 }).addTo(map);

                            

                            if (selectedWalk.route.length === 1) {
                                map.setView(selectedWalk.route[0], 14);
                            } else {
                                map.fitBounds(polyline.getBounds(), { padding: [50, 50] });
                            }

                        }

                    }, 100);

                }

            }, [selectedWalk]);



            const downloadGPX = (walk) => {

                if (!walk) return;

                const gpxContent = `<?xml version="1.0" encoding="UTF-8"?>

<gpx version="1.1" creator="NorthernPixl">

  <trk>

    <name>${walk.name}</name>

    <trkseg>

      ${walk.route.map(pt => `<trkpt lat="${pt[0]}" lon="${pt[1]}"></trkpt>`).join('')}

    </trkseg>

  </trk>

</gpx>`;

                const blob = new Blob([gpxContent], { type: 'application/gpx+xml' });

                const url = URL.createObjectURL(blob);

                const link = document.createElement('a');

                link.href = url;

                link.download = `${walk.name.replace(/\s+/g, '_')}.gpx`;

                document.body.appendChild(link);

                link.click();

                document.body.removeChild(link);

                URL.revokeObjectURL(url);

            };



            const getStats = (walk) => {

                const miles = parseFloat(walk.length);

                let speed = 2.5; 

                if (walk.difficulty === 'Moderate') speed = 2.4;

                if (walk.difficulty === 'Strenuous') speed = 2.0;

                if (walk.difficulty === 'Very Strenuous') speed = 1.5;

               

                const hours = miles / speed;

                const elev = parseInt(walk.elevation) || 0;

                const elevTime = elev / 600;

               

                const totalHours = hours + elevTime;

                const h = Math.floor(totalHours);

                const m = Math.round((totalHours - h) * 60);

               

                const timeStr = `${h}h ${m > 0 ? m + 'm' : ''}`;

                const steps = Math.round(miles * 2200);

               

                return { time: timeStr, steps: steps.toLocaleString() };

            };



            const startPoint = selectedWalk?.route[0];



            return (

                <div className="min-h-screen bg-white">

                    <nav className="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-slate-100">

                        <div className="h-20 flex items-center justify-between px-4 md:px-8 max-w-7xl mx-auto">

                            <div className="flex items-center space-x-3 cursor-pointer z-50" onClick={() => window.location.href='index.html'}>

                                <div className="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center">

                                    <Icon name="camera" className="text-white" size={18} />

                                </div>

                                <span className="font-black text-lg md:text-xl tracking-tighter uppercase inline">NorthernPixl</span>

                            </div>



                            <div className="hidden md:flex space-x-10 text-[11px] font-black uppercase tracking-widest text-slate-400">

                                <a href="index.html" className="hover:text-black transition-colors">Home</a>

                                <a href="routes.html" className="hover:text-black transition-colors">Routes Map</a>

                                <a href="walks_short.html" className="hover:text-black transition-colors">Short</a>

                                <span className="text-black border-b-2 border-black">Medium</span>

                                <a href="walks_long.html" className="hover:text-black transition-colors">Long</a>

                            </div>



                            <button className="md:hidden text-slate-900 z-50 p-2" onClick={() => setIsNavOpen(!isNavOpen)}>

                                <Icon name={isNavOpen ? 'x' : 'menu'} size={24} />

                            </button>

                        </div>



                        {isNavOpen && (

                            <div className="md:hidden absolute top-0 left-0 w-full h-screen bg-white flex flex-col items-center justify-center space-y-8 pt-20 z-40">

                                <a href="index.html" className="text-xl font-black uppercase tracking-widest text-slate-900 hover:text-sky-500" onClick={() => setIsNavOpen(false)}>Home</a>

                                <a href="routes.html" className="text-xl font-black uppercase tracking-widest text-slate-900 hover:text-sky-500" onClick={() => setIsNavOpen(false)}>Routes Map</a>

                                <a href="walks_short.html" className="text-xl font-black uppercase tracking-widest text-slate-900 hover:text-sky-500" onClick={() => setIsNavOpen(false)}>Short</a>

                                <span className="text-xl font-black uppercase tracking-widest text-amber-500">Medium</span>

                                <a href="walks_long.html" className="text-xl font-black uppercase tracking-widest text-slate-900 hover:text-sky-500" onClick={() => setIsNavOpen(false)}>Long</a>

                                <a href="index.html" className="text-sm font-black uppercase tracking-widest text-slate-400 pt-8" onClick={() => setIsNavOpen(false)}>Back Home</a>

                            </div>

                        )}

                    </nav>



                    <main className="pt-20">

                        <section className="max-w-7xl mx-auto px-4 md:px-6 py-8 md:py-12">

                            {!selectedWalk ? (

                                <div className="animate-in">

                                    <div className="mb-8 md:mb-12 text-center">

                                        <h2 className="text-3xl md:text-5xl font-black uppercase tracking-tighter mb-4 text-slate-900">Medium Walks (4-7 Miles)</h2>

                                        <p className="text-sm md:text-base text-slate-400 mb-8">A balance of distance and scenery, suitable for a decent adventure!</p>

                                       

                                        <div className="flex justify-center items-center gap-2 mb-8 overflow-x-auto pb-4 px-2">

                                            <div className="inline-flex bg-slate-100 p-1 rounded-full">

                                                <a href="walks_short.html" className="px-4 md:px-8 py-2 md:py-3 rounded-full text-[10px] md:text-xs font-black uppercase tracking-widest text-slate-400 hover:text-slate-600 transition-all">1-4 Miles</a>

                                                <a href="#" className="px-4 md:px-8 py-2 md:py-3 rounded-full text-[10px] md:text-xs font-black uppercase tracking-widest bg-white shadow-md text-black transition-all">4-7 Miles</a>

                                                <a href="walks_long.html" className="px-4 md:px-8 py-2 md:py-3 rounded-full text-[10px] md:text-xs font-black uppercase tracking-widest text-slate-400 hover:text-slate-600 transition-all">7+ Miles</a>

                                            </div>

                                        </div>

                                    </div>



                                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

                                        {filteredWalks.map(walk => (

                                            <div key={walk.id} onClick={() => { setSelectedWalk(walk); window.history.pushState({}, ""); }} className="group bg-white border border-slate-100 p-6 md:p-8 rounded-[2rem] hover:shadow-xl transition-all cursor-pointer active:scale-95 duration-200">

                                                <div className="flex justify-between items-start mb-6">

                                                    <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest ${

                                                        walk.difficulty === 'Easy' ? 'bg-green-100 text-green-700' : 

                                                        walk.difficulty === 'Moderate' ? 'bg-yellow-100 text-yellow-700' : 

                                                        'bg-red-100 text-red-700'

                                                    }`}>{walk.difficulty}</span>

                                                    <span className="text-slate-400 text-xs font-bold">{walk.length}</span>

                                                </div>

                                                <h3 className="text-xl font-black mb-2 group-hover:text-amber-500 transition-colors">{walk.name}</h3>

                                                <p className="text-slate-400 text-xs line-clamp-2">{walk.desc}</p>

                                            </div>

                                        ))}

                                    </div>

                                </div>

                            ) : (

                                <div className="animate-in flex flex-col lg:grid lg:grid-cols-12 gap-6 lg:gap-8 h-full lg:h-[80vh]">

                                    <div className="w-full h-[40vh] lg:h-full lg:col-span-8 rounded-[2rem] md:rounded-[3rem] overflow-hidden border border-slate-100 shadow-2xl relative">

                                        <div ref={walkMapContainerRef} className="w-full h-full"></div>

                                    </div>

                                    <div className="w-full lg:col-span-4 bg-white rounded-[2rem] md:rounded-[3rem] p-6 md:p-10 border border-slate-100 overflow-y-auto custom-scrollbar shadow-xl flex flex-col">

                                        <div className="flex justify-between items-start mb-6 md:mb-8">

                                            <button onClick={() => setSelectedWalk(null)} className="flex items-center text-slate-400 hover:text-black font-black uppercase text-[10px] tracking-widest p-2 -ml-2">

                                                <Icon name="arrowLeft" size={14} className="mr-2" /> Back to List

                                            </button>

                                            <button onClick={() => downloadGPX(selectedWalk)} className="flex items-center text-amber-500 hover:text-amber-600 font-black uppercase text-[10px] tracking-widest p-2">

                                                <Icon name="download" size={14} className="mr-2" /> Download GPX

                                            </button>

                                        </div>

                                       

                                        <span className="text-amber-500 font-black uppercase text-xs tracking-[0.3em] mb-2 block">{selectedWalk.length} • {selectedWalk.difficulty}</span>

                                        <h2 className="text-3xl md:text-4xl font-black tracking-tighter mb-6">{selectedWalk.name}</h2>

                                       

                                        <div className="space-y-6">

                                            <div className="bg-slate-50 p-6 rounded-3xl">

                                                <div className="grid grid-cols-2 gap-6">

                                                    <div>

                                                        <p className="text-[9px] font-black uppercase text-slate-400 mb-1">Elevation</p>

                                                        <p className="font-bold text-lg">{selectedWalk.elevation}</p>

                                                    </div>

                                                    <div>

                                                        <p className="text-[9px] font-black uppercase text-slate-400 mb-1">Est. Time</p>

                                                        <p className="font-bold text-lg">{getStats(selectedWalk).time}</p>

                                                    </div>

                                                    <div>

                                                        <p className="text-[9px] font-black uppercase text-slate-400 mb-1">Est. Steps</p>

                                                        <p className="font-bold text-lg">{getStats(selectedWalk).steps}</p>

                                                    </div>

                                                    <div>

                                                        <p className="text-[9px] font-black uppercase text-slate-400 mb-1">Start Point</p>

                                                        {startPoint && (

                                                            <a 

                                                                href={`https://www.google.com/maps/search/?api=1&query=${startPoint[0]},${startPoint[1]}`}

                                                                target="_blank"

                                                                rel="noopener noreferrer"

                                                                className="font-bold text-sm pt-1 text-amber-500 hover:text-amber-700 underline decoration-amber-300 underline-offset-2 transition-colors block truncate"

                                                                title="Open in Google Maps"

                                                            >

                                                                Click Here <Icon name="externalLink" size={10} className="inline ml-1" />

                                                            </a>

                                                        )}

                                                    </div>

                                                </div>

                                            </div>



                                            <div>

                                                <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-3">Highlights</h4>

                                                <p className="text-amber-600 font-bold leading-relaxed text-sm mb-4">{selectedWalk.highlights}</p>

                                                <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-3">Route Description</h4>

                                                <p className="text-slate-600 leading-relaxed text-sm">{selectedWalk.desc}</p>

                                            </div>

                                           

                                            <div className="mt-auto bg-amber-50 p-6 rounded-3xl border border-amber-100">

                                                <h4 className="text-[10px] font-black uppercase tracking-widest text-amber-600 mb-2">Trail Advice</h4>

                                                <p className="text-amber-900 text-xs font-bold leading-relaxed italic">

                                                    "Always carry a physical OS map. GPS signals in the park are unreliable. Stick to public footpaths."

                                                </p>

                                            </div>

                                           

                                            {startPoint && (
                                                <div className="mt-2">
                                                    <a href={`weather.html?lat=${startPoint[0]}&lng=${startPoint[1]}`} className="w-full bg-sky-50 text-sky-600 border border-sky-100 font-bold text-xs uppercase tracking-widest py-3.5 px-6 rounded-xl hover:bg-sky-100 hover:border-sky-200 transition-colors shadow-sm flex items-center justify-center group">
                                                        <Icon name="cloudSun" size={16} className="mr-2 group-hover:scale-110 transition-transform" /> Live Weather & Astro
                                                    </a>
                                                </div>
                                            )}

                                            <div className="pt-4 flex justify-center md:justify-start">

                                                <button onClick={() => setSelectedWalk(null)} className="flex items-center text-slate-400 hover:text-black font-black uppercase text-[10px] tracking-widest p-2 -ml-2">

                                                    <Icon name="arrowLeft" size={14} className="mr-2" /> Back to List

                                                </button>

                                            </div>

                                        </div>

                                    </div>

                                </div>

                            )}

                        </section>

                    </main>

                </div>

            );

        };



        const root = ReactDOM.createRoot(document.getElementById('root'));

        root.render(<App />);

    </script>

    <script data-goatcounter="https://northernpixl.goatcounter.com/count"

        async src="//gc.zgo.at/count.js"></script>

</body>

</html>
