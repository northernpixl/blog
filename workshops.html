        const BlogSection = ({ onSelectArticle }) => {

                                </div>

        const App = () => {

            useEffect(() => {
                const onPopState = () => {
                    setSelectedWorkshop(null);

                const body = `Hi Stephen,%0D%0A%0D%0AI'm interested in booking the ${workshop.title} (${workshop.duration}).%0D%0A%0D%0AMy Details:%0D%0A- Preferred Dates: [Enter dates]%0D%0A- Experience Level: [Beginner/Intermediate/Pro]%0D%0A- Current Camera Gear: [e.g. Canon R5, 24-70mm]%0D%0A- Mobility/Fitness Level: [e.g. Comfortable walking 3 miles]%0D%0A- Specific Learning Goals: [What do you want to achieve?]%0D%0A%0D%0AThanks!`;
                
                window.location.href = `mailto:northernpixl@gmail.com?subject=${subject}&body=${body}`;
            };

            return (
                <div className="min-h-screen bg-white">
                    <Navbar />
                    <main className="pt-20">
                        <section className="max-w-7xl mx-auto px-4 md:px-6 py-8 md:py-20">

                                    >

                                            alt={workshop.title} 
                                            loading="lazy"

                                                    {block}

                                            )
                                        } 
                                        
                                        // Handle Image Blocks
                                        else if (block.type === 'image') {
                                            return (
                                                <figure key={index} className="my-10">

                                                    </div>
                                                    
                                                    {block.caption && <figcaption className="text-center text-sm text-slate-500 mt-4 italic">{block.caption}</figcaption>}
                                                </figure>
                                            )
                                        }

                                        else if (block.type === 'video') {
                                            return (
                                                <figure key={index} className="my-12">

                                                        <div className="absolute inset-0 flex flex-col items-center justify-center text-center p-6 z-0">
                                                            <Icon name="camera" size={48} className="mb-4 text-slate-300" />
                                                            <p className="text-sm font-black uppercase tracking-widest text-slate-900 mb-2">Loading Video...</p>
                                                        </div>
                                                        
                                                        {/* The actual video player */}
                                                        <video 
                                                            controls 
                                                            autoPlay 
                                                            muted 
                                                            loop 
                                                            playsInline
                                                            className="w-full max-w-3xl rounded-lg shadow-xl bg-black z-10 relative"
                                                        >
                                                            <source src={block.src} type={block.src.includes('.m3u8') ? "application/x-mpegURL" : "video/mp4"} />
                                                            Your browser does not support the video tag.
                                                        </video>
                                                    </div>
                                                    {block.caption && <figcaption className="text-center text-sm text-slate-500 mt-4 italic">{block.caption}</figcaption>}
                                                </figure>
                                            )
                                        }
                                        
                                        // Handle Affiliate Widget
                                        else if (block.type === 'vallerret-affiliate') {
                                            return <VallerretAffiliateWidget key={index} />;
                                        }

                                        return null;
                                    })}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script data-goatcounter="https://northernpixl.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
