        const Icon = ({ name, size = 20, className = "" }) => {
            if (name === 'camera') return (

            );
            if (name === 'menu') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            );
            if (name === 'x') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            );
            if (name === 'facebook') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
                </svg>
            );
            if (name === 'instagram') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                    <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line>

            );
            if (name === 'arrow-right') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            );
            if (name === 'mail') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            );
            if (name === 'download') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            );
            if (name === 'share-apple') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            );
            if (name === 'plus-square') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            );
            if (name === 'more-vertical') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            );
            // New icons for the widget
            if (name === 'sun') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            );
            if (name === 'moon') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            );
            if (name === 'cloud') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></svg>
            );
            if (name === 'waves') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.6 2 5 2 2.3 0 2.3-2 5-2 1.3 0 1.9.5 2.5 1"></path><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.6 2 5 2 2.3 0 2.3-2 5-2 1.3 0 1.9.5 2.5 1"></path><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.6 2 5 2 2.3 0 2.3-2 5-2 1.3 0 1.9.5 2.5 1"></path></svg>
            );
            if (name === 'compass') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
            );
            if (name === 'map-pin') return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            );
            return null;
        };

        const Navbar = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white/95 backdrop-blur-md shadow-sm border-b border-slate-100 py-2' : 'bg-transparent py-4'}`}>
                    <div className="flex items-center justify-between px-4 md:px-8 max-w-7xl mx-auto">
                        <a href="index.html" className="flex items-center space-x-3 cursor-pointer z-50 group">
                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center transition-colors ${scrolled ? 'bg-slate-900 text-white' : 'bg-white text-slate-900'}`}>
                                <Icon name="camera" size={18} />
                            </div>
                            <span className={`font-black text-lg md:text-xl tracking-tighter uppercase inline ${scrolled ? 'text-slate-900' : 'text-white'}`}>NorthernPixl</span>
                        </a>

                        <div className={`hidden md:flex space-x-10 text-[11px] font-black uppercase tracking-widest ${scrolled ? 'text-slate-500' : 'text-slate-300'}`}>
                            <a href="tutorials.html" className={`hover:${scrolled ? 'text-slate-900' : 'text-white'} transition-colors`}>Tutorials</a>
                            <a href="explore.html" className={`hover:${scrolled ? 'text-slate-900' : 'text-white'} transition-colors`}>Explore</a>
                            <a href="weather.html" className={`hover:${scrolled ? 'text-slate-900' : 'text-white'} transition-colors`}>Weather</a>
                            <a href="routes.html" className={`hover:${scrolled ? 'text-slate-900' : 'text-white'} transition-colors`}>Routes</a>
                            <a href="ethics.html" className={`hover:${scrolled ? 'text-slate-900' : 'text-white'} transition-colors`}>Ethics</a>
                            <a href="workshops.html" className={`hover:${scrolled ? 'text-slate-900' : 'text-white'} transition-colors`}>Workshops</a>
                        </div>

                        <button 
                            className={`md:hidden z-50 p-2 ${scrolled || isOpen ? 'text-slate-900' : 'text-white'}`}
                            onClick={() => setIsOpen(!isOpen)}
                            aria-label="Toggle Menu"
                        >
                            <Icon name={isOpen ? 'x' : 'menu'} size={24} />
                        </button>
                    </div>

                    {isOpen && (
                        <div className="md:hidden absolute top-0 left-0 w-full h-screen bg-white flex flex-col items-center justify-center space-y-8 pt-20 animate-fade-in-down z-40">
                            <a href="tutorials.html" className="text-xl font-black uppercase tracking-widest text-slate-900 hover:text-sky-500" onClick={() => setIsOpen(false)}>Tutorials</a>
                            <a href="explore.html" className="text-xl font-black uppercase tracking-widest text-slate-900 hover:text-sky-500" onClick={() => setIsOpen(false)}>Explore</a>
                            <a href="weather.html" className="text-xl font-black uppercase tracking-widest text-slate-900 hover:text-sky-500" onClick={() => setIsOpen(false)}>Weather</a>
                            <a href="routes.html" className="text-xl font-black uppercase tracking-widest text-slate-900 hover:text-sky-500" onClick={() => setIsOpen(false)}>Routes</a>
                            <a href="ethics.html" className="text-xl font-black uppercase tracking-widest text-slate-900 hover:text-sky-500" onClick={() => setIsOpen(false)}>Ethics</a>
                            <a href="workshops.html" className="text-xl font-black uppercase tracking-widest text-slate-900 hover:text-sky-500" onClick={() => setIsOpen(false)}>Workshops</a>
                        </div>
                    )}
                </nav>
            );
        };

        const WhereToShootWidget = () => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchConditions = async () => {
                    try {
                        // Fetching real Northumberland weather data (using Open-Meteo free API)
                        // Coordinates for central Northumberland approx (55.41, -1.70)
                        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.41&longitude=-1.70&current=is_day,cloud_cover&timezone=Europe%2FLondon');
                        const weatherData = await res.json();
                        
                        const isDay = weatherData.current.is_day === 1;
                        const cloudCover = weatherData.current.cloud_cover; // 0-100%
                        
                        // Simulating a tide cycle based on current time (for demonstration)
                        const hour = new Date().getHours();
                        const isHighTide = hour % 12 < 5; // Roughly simulates a high tide window
                        
                        let loc = "";
                        let reason = "";
                        let icon = "compass";
                        let isCoastal = false;
                        let link = "explore.html";

                        // Logic to recommend a location
                        if (!isDay && cloudCover < 30) {
                            loc = "Cawfields Dark Sky Park";
                            reason = "Clear skies right now! Perfect conditions for astrophotography and Milky Way chasing in the National Park.";
                            icon = "moon";
                            isCoastal = false;
                            link = "explore.html#cawfields";
                        } else if (!isDay) {
                            loc = "Newcastle Quayside";
                            reason = "Cloudy night up north, but perfect conditions for urban night photography and river reflections in the city.";
                            icon = "cloud";
                            isCoastal = false;
                            link = "explore.html#newcastle-quayside";
                        } else if (isDay && cloudCover > 75) {
                            loc = "Hareshaw Linn Waterfall";
                            reason = "Overcast skies are currently providing ideal soft, even lighting for woodland and waterfall photography.";
                            icon = "cloud";
                            isCoastal = false;
                            link = "explore.html#hareshaw-linn";
                        } else if (isDay && isHighTide) {
                            loc = "Bamburgh Castle Beach";
                            reason = "High tide approaching! Great time to head to the coast to capture the castle reflections in the rock pools.";
                            icon = "waves";
                            isCoastal = true;
                            link = "explore.html#bamburgh-castle";
                        } else {
                            loc = "Dunstanburgh Castle";
                            reason = "Great daytime conditions. The coastal walk from Craster currently offers fantastic light and leading lines.";
                            icon = "sun";
                            isCoastal = true;
                            link = "explore.html#dunstanburgh-castle";
                        }

                        setData({ location: loc, reason, icon, link, conditions: { isDay, cloudCover, isHighTide, isCoastal } });
                    } catch (error) {
                        // Fallback if API fails
                        setData({ 
                            location: "Bamburgh Castle", 
                            reason: "Always a classic location, regardless of the weather. Head to the dunes for natural framing.",
                            icon: "map-pin",
                            link: "explore.html#bamburgh-castle",
                            conditions: null
                        });
                    } finally {
                        setLoading(false);
                    }
                };

                fetchConditions();
            }, []);

            if (loading) return (
                <div className="w-full max-w-2xl mx-auto mt-8 mb-4 p-6 rounded-2xl bg-white/5 backdrop-blur-md border border-white/10 flex items-center justify-center h-[140px] shadow-xl">
                    <div className="text-slate-400 text-xs font-bold uppercase tracking-widest flex items-center gap-3">
                        <Icon name="compass" className="animate-spin text-sky-400" size={20} /> Analyzing live conditions...
                    </div>
                </div>
            );

            return (
                <div className="w-full max-w-2xl mx-auto mt-8 mb-4 p-5 sm:p-6 rounded-2xl bg-white/5 backdrop-blur-md border border-white/10 shadow-2xl relative group text-left overflow-hidden">
                    {/* Decorative accent line */}
                    <div className="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-sky-400 to-sky-600"></div>
                    
                    <div className="flex flex-col sm:flex-row sm:items-start gap-4 sm:gap-6">
                        <div className="bg-white/10 p-3 rounded-xl flex-shrink-0 w-14 h-14 flex items-center justify-center shadow-inner">
                            <Icon name={data.icon} size={28} className="text-sky-400" />
                        </div>
                        
                        <div className="flex-grow">
                            <div className="flex items-center gap-2 mb-1">
                                <span className="text-[10px] font-black uppercase tracking-widest text-sky-400">Suggested location to head to right now</span>
                                <span className="flex h-2 w-2 relative">
                                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-sky-400 opacity-75"></span>
                                  <span className="relative inline-flex rounded-full h-2 w-2 bg-sky-500"></span>
                                </span>
                            </div>
                            
                            <h3 className="text-xl sm:text-2xl font-black text-white mb-2 leading-tight">{data.location}</h3>
                            <p className="text-sm text-slate-300 leading-relaxed max-w-md">
                                {data.reason}
                            </p>
                            
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mt-4 pt-4 border-t border-white/10">
                                {data.conditions && (
                                    <div className="flex flex-wrap gap-2 sm:gap-3">
                                        <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-black/20 border border-white/5 text-[10px] font-bold text-slate-300 uppercase tracking-wider">
                                            <Icon name={data.conditions.isDay ? 'sun' : 'moon'} size={12} className="text-slate-400" /> 
                                            {data.conditions.isDay ? 'Daytime' : 'Night'}
                                        </span>
                                        <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-black/20 border border-white/5 text-[10px] font-bold text-slate-300 uppercase tracking-wider">
                                            <Icon name="cloud" size={12} className="text-slate-400" /> 
                                            {data.conditions.cloudCover}% Clouds
                                        </span>
                                        {data.conditions.isCoastal && (
                                            <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-black/20 border border-white/5 text-[10px] font-bold text-slate-300 uppercase tracking-wider">
                                                <Icon name="waves" size={12} className="text-slate-400" /> 
                                                {data.conditions.isHighTide ? 'High Tide Window' : 'Low Tide'}
                                            </span>
                                        )}
                                    </div>
                                )}
                                
                                <a href={data.link} className="inline-flex w-fit items-center gap-1.5 px-4 py-2 rounded-lg bg-sky-500/10 hover:bg-sky-500 text-sky-400 hover:text-white border border-sky-500/20 hover:border-sky-500 transition-all duration-300 text-[10px] font-black uppercase tracking-widest whitespace-nowrap group">
                                    <span>Explore Location</span>
                                    <Icon name="arrow-right" size={14} className="transform group-hover:translate-x-1 transition-transform duration-300" />
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const CarouselCard = ({ item }) => (
            <a href={item.link} className="relative group overflow-hidden rounded-xl w-[280px] h-[360px] flex-shrink-0 snap-center cursor-pointer">
                <div className="absolute inset-0 bg-slate-900/40 group-hover:bg-slate-900/20 transition-colors z-10"></div>
                <img 
                    src={item.image} 
                    alt={item.alt || item.title} 
                    loading="lazy"
                    width="280"
                    height="360"
                    className="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700"
                />
                <div className="absolute bottom-0 left-0 p-6 z-20 w-full">
                    <p className="text-xs font-bold text-sky-400 uppercase tracking-wider mb-1 opacity-0 transform translate-y-4 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-300">{item.desc}</p>
                    <h3 className="text-2xl font-black text-white uppercase tracking-tight leading-none">{item.title}</h3>
                </div>
            </a>
        );

        const ManualCarousel = () => {
            return (
                <div className="w-full py-10 bg-gradient-to-t from-slate-900 via-slate-900/80 to-transparent">
                    <div className="text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-6">
                        Scroll across for more
                    </div>
                    <div className="flex overflow-x-auto snap-x snap-mandatory scroll-smooth space-x-6 px-6 no-scrollbar pb-6 md:w-max md:mx-auto md:max-w-full">
                        {topics.map((topic, index) => (
                            <CarouselCard key={`${topic.id}-${index}`} item={topic} />
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [showInstallModal, setShowInstallModal] = useState(false);

            // Listen for the native install prompt event
            useEffect(() => {
                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            }, []);

            // Handle the PWA App install or fallback to manual instructions for Apple devices
            const handleInstallClick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        setDeferredPrompt(null);
                    }
                } else {
                    setShowInstallModal(true);
                }
            };

            return (
                <div className="min-h-screen bg-slate-900 flex flex-col">
                    <Navbar />
                    
                    {/* Main Layout Container */}
                    <main className="flex flex-col min-h-screen">
                        
                        {/* 1. Hero / Image Section */}
                        <section className="relative flex-grow flex flex-col justify-center items-center overflow-hidden">
                            
                            {/* Background Image */}
                            <div className="absolute inset-0 z-0 flex justify-center items-center overflow-hidden bg-slate-900">
                                <img 
                                    src="MG2282.jpg" 
                                    alt="Northumberland Landscape Photography - Dramatic coastline" 
                                    className="h-full w-auto max-w-none object-cover opacity-80"
                                />
                                <div className="absolute inset-0 bg-gradient-to-b from-slate-900/60 via-slate-900/40 to-slate-900/80"></div>
                            </div>

                            {/* Text Content - SEO Optimized H1 */}
                            <div className="relative z-10 flex flex-col items-center justify-center text-center px-4 sm:px-6 pt-32 pb-10 w-full">
                                <h1 className="text-3xl sm:text-6xl md:text-7xl lg:text-9xl font-black tracking-tighter mb-6 break-words w-full drop-shadow-2xl text-white">
                                    NORTHUMBERLAND <br/>
                                    <span className="text-sky-300 sm:text-transparent sm:bg-clip-text sm:bg-gradient-to-r sm:from-sky-400 sm:to-sky-600">PHOTOGRAPHY.</span>
                                </h1>
                                <p className="text-lg md:text-xl text-slate-300 max-w-2xl mb-10 font-medium leading-relaxed drop-shadow-md">
                                    The ultimate guide for photographers & hikers in and around Northumberland. Tutorials, locations, aurora and astro data, weather forecasts plus walking routes for your journey in the stunning Northumberland landscape.
                                </p>
                                
                                <div className="flex items-center justify-center space-x-8 mb-8">
                                    <a href="https://facebook.com/northernpixl" target="_blank" rel="noreferrer" className="text-slate-400 hover:text-white hover:scale-110 transition-all" aria-label="Visit NorthernPixl Facebook">
                                        <Icon name="facebook" size={28} />
                                    </a>
                                    <a href="https://instagram.com/northernpixl" target="_blank" rel="noreferrer" className="text-slate-400 hover:text-white hover:scale-110 transition-all" aria-label="Visit NorthernPixl Instagram">
                                        <Icon name="instagram" size={28} />
                                    </a>
                                </div>

                                <div className="flex flex-col sm:flex-row items-center justify-center gap-4 mb-4">
                                    <a href="mailto:northernpixl@gmail.com" className="inline-flex items-center justify-center gap-2 px-6 py-3 rounded-full bg-white/10 hover:bg-white text-white hover:text-slate-900 border border-white/20 hover:border-white transition-all duration-300 font-black uppercase text-[10px] tracking-widest backdrop-blur-sm group w-full sm:w-auto">
                                        <Icon name="mail" size={16} />
                                        <span>Contact Me</span>
                                    </a>
                                    
                                    <button onClick={handleInstallClick} className="inline-flex items-center justify-center gap-2 px-6 py-3 rounded-full bg-white/10 hover:bg-sky-500 text-white hover:text-white border border-white/20 hover:border-sky-500 transition-all duration-300 font-black uppercase text-[10px] tracking-widest backdrop-blur-sm group w-full sm:w-auto">
                                        <Icon name="download" size={16} />
                                        <span>Install App</span>
                                    </button>
                                </div>
                                
                                {/* New Dynamic Where To Shoot Widget */}
                                <WhereToShootWidget />
                                
                            </div>
                        </section>

                        {/* 2. Carousel Section */}
                        <div className="relative z-20 w-full bg-slate-900 border-t border-slate-800/50">
                            <ManualCarousel />
                        </div>

                    </main>

                    {/* Install App Modal */}
                    {showInstallModal && (
                        <div className="fixed inset-0 z-[2000] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in" onClick={() => setShowInstallModal(false)}>
                            <div className="bg-white rounded-3xl shadow-2xl overflow-hidden w-full max-w-md flex flex-col" onClick={(e) => e.stopPropagation()}>
                                <div className="flex items-center justify-between p-5 border-b border-slate-100 bg-slate-50">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-sky-500 text-white p-2.5 rounded-xl shadow-sm">
                                            <Icon name="download" size={20} />
                                        </div>
                                        <h3 className="font-black text-lg text-slate-800 leading-none">Install App</h3>
                                    </div>
                                    <button onClick={() => setShowInstallModal(false)} className="p-2 hover:bg-slate-200 rounded-full transition-colors text-slate-500 hover:text-slate-900">
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>
                                <div className="p-6 md:p-8 space-y-8">
                                    {/* iOS Instructions */}
                                    <div>
                                        <h4 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                                            <Icon name="share-apple" size={14} className="text-slate-400" /> Apple iOS (Safari)
                                        </h4>
                                        <ol className="space-y-4 text-sm text-slate-600 font-medium">
                                            <li className="flex items-start gap-3">
                                                <span className="flex-shrink-0 w-6 h-6 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center text-xs font-bold">1</span>
                                                <span>Tap the <strong>Share</strong> button at the bottom of your screen.</span>
                                            </li>
                                            <li className="flex items-start gap-3">
                                                <span className="flex-shrink-0 w-6 h-6 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center text-xs font-bold">2</span>
                                                <span>Scroll down and tap <strong className="inline-flex items-center gap-1">Add to Home Screen <Icon name="plus-square" size={14} className="inline pb-0.5"/></strong>.</span>
                                            </li>
                                        </ol>
                                    </div>

                                    <div className="border-t border-slate-100"></div>

                                    {/* Android Instructions */}
                                    <div>
                                        <h4 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                                            <Icon name="more-vertical" size={14} className="text-slate-400" /> Android (Chrome)
                                        </h4>
                                        <ol className="space-y-4 text-sm text-slate-600 font-medium">
                                            <li className="flex items-start gap-3">
                                                <span className="flex-shrink-0 w-6 h-6 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center text-xs font-bold">1</span>
                                                <span>Tap the <strong>Menu</strong> button (three dots) at the top right.</span>
                                            </li>
                                            <li className="flex items-start gap-3">
                                                <span className="flex-shrink-0 w-6 h-6 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center text-xs font-bold">2</span>
                                                <span>Tap <strong>Add to Home screen</strong> or <strong>Install app</strong>.</span>
                                            </li>
                                        </ol>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-50 border-t border-slate-100">
                                    <button onClick={() => setShowInstallModal(false)} className="w-full bg-slate-900 text-white font-bold text-xs uppercase tracking-widest py-4 px-6 rounded-xl hover:bg-slate-800 transition-colors shadow-lg flex items-center justify-center">
                                        Got it
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script data-goatcounter="https://northernpixl.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
