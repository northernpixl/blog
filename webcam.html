                },
                locationSpotlight: "Hadrian's Wall (Steel Rigg to Housesteads). The low winter sun beautifully highlights the severe undulations of the Whin Sill crags, and frost clings stubbornly to the north-facing rocks all day.",
                conditions: "Very short days (sunset around 3:45 PM). Extremely cold, clear nights perfect for astro, but demanding intense thermal clothing for the photographer.",
                gear: "A fast memory card and an intervalometer to shoot hundreds of continuous 20-second exposures to capture the Geminid meteor shower fireballs."
            }
        ];

        const Navbar = () => {
            const [isOpen, setIsOpen] = useState(false);

            const toggleMenu = () => {
                setIsOpen(!isOpen);
            };

            const links = [
                { name: 'Home', url: 'index.html', active: false },
                { name: 'Tutorials', url: 'tutorials.html', active: false },
                { name: 'Explore', url: 'explore.html', active: false },
                { name: 'Weather', url: 'weather.html', active: false },
                { name: 'Routes', url: 'routes.html', active: false },
                { name: 'Calendar', url: 'calendar.html', active: true },
                { name: 'Ethics', url: 'ethics.html', active: false },
                { name: 'Workshops', url: 'workshops.html', active: false }
            ];

            return (
                <nav className="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 shadow-sm">
                    <div className="flex items-center justify-between px-4 md:px-8 h-20 max-w-7xl mx-auto w-full">
                        {/* Logo Area */}
                        <div className="flex items-center space-x-3 cursor-pointer" onClick={() => window.location.href='index.html'}>
                            <div className="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center">
                                <Icon name="camera" className="text-white" size={18} />
                            </div>
                            <span className="font-black text-lg md:text-xl tracking-tighter uppercase hidden md:inline">NorthernPixl</span>
                            <span className="font-black text-lg md:text-xl tracking-tighter uppercase md:hidden">NorthernPixl</span>
                        </div>
                        
                        {/* Desktop Navigation - Exact match to ethics.html & explore.html */}
                        <div className="hidden md:flex space-x-10 text-[11px] font-black uppercase tracking-widest text-slate-400">
                            {links.map((link) => (
                                <a 
                                    key={link.name} 
                                    href={link.url} 
                                    className={link.active ? "text-slate-900 border-b-2 border-slate-900 pb-1" : "hover:text-slate-900 transition-colors"}
                                >
                                    {link.name}
                                </a>
                            ))}
                        </div>

                        {/* Mobile Menu Button */}
                        <div className="md:hidden">
                            <button onClick={toggleMenu} className="p-2 text-slate-900 focus:outline-none">
                                <Icon name={isOpen ? "x" : "menu"} size={24} />
                            </button>
                        </div>
                    </div>

                    {/* Mobile Navigation Dropdown */}
                    {isOpen && (
                        <div className="md:hidden bg-white border-b border-slate-100 absolute w-full left-0 top-20 shadow-xl fade-in">
                            <div className="flex flex-col p-6 space-y-6">
                                {links.map((link) => (
                                    <a 
                                        key={link.name} 
                                        href={link.url} 
                                        className={`text-sm font-black uppercase tracking-widest ${link.active ? "text-slate-900" : "text-slate-400"}`}
                                    >
                                        {link.name}
                                    </a>
                                ))}
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        const App = () => {
            // Default to the actual current month when the page loads
            const [activeIndex, setActiveIndex] = useState(new Date().getMonth());
            const activeData = CALENDAR_DATA[activeIndex];

            // Automatically scroll the selected month into the center of the view
            useEffect(() => {
                const activeBtn = document.getElementById(`month-btn-${activeIndex}`);
                if (activeBtn) {
                    activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }, [activeIndex]);

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    <Navbar />
                    
                    <main className="pt-20 flex-1">
                        
                        {/* Hero Introduction */}
                        <section className="bg-white px-4 py-12 md:py-16 text-center border-b border-slate-100">
                            <div className="inline-flex items-center justify-center p-3 bg-sky-50 rounded-2xl text-sky-500 mb-6 shadow-sm">
                                <Icon name="calendar" size={32} />
                            </div>
                            <h1 className="text-4xl md:text-6xl font-black uppercase tracking-tighter mb-6 text-slate-900">Nature's Calendar</h1>
                            <p className="text-base md:text-lg text-slate-500 leading-relaxed max-w-2xl mx-auto">
                                A highly detailed, month-by-month master guide to photography in Northumberland. Discover exactly what to shoot, when to shoot it, and how to prepare.
                            </p>
                        </section>

                        {/* Sticky Horizontal Tab Bar */}
                        <div className="sticky top-[80px] z-40 bg-white/95 backdrop-blur-md border-b border-slate-200 shadow-sm transition-all">
                            <div className="max-w-7xl mx-auto">
                                <div className="flex overflow-x-auto no-scrollbar py-3 md:py-4 px-4 md:px-8 gap-2 md:gap-4 items-center w-full">
                                    {CALENDAR_DATA.map((month, index) => (
                                        <button 
                                            key={month.id}
                                            id={`month-btn-${index}`}
                                            onClick={() => setActiveIndex(index)}
                                            className={`flex-shrink-0 px-4 py-2 md:px-6 md:py-2.5 rounded-full text-[11px] md:text-xs font-black uppercase tracking-widest transition-all duration-300 focus:outline-none ${
                                                activeIndex === index 
                                                ? 'bg-slate-900 text-white shadow-md transform scale-105' 
                                                : 'bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-slate-900'
                                            }`}
                                        >
                                            <span className="md:hidden">{month.shortMonth}</span>
                                            <span className="hidden md:inline">{month.month}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Dynamic Content Area */}
                        <section className="max-w-7xl mx-auto px-4 md:px-6 py-8 md:py-12 w-full">
                            
                            {/* Uses the key prop to force a re-render and trigger the fade-in animation when the month changes */}
                            <div key={activeData.id} className="animate-in fade-in slide-up">
                                
                                {/* Massive Header Image */}
                                <div className="relative w-full h-[300px] md:h-[450px] lg:h-[500px] rounded-[2rem] md:rounded-[3rem] overflow-hidden mb-8 md:mb-12 shadow-xl bg-slate-900">
                                    <div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/30 to-transparent z-10"></div>
                                    <img 
                                        src={activeData.image} 
                                        alt={activeData.month} 
                                        className="absolute inset-0 w-full h-full object-cover opacity-80"
                                        onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}
                                    />
                                    {/* Fallback pattern if image missing */}
                                    <div className="absolute inset-0 bg-slate-800 items-center justify-center text-slate-600 hidden">
                                        <Icon name="camera" size={64} className="opacity-20" />
                                    </div>
                                    
                                    <div className="absolute bottom-8 left-6 md:bottom-12 md:left-12 z-20">
                                        <span className={`inline-block px-4 py-1.5 rounded-full backdrop-blur-md bg-white/20 border border-white/20 text-[10px] md:text-xs font-black uppercase tracking-widest text-white shadow-lg mb-3 md:mb-4`}>
                                            {activeData.season}
                                        </span>
                                        <h2 className="text-6xl md:text-8xl lg:text-9xl font-black text-white tracking-tighter drop-shadow-2xl leading-none">
                                            {activeData.month}
                                        </h2>
                                    </div>
                                </div>

                                {/* Deep Dive Grid */}
                                <div className="grid lg:grid-cols-3 gap-6 md:gap-8 mb-8 md:mb-12">
                                    
                                    {/* Landscape Pillar */}
                                    <div className="bg-white rounded-[2rem] p-8 md:p-10 shadow-sm border border-slate-100 flex flex-col hover:shadow-lg transition-shadow">
                                        <div className="w-14 h-14 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center mb-6 border border-emerald-100">
                                            <Icon name="leaf" size={28} />
                                        </div>
                                        <span className="text-[10px] font-black uppercase tracking-widest text-emerald-500 mb-2">Landscape Focus</span>
                                        <h3 className="text-xl md:text-2xl font-black text-slate-900 leading-tight mb-4">{activeData.landscape.title}</h3>
                                        <p className="text-sm md:text-base text-slate-600 leading-relaxed flex-1">
                                            {activeData.landscape.desc}
                                        </p>
                                    </div>

                                    {/* Wildlife Pillar */}
                                    <div className="bg-white rounded-[2rem] p-8 md:p-10 shadow-sm border border-slate-100 flex flex-col hover:shadow-lg transition-shadow">
                                        <div className="w-14 h-14 bg-amber-50 text-amber-500 rounded-2xl flex items-center justify-center mb-6 border border-amber-100">
                                            <Icon name="bird" size={28} />
                                        </div>
                                        <span className="text-[10px] font-black uppercase tracking-widest text-amber-500 mb-2">Wildlife Focus</span>
                                        <h3 className="text-xl md:text-2xl font-black text-slate-900 leading-tight mb-4">{activeData.wildlife.title}</h3>
                                        <p className="text-sm md:text-base text-slate-600 leading-relaxed flex-1">
                                            {activeData.wildlife.desc}
                                        </p>
                                    </div>

                                    {/* Astro Pillar */}
                                    <div className="bg-white rounded-[2rem] p-8 md:p-10 shadow-sm border border-slate-100 flex flex-col hover:shadow-lg transition-shadow">
                                        <div className="w-14 h-14 bg-indigo-50 text-indigo-500 rounded-2xl flex items-center justify-center mb-6 border border-indigo-100">
                                            <Icon name="moon" size={28} />
                                        </div>
                                        <span className="text-[10px] font-black uppercase tracking-widest text-indigo-500 mb-2">Astro Focus</span>
                                        <h3 className="text-xl md:text-2xl font-black text-slate-900 leading-tight mb-4">{activeData.astro.title}</h3>
                                        <p className="text-sm md:text-base text-slate-600 leading-relaxed flex-1">
                                            {activeData.astro.desc}
                                        </p>
                                    </div>

                                </div>

                                {/* Month Specifics Footer Box */}
                                <div className="bg-slate-900 rounded-[2rem] md:rounded-[3rem] p-8 md:p-12 text-white shadow-xl">
                                    <h3 className="text-2xl font-black mb-8 border-b border-slate-700 pb-6 uppercase tracking-tight">Month Specifics</h3>
                                    
                                    <div className="grid md:grid-cols-3 gap-8 md:gap-12">
                                        <div className="flex flex-col">
                                            <div className="flex items-center text-sky-400 mb-3">
                                                <Icon name="mapPin" size={20} className="mr-3" />
                                                <span className="text-[11px] font-black uppercase tracking-widest">Hotspot Location</span>
                                            </div>
                                            <p className="text-sm md:text-base text-slate-300 font-medium leading-relaxed">{activeData.locationSpotlight}</p>
                                        </div>

                                        <div className="flex flex-col">
                                            <div className="flex items-center text-amber-400 mb-3">
                                                <Icon name="sun" size={20} className="mr-3" />
                                                <span className="text-[11px] font-black uppercase tracking-widest">Weather & Conditions</span>
                                            </div>
                                            <p className="text-sm md:text-base text-slate-300 font-medium leading-relaxed">{activeData.conditions}</p>
                                        </div>

                                        <div className="flex flex-col">
                                            <div className="flex items-center text-slate-300 mb-3">
                                                <Icon name="cameraOutline" size={20} className="mr-3" />
                                                <span className="text-[11px] font-black uppercase tracking-widest">Crucial Gear</span>
                                            </div>
                                            <p className="text-sm md:text-base text-slate-300 font-medium leading-relaxed">{activeData.gear}</p>
                                        </div>
                                    </div>
                                </div>
                                
                            </div>
                        </section>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script data-goatcounter="https://northernpixl.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
