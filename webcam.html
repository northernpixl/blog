            { id: 56, name: "Edlingham Castle", type: "Landscape", lat: 55.3775, lng: -1.8217, fee: "Free entry (English Heritage). Free parking.", desc: "A highly evocative, deeply melancholic, and wildly romantic ruin situated in a desolate, sweeping moorland valley. It is universally famous for its massive, severely leaning 'solar tower', which features massive, jagged cracks tearing through the ancient masonry. The castle sits in a soggy, often misty depression, flanked by an incredibly striking 19th-century railway viaduct in the near distance, creating a brilliant juxtaposition of medieval ruins and Victorian industrial engineering.\n\nCOMPOSITION & GEAR: The severe, gravity-defying lean of the tower and the violent, jagged cracks in its walls are the focal points here. Frame the ruins tightly with a mid-range lens, using the stark, empty landscape to emphasise the castle's isolation. It is a phenomenal location at sunset, as the ruins sit in an open bowl that catches the very last, warm horizontal rays of light, deeply highlighting the textures of the broken stone. In winter, shoot the castle from a distance to include the railway viaduct sweeping across the background, visually linking the two distinct eras of history.", parking: "NE66 2BW", best_time: "Sunset", top_tip: "Cattle often graze inside the ruins. They are generally calm but keep an eye out.", history: "The tower 'cracked' and leaned due to subsidence, not battle. It has defied gravity for centuries." },
            { id: 57, name: "Brinkburn Priory", type: "Landscape", lat: 55.2794, lng: -1.8197, fee: "English Heritage entry fee. Free parking.", desc: "An architectural marvel and a supremely peaceful, hidden gem. This exquisite, incredibly well-preserved early Gothic priory is uniquely tucked deep within a steep, heavily wooded loop of the River Coquet. Unlike most monastic ruins in the region, the priory was completely and meticulously roofed and restored in the 19th century, meaning the interior boasts phenomenal acoustics and soaring, intact architectural details. The sheer, steep banks of the river entirely shield the building, making it feel like a secret discovery.\n\nCOMPOSITION & GEAR: The ultimate exterior shot requires a very short walk along the river path. Position yourself on the banks of the Coquet to capture the majestic, tall lancet windows of the priory peeking through the dense, surrounding woodland, perfectly reflected in the calm, slow-moving river water. Inside, the architecture is breathtaking. Pack an ultra-wide lens (14mm-20mm) to capture the soaring, vaulted ceilings and the stunning array of stained glass. A tripod is usually essential indoors due to the very dim, moody light filtering through the narrow gothic windows.", parking: "NE65 8AR", best_time: "Early Morning", top_tip: "Walk along the river path for reflections of the priory in the Coquet.", history: "Founded in 1135 by Augustinian canons. It was restored in the 19th century." },
            { id: 58, name: "Howick Hall Gardens", type: "Landscape", lat: 55.4439, lng: -1.6067, accessible: true, fee: "Entry fee applies. Free parking.", desc: "The stately ancestral home of Earl Grey (namesake of the famous tea), surrounded by some of the most extensive, meticulously designed, and photogenic formal gardens in Northumberland. For photographers, the prime attraction is rarely the house itself, but rather the spectacular 'Silverwood'—a massive woodland garden that explodes with millions of snowdrops in early spring, followed by vibrant, towering rhododendrons. The estate uniquely extends right down to the jagged coastline, offering a stark contrast between manicured lawns and brutal sea cliffs.\n\nCOMPOSITION & GEAR: Timing is critical. In February and March, macro photographers will be in heaven—bring a 100mm macro lens and get flat on the ground to capture deeply isolated, creamy portraits of the snowdrops against the dark earth. The main paths around the stately home and the edges of the arboretum are highly accessible.", parking: "NE66 3LB", best_time: "Spring (Snowdrops)", top_tip: "The tea house serves the real Earl Grey tea. Worth a break!", history: "Earl Grey (the Prime Minister) brewed the famous tea here to suit the local water." },
            { id: 59, name: "Cocklawburn Beach", type: "Landscape", lat: 55.7336, lng: -1.9614, fee: "Free entry. Free parking.", desc: "An absolute visual playground for seascape and geological photographers, located on the far northern coast near Berwick. The beach is completely dominated by deeply fascinating, highly complex limestone and shale strata that aggressively tilt and slice directly into the North Sea at striking angles. These long, jagged rock ridges create immediate, powerful, and natural geometric lines that sweep the viewer's eye straight off the beach and into the water.\n\nCOMPOSITION & GEAR: This location demands a strong grasp of long exposure techniques and leading lines. The absolute best time to shoot is at mid-tide as the water recedes, exposing the incredible, jagged channels of the rock strata. Set up your tripod low among the ridges and use an ultra-wide lens (16mm) to capture the full sweep of the rocks leading to the horizon. Utilise a 6-stop ND filter to drag your shutter speed to around 2-4 seconds—this brilliantly captures the aggressive, streaking motion of the water rushing violently through the narrow rock channels as the waves pull back.", parking: "TD15 2RW", best_time: "Mid-Tide", top_tip: "Look for fossils (crinoids) in the rocks to use as foreground interest.", history: "The lime kilns nearby hint at the industrial past of this now-quiet beach." },
            { id: 60, name: "Spittal Promenade", type: "Landscape", lat: 55.7600, lng: -1.9944, accessible: true, fee: "Free entry. Free parking.", desc: "A sweeping, wide, and highly evocative Victorian seaside promenade located at the very mouth of the River Tweed. The area exudes a nostalgic, historical seaside aesthetic, featuring a beautifully long, paved walkway, a prominent line of brightly coloured wooden beach huts, and a massively long, robust stone pier that reaches far out into the often-turbulent North Sea, culminating in a distinctive, classic lighthouse.\n\nCOMPOSITION & GEAR: This is an exceptional location for capturing the raw, brutal power of the North Sea during autumn and winter storms. From the complete safety of the high promenade wall, use a telephoto lens (200mm+) to severely compress the distance and photograph massive, chaotic waves violently smashing over the breakwater and swallowing the lighthouse. On calmer, brighter days, swap to a 50mm or 85mm lens and focus on the vibrant, repeating geometry of the colourful beach huts, shooting them perfectly straight-on for striking, minimalist, fine-art compositions. The wide, flat promenade is perfectly accessible.", parking: "TD15 1RN", best_time: "Sunrise", top_tip: "Great for capturing stormy seas crashing over the pier wall from a safe distance.", history: "A popular spa resort in the 18th century. 'Spittal' refers to a hospital that once stood here." },
            { id: 61, name: "Brizlee Tower", type: "Landscape", lat: 55.4333, lng: -1.7333, fee: "Free entry (check Hulne Park opening hours). Free town parking.", desc: "A breathtakingly ornate, highly elaborate, and spectacularly eccentric six-story Gothic folly, standing proudly on a high ridge deep within the private Hulne Park estate. Surrounded by dense, mature woodland, the tower features incredibly intricate stone carving, projecting balconies, and a distinctive fire-basket crowning its roof. Because access is strictly limited to walking or cycling (no public vehicles), the location remains phenomenally quiet, pristine, and unspoiled by crowds.\n\nCOMPOSITION & GEAR: The sheer height of the tower combined with the densely packed surrounding trees makes this a challenging but highly rewarding architectural subject. An ultra-wide lens (14-20mm) is absolutely required to capture the full, towering height of the structure from its immediate base, deliberately using the extreme perspective distortion to make the folly look impossibly tall and imposing against the sky. During the autumn months, use a mid-range zoom to step back and meticulously frame the intricate, gothic stone details through the wildly colourful, golden and red leaves of the surrounding parkland canopy.", parking: "NE66 1NQ", best_time: "Autumn", top_tip: "Check opening times. Hulne Park is often closed for shooting or private events.", history: "Built in 1781 by the 1st Duke of Northumberland. It was designed to be viewed from the castle." },
            { id: 62, name: "Preston Tower", type: "Landscape", lat: 55.5458, lng: -1.7067, fee: "Small entry fee. Free parking.", desc: "A fascinating, immensely sturdy, and beautifully preserved example of a historic Pele Tower (a fortified border keep designed to protect against Scottish Reivers). What makes Preston Tower entirely unique photographically is the massively oversized, highly incongruous Victorian clock face that was aggressively retrofitted into its austere medieval stonework centuries later. The tower is set amidst exceptionally manicured, vibrant, and incredibly lush formal gardens, providing a stark contrast to the brutal, functional military architecture.\n\nCOMPOSITION & GEAR: The massive, flat, unadorned stone walls of the tower can look quite plain and flat under overcast, grey skies. The absolute key to making this location work is directional lighting. Shoot specifically during the middle of the day or early afternoon when direct, harsh sunlight grazes across the southern or western facades; this intense cross-lighting will massively emphasise the rough, deeply pitted textures of the 14th-century stonework. Use a standard lens to frame the stark tower rising abruptly from the incredibly soft, vibrant, and flawless green lawns of the foreground gardens.", parking: "NE67 5DH", best_time: "Mid-day", top_tip: "You can climb to the top for views, but the best photo is from the lawn.", history: "Built between 1392 and 1399. The clock was added in 1864." },
            { id: 63, name: "Ford Village", type: "Landscape", lat: 55.6300, lng: -2.0833, fee: "Free entry. Free parking.", desc: "A flawless, staggeringly picturesque 'model village' originally conceived and painstakingly rebuilt in the 19th century by the aristocratic Waterford family. The entire settlement is a masterclass in uniform, historical aesthetic perfection. It features immaculately maintained stone cottages, pristine, highly colourful floral borders, an iconic, beautifully arched stone blacksmith's forge, and the famous Lady Waterford Hall, making the entire village feel like a pristine, living museum completely frozen in time.\n\nCOMPOSITION & GEAR: The area is an absolute goldmine for capturing classic, idyllic, quintessential English heritage and travel photography. The standout architectural feature is the iconic, sweeping horseshoe-shaped stone archway of the old village forge. Use a wide-angle lens (24mm) to capture the sweeping curve of the arch framing the village street beyond. For the best results, arrive very early in the morning before the influx of daily tourists and parked cars completely clutter the narrow, historic roads and ruin the timeless, centuries-old illusion of the pristine streetscapes.", parking: "TD15 2QA", best_time: "Morning", top_tip: "Visit the heavy horse centre nearby if you like equine photography.", history: "Remodelled in the 19th century by Louisa, Marchioness of Waterford." },
            { id: 64, name: "Blawearie", type: "Landscape", lat: 55.4951, lng: -1.8677, fee: "Free entry. Free parking.", desc: "A genuinely haunting, profoundly isolated, and deeply atmospheric abandoned shepherd's cottage, left to ruin high on the incredibly bleak, windswept, and desolate moors of the Bewick and Beanley estates. Surrounded by nothing but vast expanses of heather, ancient Bronze Age burial cairns, and sweeping horizons, the roofless stone shell and completely empty, staring windows exude an incredible feeling of melancholy, primitive isolation, and the harsh reality of historical moorland life.\n\nCOMPOSITION & GEAR: This location actively rejects bright, sunny days; it absolutely demands extreme, moody, and turbulent weather to convey its true, desolate character. Hike up here when the clouds are hanging incredibly low, heavy, and threatening rain. Frame the empty, jagged windows of the ruined cottage directly against the bleak hills in the background. The raw, high-contrast textures of the crumbling stone, the wildly blowing moorland grass, and the dark, brooding skies make this an undeniably spectacular location for extremely dramatic, high-contrast Black and White landscape photography.", parking: "NE66 4LX", best_time: "Moody/Stormy", top_tip: "It's a hike. Bring navigation. The atmosphere is best when the clouds are low.", history: "Name means 'Tired of the blue' or 'Blue and weary'? A remote spot occupied until World War II." },
            { id: 65, name: "Corbridge Roman Town", type: "Landscape", lat: 54.9736, lng: -2.0294, accessible: true, fee: "English Heritage entry fee. Free parking.", desc: "A sprawling, incredibly detailed, and highly significant archaeological site that stands apart from the typical military forts of Hadrian's Wall. Corbridge was a massive, bustling civilian town and a vital supply base for the entire Roman frontier. The extensive ruins are laid out across a wide, flat plain, featuring the remarkably well-preserved main high street (the Stanegate), exceptionally detailed granary buildings with highly visible sub-floor ventilation columns, and incredibly complex, intricate stone foundations that hint at the massive scale of the ancient settlement.\n\nCOMPOSITION & GEAR: Because the ruins consist mostly of low-lying foundations spread over a wide, flat area, finding strong compositions requires a very specific approach. Avoid shooting from eye level, which flattens the site into a messy jumble of rocks. Instead, get extremely low to the ground with a wide-angle lens (16-24mm) to heavily emphasise the height of the remaining walls and the complex, geometric grid patterns of the granary floor vents. The site is largely accessible via ramps and compacted paths.", parking: "NE45 5NT", best_time: "Late afternoon", top_tip: "The 'Corbridge Lion' sculpture inside the museum is a must-see, though harder to photograph well due to glass.", history: "The supply base for the Wall. It was inhabited much longer than the forts." },
            { id: 66, name: "Low Newton", type: "Landscape", lat: 55.5133, lng: -1.6108, fee: "Free entry. Pay & Display parking.", desc: "An exceptionally charming, historic, and visually striking 18th-century fishing village, now almost entirely owned and preserved by the National Trust. The village is famously arranged in an incredibly photogenic three-sided square of uniform, brilliantly white-washed cottages that open directly onto a pristine, sweeping, golden sandy bay. The intense visual contrast between the brilliant white buildings, the vibrant green central grass, the yellow sand, and the deep blue sea makes it one of the most idyllic and sought-after coastal locations in the county.\n\nCOMPOSITION & GEAR: This location is absolutely tailor-made for warm, golden hour evening light. As the sun sets behind the village, the last rays directly illuminate the front of the pristine white cottages, casting a phenomenal, warm, golden glow across the entire square. Use a versatile wide-to-standard zoom (24-70mm) to capture the sweep of the buildings framing the open beach. Don't miss capturing the iconic Ship Inn microbrewery as part of the scene, and consider using the scattered, traditional wooden fishing boats pulled up onto the grass as brilliant, colourful foreground interest to anchor your shots.", parking: "NE66 3EL", best_time: "Sunset", top_tip: "The Ship Inn is famous for its microbrewery. A great reward after a shoot.", history: "Built in the 18th century for fishermen. Now almost entirely National Trust." },
            { id: 67, name: "Hauxley Wildlife Discovery Centre", type: "Wildlife", lat: 55.3210, lng: -1.5480, accessible: true, fee: "Free entry. Parking fee/donation applies.", desc: "This is arguably the best accessible wildlife photography spot in the North East. Fully accessible, ramped hides with low-level viewing slots. Look for red squirrels, otters, and a massive variety of wading birds and wildfowl.\n\nCOMPOSITION & GEAR: A super-telephoto lens (400mm+) is ideal here. Use a beanbag on the accessible hide shelves rather than struggling with a tripod. Early mornings offer the best light and highest animal activity.", parking: "NE65 0JR (Donation)", best_time: "Year-round", top_tip: "Spend time in the red squirrel hide; they are very active and comfortable around the feeders.", history: "Once an open-cast coal mine, it has been expertly transformed into one of the best wildlife reserves in the North East." },
            { id: 68, name: "East Chevington Nature Reserve", type: "Wildlife", lat: 55.2950, lng: -1.5710, accessible: true, fee: "Free entry. Free parking.", desc: "Expansive reedbeds and lakes. Hard-surfaced paths lead to accessible viewing screens. Excellent for marsh harriers and bearded tits.\n\nCOMPOSITION & GEAR: A long telephoto lens is required. Pan smoothly to track the harriers hunting low over the reeds. Use a fast shutter speed (1/1000s or faster) to freeze birds in flight against the sky.", parking: "NE61 5BZ", best_time: "Spring/Summer", top_tip: "Patience is key here. The bearded tits are elusive but highly rewarding to photograph when they emerge from the deep reeds.", history: "Another fantastic example of Northumberland's mining heritage successfully reclaimed by nature." },
            { id: 69, name: "Bakethin Nature Reserve", type: "Wildlife", lat: 55.2240, lng: -2.5740, accessible: true, fee: "Free entry. Pay & Display parking.", desc: "The wilder, quieter end of Kielder Water. A flat, well-surfaced path leads from the car park to an accessible viewing hide overlooking the Bakethin viaduct. Look for ospreys, crossbills, and waterfowl.\n\nCOMPOSITION & GEAR: Bring your longest lens for the ospreys. If the birds are distant, use the historic arches of the Bakethin Viaduct as a strong structural background for your wildlife shots.", parking: "NE48 1EB", best_time: "Summer", top_tip: "Keep an eye on the old viaduct structure; birds of prey often use it as a vantage point.", history: "The reserve protects the shallowest part of Kielder Water, creating a vital sanctuary for breeding birds." },
            { id: 70, name: "QEII Country Park", type: "Wildlife", lat: 55.1850, lng: -1.5390, accessible: true, fee: "Free entry. Free parking.", desc: "A large, tranquil lake perfect for relaxed bird photography. A flat, paved path circles the entire lake. Great for capturing woodland birds, swans, and morning mist over the water.\n\nCOMPOSITION & GEAR: A standard zoom (70-200mm) is usually sufficient here as the birds are quite tame. Get down to the water's edge on the paved paths for eye-level waterfowl portraits.", parking: "NE63 9AT", best_time: "Morning Mist", top_tip: "Arrive early on a cold morning. The mist rising off the lake with the swans gliding through it is a classic shot.", history: "A former colliery site, beautifully landscaped into a community park and nature reserve." },
            { id: 71, name: "Seahouses Harbour", type: "Wildlife", lat: 55.5820, lng: -1.6520, accessible: true, fee: "Free entry. Pay & Display parking.", desc: "Easy access to coastal and marine wildlife without needing to board a boat. The paved harbour walls offer a great vantage point for photographing eider ducks (the famous 'Cuddy's ducks'), resting seals, and returning fishing boats.\n\nCOMPOSITION & GEAR: A versatile 100-400mm lens is perfect. Wait for the fishing boats to return; they often throw scraps overboard, which brings the seals and seabirds incredibly close to the harbour walls.", parking: "NE68 7RN", best_time: "High Tide / Boat Returns", top_tip: "Look out for the Eider ducks sheltering in the inner harbour walls; they are incredibly photogenic and approachable.", history: "A bustling fishing port that serves as the main gateway to the Farne Islands." },
            { id: 72, name: "Heatherslaw Mill & River Till", type: "Wildlife", lat: 55.6320, lng: -2.1000, accessible: true, fee: "River paths free. Mill entry fee applies. Free parking.", desc: "River wildlife mixed with heritage. Flat, paved paths along the River Till. Excellent spot for photographing river birds, with a chance to spot otters or kingfishers near the historic mill.\n\nCOMPOSITION & GEAR: Keep your camera set to a fast shutter speed and continuously scan the river banks for the flash of blue from a kingfisher. A polarising filter helps cut the glare on the river water.", parking: "TD15 2UW", best_time: "Early Morning", top_tip: "The area near the mill weir is often the most active for fishing birds.", history: "The only working water-driven corn mill in Northumberland, situated on the picturesque River Till." },
            { id: 73, name: "Warkworth River Walk", type: "Wildlife", lat: 55.3480, lng: -1.6110, accessible: true, fee: "Free entry. Free/Pay & Display parking.", desc: "Peaceful river scenery leading to a castle. A well-paved path alongside the River Coquet. Great for dippers, ducks, and framing Warkworth Castle through the trees.\n\nCOMPOSITION & GEAR: Look out for dippers bobbing on the rocks in the shallower parts of the river. Use a mid-range zoom to capture the castle ruins perfectly framed by the overhanging river woodland.", parking: "NE65 0UJ", best_time: "Golden Hour", top_tip: "The light filtering through the trees in the late afternoon provides beautiful, dappled illumination on the river.", history: "The path follows the River Coquet, a vital waterway that historically protected Warkworth Castle." },
            { id: 74, name: "The Alnwick Garden", type: "Landscape", lat: 55.4140, lng: -1.6980, accessible: true, fee: "Entry fee applies. Pay & Display parking.", desc: "World-class garden design with spectacular water features. Highly accessible with smooth paths. Capture the Grand Cascade, the geometric Ornamental Garden, and the beautiful Cherry Orchard in spring.\n\nCOMPOSITION & GEAR: A wide-angle lens is fantastic for the Grand Cascade. Try using a slower shutter speed (around 1/4 second) to capture the elegant flow of the water features without blurring them completely.", parking: "NE66 1YU", best_time: "Spring/Summer", top_tip: "The Cherry Orchard is briefly but spectacularly in bloom during late April/early May.", history: "A contemporary garden created by the Duchess of Northumberland, featuring the infamous 'Poison Garden'." },
            { id: 75, name: "Wallington Hall Walled Garden", type: "Landscape", lat: 55.1520, lng: -1.9560, accessible: true, fee: "National Trust entry fee (includes parking).", desc: "Pristine historic gardens and architecture. The main courtyard, house exterior, and the stunning Walled Garden feature hard, accessible paths perfect for shooting floral macros and landscape architecture.\n\nCOMPOSITION & GEAR: A macro lens is essential for the Walled Garden to capture the intricate details of the bees and vibrant historic flower varieties. Overcast days provide the best soft lighting for floral portraits.", parking: "NE61 4AR", best_time: "Summer", top_tip: "The hidden conservatory inside the walled garden is full of beautiful, exotic plants and lovely diffused light.", history: "A magnificent estate given to the National Trust. It was home to the unconventional Trevelyan family." },
            { id: 76, name: "Kielder Dam", type: "Landscape", lat: 55.1860, lng: -2.4430, accessible: true, fee: "Free entry. Pay & Display parking.", desc: "Massive scale and perfect water reflections. A flat, paved road runs right across the top of the dam. Photograph the vast expanse of Kielder Water on one side and the deep valley on the other.\n\nCOMPOSITION & GEAR: Use an ultra-wide lens to capture the sweeping curve of the dam structure. At sunset, shoot facing west over the reservoir to capture the sky reflecting on the massive body of water.", parking: "NE48 1EP", best_time: "Sunrise/Sunset", top_tip: "It can be extremely windy on top of the dam; hold your camera steady or use a heavy tripod.", history: "The dam holds back Europe's largest man-made lake, a massive feat of 1980s engineering." },
            { id: 77, name: "Tower Knowe", type: "Landscape", lat: 55.1890, lng: -2.4860, accessible: true, fee: "Free entry. Pay & Display parking.", desc: "Panoramic views of the reservoir. The visitor centre has a large, accessible viewing deck and hard paths. Perfect for shooting the sunset reflecting off the water.\n\nCOMPOSITION & GEAR: A perfect spot for sweeping panoramic shots. Mount your camera on a tripod and take a series of overlapping photos to stitch together later for a massive, high-resolution vista of Kielder Water.", parking: "NE48 1BT", best_time: "Sunset", top_tip: "The elevated deck provides a clear, unobstructed view over the trees, perfect for setting suns.", history: "The main visitor centre for Kielder Water, acting as the gateway to the vast forest park." },
            { id: 78, name: "The Sill", type: "Landscape", lat: 54.9980, lng: -2.3870, accessible: true, fee: "Free entry. Pay & Display parking.", desc: "Sweeping views of the Hadrian's Wall landscape. Features a fully accessible, paved Whin Sill grass roof. You can take a lift to the top and photograph the rugged Northumberland National Park landscape from a high vantage point.\n\nCOMPOSITION & GEAR: Use the modern, sweeping lines of the building's roof to lead the eye out towards the ancient Roman landscape in the distance. A fantastic blend of contemporary architecture and wild nature.", parking: "NE47 7AN", best_time: "Golden Hour", top_tip: "The roof is planted with local flora; use a macro lens to capture the tiny wildflowers against the backdrop of the hills.", history: "A modern National Landscape Discovery Centre, designed to mimic the geological features of the Whin Sill." },
            { id: 79, name: "Alnmouth Estuary View", type: "Landscape", lat: 55.3850, lng: -1.6100, accessible: true, fee: "Free entry. Free/Pay & Display parking.", desc: "Picture postcard village views. The paved road and bridge approaching the village offer a perfectly accessible, unobstructed view of the colourful houses curving along the estuary.\n\nCOMPOSITION & GEAR: Shoot from the bridge at high tide on a calm day to capture the vibrant, painted houses perfectly reflected in the estuarine waters. A standard 50mm lens is ideal to prevent the houses appearing too distant.", parking: "NE66 2RD", best_time: "High Tide", top_tip: "The view is best when the tide is fully in, filling the estuary bowl and creating a mirror effect.", history: "Once a major grain port, Alnmouth is now one of the most picturesque coastal villages in Northumberland." },
            { id: 80, name: "Warkworth Beach Dunes Path", type: "Landscape", lat: 55.3510, lng: -1.5890, accessible: true, fee: "Free entry. Free parking.", desc: "Golden hour light on the coastal grasses. A paved path leads from the car park right up to the edge of the dunes, providing a great vantage point to shoot the textured marram grass and the sea without having to navigate deep sand.\n\nCOMPOSITION & GEAR: Get your camera low to the paved path to use the tall, swaying dune grasses as an immediate foreground element. Shoot during sunset to backlight the grass, making it glow gold.", parking: "NE65 0SW", best_time: "Sunset", top_tip: "You don't need to struggle through the sand; the edge of the paved path offers fantastic, elevated coastal views.", history: "These pristine dunes form a vital natural barrier and ecosystem along the sweeping Northumberland coastline." },
            { id: 81, name: "Craster Harbour", type: "Landscape", lat: 55.4710, lng: -1.5930, accessible: true, fee: "Free entry. Pay & Display parking.", desc: "Rugged coastal geology and castle ruins. While the walk to the castle is bumpy, the harbour walls in Craster are paved and flat. You can get beautiful telephoto shots of Dunstanburgh Castle across the sweeping shoreline.\n\nCOMPOSITION & GEAR: Use a strong telephoto lens (200mm+) from the harbour wall to heavily compress the distance, making Dunstanburgh Castle loom large over the jagged shoreline in the background.", parking: "NE66 3TW", best_time: "Sunrise", top_tip: "The smell of smoking kippers from Robson's smokehouse fills the air here. The harbour itself is also very photogenic.", history: "Famous globally for Craster Kippers, this small fishing village retains its historic, rugged charm." },
            { id: 82, name: "Morpeth Carlisle Park", type: "Landscape", lat: 55.1660, lng: -1.6880, accessible: true, fee: "Free entry. Pay & Display/Disc parking.", desc: "Formal gardens and river reflections. Fully paved paths wind along the River Wansbeck and through the William Turner Garden. Great for floral photography and capturing the rowing boats on the river.\n\nCOMPOSITION & GEAR: A wonderful location for vibrant park photography. Use a polariser to cut glare from the river and intensely saturate the greens of the park and the colours of the formal flowerbeds.", parking: "NE61 1PR", best_time: "Spring", top_tip: "The William Turner garden is a hidden gem for macro floral photography, offering paved access to historic plant varieties.", history: "An award-winning park featuring a garden dedicated to William Turner, the 'Father of English Botany'." },
            { id: 83, name: "Kielder Castle Grounds", type: "Astro", lat: 55.2340, lng: -2.5810, accessible: true, fee: "Free entry. Pay & Display parking.", desc: "Astrophotography with a historic subject. The courtyards and immediate grounds around the visitor centre have firm, flat paths. It's a fantastic spot to practice light-painting the castle walls while capturing the star trails above.\n\nCOMPOSITION & GEAR: Frame the dark silhouette of the castle against the starry sky. Use a dim, warm-coloured LED torch to gently 'paint' the castle walls for 1-2 seconds during a long exposure to reveal its gothic architecture.", parking: "NE48 1ER", best_time: "Clear Nights", top_tip: "The sheltered courtyards block the wind, making it an excellent, accessible spot for steady, long-exposure star trails.", history: "Built in 1775 as a hunting lodge for the Duke of Northumberland, it now serves as the visitor centre for the forest." }
        ];

        // --- MATCHMAKER MODAL COMPONENT ---

            const questions = [

                    setResults([]);
                }
            }, [isOpen]);

            const calculateMatches = (finalAnswers) => {
                return LOCATIONS.map(loc => {
                    let score = 0;
                    const descLower = loc.desc.toLowerCase();
                    const nameLower = loc.name.toLowerCase();

                    // Q1 Subject
                    if (finalAnswers.subject === 'Wildlife' && loc.type === 'Wildlife') score += 100;
                    if (finalAnswers.subject === 'Dark Skies' && loc.type === 'Astro') score += 100;
                    if (finalAnswers.subject === 'Historical Architecture' && (nameLower.includes('castle') || nameLower.includes('abbey') || nameLower.includes('priory') || nameLower.includes('tower') || nameLower.includes('fort') || nameLower.includes('roman') || nameLower.includes('hall'))) score += 100;
                    if (finalAnswers.subject === 'Coastal Landscapes' && !descLower.includes('distant coastal') && (/\b(sea|coast|coastal|beach|bay|island|harbour|dunes?|cove|pier|promenade)\b/.test(descLower) || nameLower.includes('island') || nameLower.includes('bay') || nameLower.includes('beach') || nameLower.includes('point'))) score += 100;

                    // Q2 Walk
                    const isHike = descLower.includes('hike') || descLower.includes('climb') || descLower.includes('steep') || descLower.includes('trek');
                    if (finalAnswers.walk === 'Car park to tripod' && !isHike && (loc.parking || loc.accessible)) score += 5;
                    if (finalAnswers.walk === 'A brisk 2-mile loop' && (descLower.includes('walk') || descLower.includes('mile'))) score += 5;
                    if (finalAnswers.walk === 'Full day mountain trek' && isHike) score += 5;

                    // Q3 Time
                    const bt = loc.best_time?.toLowerCase() || '';
                    if (finalAnswers.time === 'Dawn Patrol' && bt.includes('sunrise')) score += 5;
                    if (finalAnswers.time === 'Midday Light' && (bt.includes('daytime') || bt.includes('mid-day') || bt.includes('overcast') || bt.includes('afternoon'))) score += 5;
                    if (finalAnswers.time === 'Golden Hour' && (bt.includes('sunset') || bt.includes('golden'))) score += 5;
                    if (finalAnswers.time === 'Deep Night' && (loc.type === 'Astro' || bt.includes('night') || bt.includes('astro'))) score += 5;

                    // Q4 Gear
                    if (finalAnswers.gear === 'Smartphone' && loc.type !== 'Wildlife' && loc.type !== 'Astro') score += 3;
                    if (finalAnswers.gear === 'Full Pro Kit & Tripod' && (descLower.includes('tripod') || descLower.includes('nd ') || descLower.includes('exposure'))) score += 5;
                    if (finalAnswers.gear === 'Lightweight Mirrorless') score += 2; 

                    score += Math.random();

                    return { ...loc, matchScore: score };
                }).sort((a, b) => b.matchScore - a.matchScore).slice(0, 3);
            };

            const handleAnswer = (qId, option) => {
                const newAnswers = { ...answers, [qId]: option };
                setAnswers(newAnswers);

                if (step < questions.length - 1) {
                    setStep(step + 1);
                } else {
                    setIsCalculating(true);
                    setStep(step + 1);
                    setTimeout(() => {
                        setResults(calculateMatches(newAnswers));
                        setIsCalculating(false);
                    }, 1200); 
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[3000] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in" onClick={onClose}>
                    <div className="bg-white rounded-3xl shadow-2xl overflow-hidden w-full max-w-lg flex flex-col relative" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center justify-between p-5 border-b border-slate-100 bg-slate-50">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-br from-sky-400 to-indigo-500 text-white p-2.5 rounded-xl shadow-sm">
                                    <Icon name="sparkles" size={20} />
                                </div>
                                <h3 className="font-black text-lg text-slate-800 leading-none">Location Matchmaker</h3>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full transition-colors text-slate-500 hover:text-slate-900">
                                <Icon name="x" size={20} />
                            </button>
                        </div>

                        {step < questions.length && (
                            <div className="h-1.5 bg-slate-100 w-full">
                                <div className="h-full bg-sky-500 transition-all duration-300" style={{ width: `${((step) / questions.length) * 100}%` }}></div>
                            </div>
                        )}

                        <div className="p-6 md:p-8">
                            {step < questions.length ? (
                                <div className="animate-in fade-in duration-300">
                                    <span className="text-xs font-black uppercase tracking-widest text-sky-500 mb-2 block">Question {step + 1} of {questions.length}</span>
                                    <h2 className="text-2xl font-black text-slate-800 mb-6">{questions[step].text}</h2>
                                    <div className="space-y-3">
                                        {questions[step].options.map(opt => (
                                            <button 
                                                key={opt}
                                                onClick={() => handleAnswer(questions[step].id, opt)}
                                                className="w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-sky-500 hover:bg-sky-50 transition-all font-bold text-slate-700 flex items-center justify-between group"
                                            >
                                                {opt}
                                                <Icon name="arrowRight" size={16} className="text-sky-500 opacity-0 group-hover:opacity-100 transform -translate-x-2 group-hover:translate-x-0 transition-all" />
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ) : isCalculating ? (
                                <div className="flex flex-col items-center justify-center py-12 text-center animate-in fade-in">
                                    <div className="w-16 h-16 border-4 border-slate-100 border-t-sky-500 rounded-full animate-spin mb-6"></div>
                                    <h2 className="text-xl font-black text-slate-800">Analyzing your answers...</h2>
                                    <p className="text-slate-500 mt-2 font-medium">Finding the perfect Northumberland spots for you.</p>
                                </div>
                            ) : (
                                <div className="animate-in fade-in">
                                    <div className="text-center mb-6">
                                        <span className="inline-block bg-sky-100 text-sky-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-2">Results</span>
                                        <h2 className="text-2xl font-black text-slate-800">Your Top 3 Matches</h2>
                                    </div>
                                    <div className="space-y-4 mb-8">
                                        {results.map((loc, idx) => (
                                            <div key={loc.id} onClick={() => onSelectLocation(loc)} className="p-4 rounded-xl border border-slate-200 bg-slate-50 hover:border-sky-500 hover:shadow-md transition-all cursor-pointer flex gap-4 items-center group">
                                                <div className="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center font-black text-slate-500 group-hover:bg-sky-500 group-hover:text-white transition-colors flex-shrink-0">
                                                    #{idx + 1}
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    <h4 className="font-black text-slate-800 truncate">{loc.name}</h4>
                                                    <p className="text-xs text-slate-500 font-medium truncate">{loc.type} • {loc.best_time}</p>
                                                </div>
                                                <Icon name="arrowRight" size={16} className="text-slate-400 group-hover:text-sky-500 transition-colors" />
                                            </div>
                                        ))}
                                    </div>
                                    <div className="bg-gradient-to-r from-sky-500 to-indigo-600 p-5 rounded-2xl text-center shadow-lg">
                                        <h4 className="text-white font-black mb-1">Want to master these locations?</h4>
                                        <p className="text-sky-100 text-xs mb-4 font-medium">Join my next Photography Workshop to elevate your skills.</p>
                                        <a href="workshops.html" className="inline-block bg-white text-sky-600 px-6 py-2.5 rounded-full text-xs font-black uppercase tracking-widest hover:bg-slate-50 transition-colors">
                                            View Workshops
                                        </a>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };


        // --- COMPONENTS ---
        const Navbar = () => {
            const [isOpen, setIsOpen] = useState(false);

            const toggleMenu = () => setIsOpen(!isOpen);

            const links = [
                { name: 'Home', url: 'index.html', active: false },
                { name: 'Tutorials', url: 'tutorials.html', active: false },
                { name: 'Explore', url: 'explore.html', active: true },
                { name: 'Weather', url: 'weather.html', active: false },
                { name: 'Routes', url: 'routes.html', active: false },
                { name: 'Calendar', url: 'Calendar.html', active: false },
                { name: 'Ethics', url: 'ethics.html', active: false },
                { name: 'Workshops', url: 'workshops.html', active: false }

            return (
                <nav className="fixed top-0 w-full z-[1000] bg-white/90 backdrop-blur-md border-b border-slate-100 shadow-sm transition-all duration-300 pt-[env(safe-area-inset-top)]">

                        <div className="flex items-center space-x-3 cursor-pointer" onClick={() => window.location.href='index.html'}>
                            <div className="w-8 h-8 md:w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center shadow-md">
                                <Icon name="camera" className="text-white" size={16} />
                            </div>
                            <span className="font-black text-lg md:text-xl tracking-tighter uppercase hidden sm:inline">NorthernPixl</span>
                        </div>
                        
                        <div className="hidden lg:flex space-x-10 text-[11px] font-black uppercase tracking-widest text-slate-400">
                            {links.map((link) => (
                                <a key={link.name} href={link.url} className={link.active ? "text-slate-900 border-b-2 border-slate-900 pb-1" : "hover:text-slate-900 transition-colors"}>
                                    {link.name}
                                </a>
                            ))}
                        </div>

                        <div className="lg:hidden">
                            <button onClick={toggleMenu} className="p-2 text-slate-900 focus:outline-none">
                                <Icon name={isOpen ? "x" : "menu"} size={24} />
                            </button>
                        </div>
                    </div>

                    {isOpen && (
                        <div className="lg:hidden bg-white border-b border-slate-100 absolute w-full left-0 top-full shadow-xl fade-in">
                            <div className="flex flex-col p-6 space-y-6">
                                {links.map((link) => (
                                    <a key={link.name} href={link.url} className={`text-sm font-black uppercase tracking-widest ${link.active ? "text-slate-900" : "text-slate-400"}`}>
                                        {link.name}
                                    </a>
                                ))}
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        const App = () => {
            const [selectedLoc, setSelectedLoc] = useState(() => {
                if (typeof window !== 'undefined') {
                    const params = new URLSearchParams(window.location.search);
                    const idParam = params.get('id');
                    const locParam = params.get('loc');
                    
                    if (idParam) {
                        return LOCATIONS.find(l => l.id === parseInt(idParam, 10)) || null;
                    }
                    if (locParam) {
                        return LOCATIONS.find(l => {
                            const slug = l.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
                            return slug.includes(locParam) || locParam.includes(slug.split('-')[0]);
                        }) || null;
                    }
                }
                return null;
            });
            const [isLocating, setIsLocating] = useState(false);
            const [showQuiz, setShowQuiz] = useState(false);
            const [showAccessibleOnly, setShowAccessibleOnly] = useState(false);
            
            const mapContainerRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const userMarkerRef = useRef(null);
            const allMarkersRef = useRef([]);

            useEffect(() => {
                const onPopState = () => {
                    setSelectedLoc(null);
                };
                window.addEventListener('popstate', onPopState);
                return () => window.removeEventListener('popstate', onPopState);
            }, []);

            // Exit Intent logic
            useEffect(() => {
                const handleMouseLeave = (e) => {
                    if (e.clientY <= 0 && !sessionStorage.getItem('quizShown')) {
                        setShowQuiz(true);
                        sessionStorage.setItem('quizShown', 'true');
                    }
                };
                document.addEventListener('mouseleave', handleMouseLeave);
                return () => document.removeEventListener('mouseleave', handleMouseLeave);
            }, []);

            // Map Initialization
            useEffect(() => {
                const timer = setTimeout(() => {
                    if (mapContainerRef.current && !mapInstanceRef.current) {
                        const map = L.map(mapContainerRef.current, { zoomControl: false }).setView([55.35, -2.0], 9);
                        mapInstanceRef.current = map;
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                            attribution: '&copy; OpenStreetMap, &copy; CARTO'
                        }).addTo(map);
                        
                        LOCATIONS.forEach(loc => {
                            const marker = L.circleMarker([loc.lat, loc.lng], { 
                                radius: 8, 
                                fillColor: loc.accessible ? '#10b981' : '#0ea5e9', // Green for accessible, Blue for standard
                                color: "#fff", 
                                weight: 3, 
                                fillOpacity: 1 
                            }).addTo(map);
                            
                            marker.on('click', () => {
                                setSelectedLoc(loc);
                                window.history.pushState({}, "");
                            });
                            
                            allMarkersRef.current.push({ marker, loc });
                        });
                        
                        if (selectedLoc) {
                            const isDesktop = window.innerWidth >= 768;
                            const targetZoom = 14;
                            const targetPoint = map.project([selectedLoc.lat, selectedLoc.lng], targetZoom);
                            
                            const offsetX = isDesktop ? -200 : 0;
                            const offsetY = isDesktop ? 0 : 200;
                            
                            const offsetPoint = L.point(targetPoint.x + offsetX, targetPoint.y + offsetY);
                            const offsetLatLng = map.unproject(offsetPoint, targetZoom);

                            map.setView(offsetLatLng, targetZoom);
                            
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }
                    }
                }, 100);

                return () => {
                    clearTimeout(timer);
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.remove();
                        mapInstanceRef.current = null;
                    }
                };
            // eslint-disable-next-line react-hooks/exhaustive-deps
            }, []);

            // Handle Accessible Filter Toggle
            useEffect(() => {
                if (!mapInstanceRef.current) return;
                
                allMarkersRef.current.forEach(({ marker, loc }) => {
                    if (showAccessibleOnly && !loc.accessible) {
                        mapInstanceRef.current.removeLayer(marker);
                    } else {
                        if (!mapInstanceRef.current.hasLayer(marker)) {
                            marker.addTo(mapInstanceRef.current);
                        }
                    }
                });
            }, [showAccessibleOnly]);

            // Intelligent Map Centering
            useEffect(() => {
                if (mapInstanceRef.current) {
                    if (selectedLoc) {
                        const map = mapInstanceRef.current;
                        const isDesktop = window.innerWidth >= 768;
                        const targetZoom = 14;
                        
                        const targetPoint = map.project([selectedLoc.lat, selectedLoc.lng], targetZoom);
                        const offsetX = isDesktop ? -200 : 0;
                        const offsetY = isDesktop ? 0 : 200;
                        
                        const offsetPoint = L.point(targetPoint.x + offsetX, targetPoint.y + offsetY);
                        const offsetLatLng = map.unproject(offsetPoint, targetZoom);

                        map.flyTo(offsetLatLng, targetZoom, { duration: 1.2 });
                    } else {
                        mapInstanceRef.current.flyTo([55.35, -2.0], 9, { duration: 1.2 });
                    }
                }
            }, [selectedLoc]);

            const handleLocateMe = () => {
                if (!mapInstanceRef.current || isLocating) return;
                setIsLocating(true);
                
                mapInstanceRef.current.locate({ setView: true, maxZoom: 12 });
                
                mapInstanceRef.current.once('locationfound', (e) => {
                    setIsLocating(false);
                    if (userMarkerRef.current) {
                        userMarkerRef.current.setLatLng(e.latlng);
                    } else {
                        userMarkerRef.current = L.circleMarker(e.latlng, { 
                            radius: 8, 
                            fillColor: '#ef4444', 
                            color: '#ffffff', 
                            weight: 3, 
                            fillOpacity: 1 
                        }).addTo(mapInstanceRef.current).bindTooltip("You are here", { permanent: false, direction: 'top' });
                    }
                });
                
                mapInstanceRef.current.once('locationerror', (e) => {
                    setIsLocating(false);
                    console.warn("Location access denied or unavailable.");
                });
            };

            const handleQuizSelect = (loc) => {
                setSelectedLoc(loc);
                setShowQuiz(false);
                window.history.pushState({}, "");
            };

            return (
                <div className="fixed inset-0 bg-slate-50 overflow-hidden">
                    <Navbar />
                    
                    <MatchmakerModal 
                        isOpen={showQuiz} 
                        onClose={() => setShowQuiz(false)} 
                        onSelectLocation={handleQuizSelect}
                    />

                    <main className="absolute top-20 bottom-0 left-0 right-0">
                        <h1 className="sr-only">Northumberland Photography Locations Map - Accessible & Zero Hike Spots</h1>
                        
                        {/* Full Bleed Map Layer */}
                        <div className="absolute inset-0 z-0">
                            <div ref={mapContainerRef} className="w-full h-full"></div>
                        </div>

                        {/* Floating "Select a location" hint */}
                        <div className={`absolute top-6 left-1/2 -translate-x-1/2 z-[400] transition-all duration-500 pointer-events-none ${selectedLoc ? 'opacity-0 -translate-y-4' : 'opacity-100 translate-y-0'}`}>
                            <div className="bg-white/95 backdrop-blur-md px-5 py-2.5 rounded-full shadow-lg border border-slate-200 flex items-center gap-3">
                                <Icon name="mapPin" size={16} className="text-sky-500" />
                                <span className="text-[10px] md:text-xs font-bold uppercase tracking-widest text-slate-700">Select a location</span>
                            </div>
                        </div>

                        {/* Map Overlay Buttons wrapper */}
                        <div className={`absolute top-6 left-4 md:left-6 z-[400] flex flex-col gap-3 transition-all duration-500 pointer-events-auto ${selectedLoc ? 'opacity-0 -translate-y-4 pointer-events-none' : 'opacity-100 translate-y-0'}`}>
                            {/* Help Me Choose / Quiz Button */}
                            <button 
                                onClick={() => setShowQuiz(true)}
                                className="bg-white px-4 py-2.5 md:px-5 md:py-3 rounded-full shadow-lg border border-slate-200 transition-all duration-500 focus:outline-none flex items-center justify-center gap-2 hover:scale-105 text-slate-700 hover:text-sky-500"
                                title="Help me choose!"
                            >
                                <Icon name="sparkles" size={20} className="text-sky-500" />
                                <span className="text-[10px] md:text-xs font-bold uppercase tracking-widest">Help me choose</span>
                            </button>

                            {/* Accessible Filter Toggle */}
                            <button 
                                onClick={() => setShowAccessibleOnly(!showAccessibleOnly)}
                                className={`bg-white px-4 py-2.5 md:px-5 md:py-3 rounded-full shadow-lg border transition-all duration-500 focus:outline-none flex items-center justify-center gap-2 hover:scale-105 ${showAccessibleOnly ? 'border-emerald-500 text-emerald-600 bg-emerald-50' : 'border-slate-200 text-slate-700 hover:text-emerald-500'}`}
                                title="Toggle Accessible Locations"
                            >
                                <Icon name="wheelchair" size={20} className={showAccessibleOnly ? "text-emerald-500" : ""} />
                                <span className="text-[10px] md:text-xs font-bold uppercase tracking-widest">Accessible Only</span>
                            </button>
                        </div>

                        {/* Dynamic Locate Me Button */}
                        <button 
                            onClick={handleLocateMe}
                            disabled={isLocating}
                            className={`absolute right-4 md:right-6 z-[400] bg-white p-3.5 rounded-full shadow-xl border border-slate-200 transition-all duration-500 focus:outline-none flex items-center justify-center 
                                ${selectedLoc ? 'bottom-[calc(75vh+1rem)] md:bottom-6' : 'bottom-6 md:bottom-6'}
                                ${isLocating ? 'text-sky-500 opacity-80' : 'text-slate-700 hover:text-sky-500 hover:scale-105'}`}
                            title="Locate Me"
                        >
                            <Icon name="locate" size={24} className={isLocating ? 'animate-pulse' : ''} />
                        </button>

                        {/* Smart Overlay Panel */}
                        <div className={`absolute z-[500] pointer-events-auto bg-white/95 backdrop-blur-2xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] md:shadow-2xl transition-all duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] flex flex-col
                            ${selectedLoc ? 'translate-y-0 md:translate-x-0 opacity-100' : 'translate-y-full md:translate-y-0 md:-translate-x-[120%] opacity-0 md:opacity-100'}
                            bottom-0 left-0 right-0 h-[75vh] md:h-auto md:top-6 md:bottom-6 md:left-6 md:right-auto md:w-[420px] lg:w-[480px] md:rounded-3xl rounded-t-[2.5rem] border border-slate-200 overflow-hidden`}
                        >
                            {selectedLoc && (
                                <>
                                    {/* Mobile drag handle */}
                                    <div className="w-full flex justify-center pt-4 pb-2 md:hidden absolute top-0 left-0 bg-white/50 backdrop-blur-md z-20">
                                        <div className="w-12 h-1.5 bg-slate-300/80 rounded-full"></div>
                                    </div>

                                    {/* Floating Close Button (Desktop) */}
                                    <button onClick={() => setSelectedLoc(null)} className="absolute top-4 md:top-6 right-4 md:right-6 z-20 p-2.5 bg-white/80 backdrop-blur-md border border-slate-200 hover:bg-slate-100 text-slate-700 rounded-full transition-all shadow-sm hover:scale-105 hidden md:flex">
                                        <Icon name="x" size={20} />
                                    </button>

                                    <div className="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-8 pt-10 md:pt-8 relative z-10">
                                        {/* Top Back to Map Button */}
                                        <button onClick={() => setSelectedLoc(null)} className="flex items-center text-slate-500 hover:text-slate-900 font-bold text-[11px] md:text-xs uppercase tracking-widest mb-5 p-2 -ml-2 transition-colors bg-slate-100/50 rounded-lg pr-4 w-fit">
                                            <Icon name="arrowLeft" size={14} className="mr-2" /> Back to Map
                                        </button>

                                        <div className="flex flex-wrap gap-2 mb-3">
                                            <span className="text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-lg bg-sky-500 text-white shadow-sm">{selectedLoc.type}</span>
                                            {selectedLoc.accessible && (
                                                <span className="text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-lg bg-emerald-500 text-white shadow-sm flex items-center">
                                                    <Icon name="wheelchair" size={12} className="mr-1.5" /> Accessible
                                                </span>
                                            )}
                                        </div>
                                        
                                        <h3 className="text-3xl md:text-4xl font-black leading-tight mb-3 pr-8">{selectedLoc.name}</h3>
                                        <p className="text-sm text-slate-500 leading-relaxed mb-6">{selectedLoc.history}</p>
                                        
                                        <div className="space-y-6">
                                            <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                                <p className="text-[9px] font-black uppercase text-slate-400 mb-2">General Advice</p>
                                                <p className="text-sm font-bold whitespace-pre-line text-slate-700 leading-relaxed">{selectedLoc.desc}</p>
                                            </div>
                                            
                                            {selectedLoc.top_tip && (
                                                <div className="bg-sky-50 p-5 rounded-2xl border border-sky-100">
                                                    <p className="text-[9px] font-black uppercase text-sky-500 mb-2">Top Tip</p>
                                                    <p className="text-sm font-bold text-sky-900 leading-relaxed">{selectedLoc.top_tip}</p>
                                                </div>
                                            )}
                                            
                                            <div className="flex flex-col gap-2 pt-2">
                                                {selectedLoc.fee && (
                                                    <p className="text-[11px] font-bold text-slate-500 flex items-center">
                                                        <span className="text-slate-400 w-24 shrink-0">ENTRY/PARKING:</span> 
                                                        <span className="text-slate-800">{selectedLoc.fee}</span>
                                                    </p>
                                                )}
                                                <p className="text-[11px] font-bold text-slate-500 flex items-center">
                                                    <span className="text-slate-400 w-24 shrink-0">PARKING LOC:</span> 
                                                    <span className="text-slate-800">{selectedLoc.parking}</span>
                                                </p>
                                                {selectedLoc.best_time && (
                                                    <p className="text-[11px] font-bold text-sky-600 flex items-center">
                                                        <span className="text-sky-500 w-24 shrink-0">BEST TIME:</span> 
                                                        <span>{selectedLoc.best_time}</span>
                                                    </p>
                                                )}
                                            </div>
                                            
                                            {/* Link to Weather Page */}
                                            <div className="mt-6">
                                                <a href={`weather.html?lat=${selectedLoc.lat}&lng=${selectedLoc.lng}`} className="w-full bg-sky-50 text-sky-600 border border-sky-100 font-bold text-xs uppercase tracking-widest py-3.5 px-6 rounded-xl hover:bg-sky-100 hover:border-sky-200 transition-colors shadow-sm flex items-center justify-center group">
                                                    <Icon name="cloudSun" size={16} className="mr-2 group-hover:scale-110 transition-transform" /> Live Weather & Astro
                                                </a>
                                            </div>
                                            
                                            {/* Bottom Back to Map Button */}
                                            <div className="mt-8 mb-4 border-t border-slate-100 pt-6">
                                                <button onClick={() => setSelectedLoc(null)} className="w-full bg-slate-900 text-white font-bold text-xs uppercase tracking-widest py-4 px-6 rounded-xl hover:bg-slate-800 transition-colors shadow-lg flex items-center justify-center group">
                                                    <Icon name="arrowLeft" size={16} className="mr-3 group-hover:-translate-x-1 transition-transform" /> Back to Map
                                                </button>
                                            </div>

                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script data-goatcounter="https://northernpixl.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
