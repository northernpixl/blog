        // --- DATA PROCESSING UTILITY ---
        const buildSolarBuckets = (mag, plasma) => {
            const now = Date.now();
            const buckets = [];
            // Create 9 boundary points for 8 contiguous 15-minute segments (2 hours total)
            for (let i = 8; i >= 0; i--) { 
                buckets.push({
                    time: now - i * 15 * 60000,
                    bz: [], speed: [], density: []
                });
            }

            const assignToBucket = (t, val, key) => {
                if (val === null || isNaN(val)) return;
                const timeDiffs = buckets.map(b => Math.abs(b.time - t));
                const minDiff = Math.min(...timeDiffs);
                // Assign to bucket if the time is within 7.5 minutes of the bucket's center
                if (minDiff <= 7.5 * 60000) {
                    const idx = timeDiffs.indexOf(minDiff);
                    buckets[idx][key].push(val);
                }
            };

            const parseTime = (tStr) => {
                if (!tStr) return null;
                let s = String(tStr);
                // Ensure SWPC dates are treated as strict UTC by formatting to ISO 8601 with Z
                if (s.includes(' ') && !s.includes('T')) s = s.replace(' ', 'T');
                if (!s.endsWith('Z')) s += 'Z';
                return new Date(s).getTime();
            };

            if (Array.isArray(mag)) {
                for (let i = 1; i < mag.length; i++) {
                    const row = mag[i];
                    let tStr, bz;
                    if (Array.isArray(row)) { tStr = row[0]; bz = parseFloat(row[3]); }
                    else { tStr = row.time_tag || row.time; bz = parseFloat(row.bz_gsm || row.bz); }
                    const t = parseTime(tStr);
                    if(t) assignToBucket(t, bz, 'bz');
                }
            }

            if (Array.isArray(plasma)) {
                for (let i = 1; i < plasma.length; i++) {
                    const row = plasma[i];
                    let tStr, d, s;
                    if (Array.isArray(row)) { tStr = row[0]; d = parseFloat(row[1]); s = parseFloat(row[2]); }
                    else { tStr = row.time_tag || row.time; d = parseFloat(row.density || row.proton_density); s = parseFloat(row.speed || row.proton_speed); }
                    const t = parseTime(tStr);
                    if(t) { assignToBucket(t, d, 'density'); assignToBucket(t, s, 'speed'); }
                }
            }

            // Forward-fill missing gaps in buckets to keep lines continuous
            let lastBz = null, lastSpeed = null, lastDensity = null;

            return buckets.map(b => {
                let bzVal = b.bz.length ? b.bz.reduce((a,c)=>a+c,0)/b.bz.length : lastBz;
                let speedVal = b.speed.length ? b.speed.reduce((a,c)=>a+c,0)/b.speed.length : lastSpeed;
                let densityVal = b.density.length ? b.density.reduce((a,c)=>a+c,0)/b.density.length : lastDensity;
                
                if (bzVal !== null) lastBz = bzVal;
                if (speedVal !== null) lastSpeed = speedVal;
                if (densityVal !== null) lastDensity = densityVal;

                return {
                    timeLabel: new Date(b.time).toLocaleTimeString('en-GB', { timeZone: 'Europe/London', hour: '2-digit', minute: '2-digit' }),
                    bz: bzVal,
                    speed: speedVal,
                    density: densityVal,
                };
            });
        };

                for (let r = 0; r < rows.length; r++) {

                        const isHeader = cell.tagName === 'TH' || r < 2; 
                        
                        for (let rr = 0; rr < rowspan; rr++) {
                            if (!grid[r + rr]) grid[r + rr] = [];
                            for (let cc = 0; cc < colspan; cc++) {
                                grid[r + rr][c + cc] = { text, isHeader };
                            }
                        }
                    }
                }
                return grid;
            };

            useEffect(() => {
                let isMounted = true;
                
                const fetchCrossing = async () => {
                    try {
                        const targetUrl = 'https://holyislandcrossingtimes.northumberland.gov.uk/';
                        let htmlText = '';
                        const proxies = [
                            `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`,
                            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
                            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
                        ];

                        for (const proxy of proxies) {
                            try {
                                const res = await fetch(proxy);
                                if (!res.ok) continue;
                                if (proxy.includes('allorigins')) {
                                    const data = await res.json();
                                    htmlText = data.contents;
                                } else {
                                    htmlText = await res.text();
                                }
                                if (htmlText && htmlText.toLowerCase().includes('crossing')) break; 
                            } catch (e) { continue; }
                        }
                        
                        if (!htmlText || !htmlText.toLowerCase().includes('crossing')) throw new Error("Could not retrieve valid HTML.");
                        const doc = new DOMParser().parseFromString(htmlText, 'text/html');
                        const tables = Array.from(doc.querySelectorAll('table'));
                        const crossingTable = tables.find(t => t.textContent.toLowerCase().includes('safe'));
                        if (!crossingTable) throw new Error("No crossing table found.");

                        const grid = parseTableToGrid(crossingTable);
                        const numCols = grid[0] ? grid[0].length : 0;
                        const colTypes = [];
                        
                        for (let c = 0; c < numCols; c++) {
                            let headerText = "";
                            for (let r = 0; r < grid.length; r++) {
                                if (grid[r][c] && grid[r][c].isHeader) headerText += grid[r][c].text + " ";
                            }
                            if (headerText.includes('unsafe') || headerText.includes('do not cross')) colTypes[c] = 'unsafe';
                            else if (headerText.includes('safe')) colTypes[c] = 'safe';
                            else colTypes[c] = 'other';
                        }

                        const today = new Date(); today.setHours(0,0,0,0);
                        const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
                        const tmrw = new Date(today); tmrw.setDate(tmrw.getDate() + 1);
                        const dayAfter = new Date(today); dayAfter.setDate(dayAfter.getDate() + 2);
                        const targetDates = [yesterday, today, tmrw, dayAfter];
                        const allSafePeriods = [];

                        const getRowForDate = (dateObj) => {
                            const dNum = dateObj.getDate();
                            const dayRegex = new RegExp(`\\b0?${dNum}(?:st|nd|rd|th)?\\b`, 'i');
                            for (let r = 0; r < grid.length; r++) {
                                if (grid[r][0] && grid[r][0].isHeader) continue;
                                let rowDateText = "";
                                for (let c = 0; c < grid[r].length; c++) {
                                    if (colTypes[c] === 'other' && grid[r][c]) rowDateText += grid[r][c].text + " ";
                                }
                                if (dayRegex.test(rowDateText)) return r;
                            }
                            return -1;
                        };

                        for (const tDate of targetDates) {
                            const rIdx = getRowForDate(tDate);
                            if (rIdx === -1) continue;
                            let cursorDate = new Date(tDate); cursorDate.setHours(0,0,0,0);
                            let lastTimeMins = -1;

                            for (let c = 0; c < grid[rIdx].length; c++) {
                                if (colTypes[c] === 'safe' || colTypes[c] === 'unsafe') {
                                    const cellText = grid[rIdx][c] ? grid[rIdx][c].text : "";
                                    const matches = cellText.match(/\b\d{1,2}[:.]\d{2}\b/g);
                                    if (!matches) continue;

                                    const cellDates = [];
                                    for (const m of matches) {
                                        const parts = m.split(/[:.]/);
                                        const h = parseInt(parts[0], 10);
                                        const min = parseInt(parts[1], 10);
                                        const timeMins = h * 60 + min;

                                        if (timeMins < lastTimeMins - 120) cursorDate.setDate(cursorDate.getDate() + 1);
                                        
                                        const absDate = new Date(cursorDate);
                                        absDate.setHours(h, min, 0, 0);
                                        cellDates.push(absDate.getTime());
                                        lastTimeMins = timeMins;
                                    }

                                    if (colTypes[c] === 'safe') {
                                        const validLength = cellDates.length - (cellDates.length % 2);
                                        for (let i = 0; i < validLength; i += 2) allSafePeriods.push({ start: cellDates[i], end: cellDates[i+1] });
                                    }
                                }
                            }
                        }

                        allSafePeriods.sort((a, b) => a.start - b.start);
                        const mergedSafePeriods = [];
                        for (const sp of allSafePeriods) {
                            if (mergedSafePeriods.length === 0) mergedSafePeriods.push({...sp});
                            else {
                                const last = mergedSafePeriods[mergedSafePeriods.length - 1];
                                if (sp.start <= last.end) last.end = Math.max(last.end, sp.end);
                                else mergedSafePeriods.push({...sp});
                            }
                        }

                        const buildDaySchedule = (targetDate, mergedPeriods) => {
                            const dayStart = new Date(targetDate); dayStart.setHours(0, 0, 0, 0);
                            const dayEnd = new Date(targetDate); dayEnd.setHours(23, 59, 59, 999);
                            const formatTime = (d) => d.toLocaleTimeString('en-GB', {timeZone: 'Europe/London', hour: '2-digit', minute:'2-digit', hour12: false});
                            const periods = [];
                            let current = dayStart.getTime();

                            for (const sp of mergedPeriods) {
                                if (sp.end <= current) continue;
                                if (sp.start >= dayEnd.getTime()) break;
                                const safeStart = Math.max(sp.start, current);
                                const safeEnd = Math.min(sp.end, dayEnd.getTime());

                                if (safeStart > current) {
                                    periods.push({ type: 'unsafe', label: 'Unsafe (Do Not Cross)', start: formatTime(new Date(current)), end: formatTime(new Date(safeStart)) });
                                }
                                periods.push({ type: 'safe', label: 'Safe to cross', start: formatTime(new Date(safeStart)), end: formatTime(new Date(safeEnd)) });
                                current = safeEnd;
                            }

                            if (current < dayEnd.getTime() - 60000) {
                                periods.push({ type: 'unsafe', label: 'Unsafe (Do Not Cross)', start: formatTime(new Date(current)), end: '23:59' });
                            }
                            periods.forEach(p => {
                                if(p.end === '24:00' || p.end === '00:00') p.end = '23:59';
                                if(p.start === '24:00') p.start = '00:00';
                            });

                            const cleanPeriods = periods.filter(p => p.start !== p.end);
                            const dateStr = targetDate.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' });
                            return cleanPeriods.length > 0 ? { date: dateStr, periods: cleanPeriods } : null;
                        };

                        const finalSchedule = [];
                        const todayData = buildDaySchedule(today, mergedSafePeriods);
                        if (todayData) { todayData.date = `Today - ${todayData.date}`; finalSchedule.push(todayData); }
                        const tmrwData = buildDaySchedule(tmrw, mergedSafePeriods);
                        if (tmrwData) { tmrwData.date = `Tomorrow - ${tmrwData.date}`; finalSchedule.push(tmrwData); }
                        
                        if (finalSchedule.length > 0 && mergedSafePeriods.length > 0) {
                            if (isMounted) setCrossingSchedule(finalSchedule);
                        } else throw new Error("Could not process schedule pairs");
                    } catch (err) {
                        console.warn("Holy Island Scrape Error:", err.message);
                        if (isMounted) setError(true);
                    } finally {
                        if (isMounted) setLoading(false);
                    }
                };
                fetchCrossing();
                return () => { isMounted = false; };
            }, []);

            return (
                <div className="bg-slate-50 border border-slate-200 shadow-sm p-4 md:p-5 rounded-2xl flex flex-col relative overflow-hidden mt-4">
                    <div className="flex items-center text-slate-800 mb-4 z-10 justify-between">
                        <div className="flex items-center">
                            <Icon name="alertTriangle" size={18} className="mr-2 text-amber-500" />
                            <span className="text-[10px] md:text-xs font-black uppercase tracking-widest">Causeway Crossing Times</span>
                        </div>
                    </div>
                    {loading ? (
                        <div className="animate-pulse flex flex-col gap-3">
                            <div className="h-16 bg-slate-200 rounded-xl w-full"></div>
                            <div className="h-16 bg-slate-200 rounded-xl w-full"></div>
                        </div>
                    ) : error || crossingSchedule.length === 0 ? (
                        <div className="text-sm text-red-800 bg-red-50 p-4 border border-red-100 rounded-xl">
                            <p className="mb-4 font-medium">Unable to load safe crossing times automatically. Do not guess crossing times!</p>
                            <a href="https://holyislandcrossingtimes.northumberland.gov.uk/" target="_blank" rel="noopener noreferrer" className="block bg-red-600 text-white text-xs font-bold uppercase tracking-widest py-3 px-4 rounded-xl text-center hover:bg-red-700 transition-colors shadow-md">
                                Check Official Times
                            </a>
                        </div>
                    ) : (
                        <div className="flex flex-col gap-4">
                            {crossingSchedule.map((day, idx) => (
                                <div key={idx} className="bg-white rounded-xl border border-slate-100 overflow-hidden shadow-sm">
                                    <div className="bg-slate-100/50 py-2 px-4 border-b border-slate-100">
                                        <span className="font-bold text-slate-800 text-xs uppercase tracking-wider">{day.date}</span>
                                    </div>
                                    <div className="flex flex-col">
                                        {day.periods.map((p, i) => (
                                            <div key={i} className={`flex justify-between items-center px-4 py-2 border-b last:border-0 ${p.type === 'safe' ? 'bg-emerald-50 text-emerald-800 border-emerald-100' : 'bg-red-50 text-red-800 border-red-100'}`}>
                                                <div className="flex items-center w-1/3 min-w-[120px]">
                                                    {p.type === 'safe' ? <Icon name="checkCircle" size={14} className="mr-2 text-emerald-600 shrink-0"/> : <Icon name="xCircle" size={14} className="mr-2 text-red-600 shrink-0"/>}
                                                    <span className="font-black uppercase tracking-widest text-[9px]">{p.label}</span>
                                                </div>
                                                <span className="font-bold text-xs text-right w-2/3">{p.start} - {p.end}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                            <div className="mt-2">
                                <a href="https://holyislandcrossingtimes.northumberland.gov.uk/" target="_blank" rel="noopener noreferrer" className="block w-full bg-slate-800 text-white text-[10px] font-bold uppercase tracking-widest py-3 px-4 rounded-xl text-center hover:bg-slate-900 transition-colors shadow-sm">
                                    Verify on Official Website
                                </a>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const LiveConditionsWidget = ({ lat, lng }) => {
            const [data, setData] = useState({ weather: null, tides: null, aurora: null, liveSolar: null, solarHistory: null });
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");
            const [activeAuroraInfo, setActiveAuroraInfo] = useState(null);
            const [activeChart, setActiveChart] = useState('bz');

            const auroraInfoData = {
                bz: { title: "IMF Bz (Magnetic Field)", desc: "The direction of the solar magnetic field. It must point South (negative values) to 'open the door' to Earth's magnetic field. Values below -2 nT are good; below -5 nT are excellent." },
                speed: { title: "Solar Wind Speed", desc: "How fast the solar wind is travelling. Higher speeds mean more energy hitting Earth. Normal is ~300 km/s. Above 400 km/s is good, above 500 km/s is excellent for storms." },
                density: { title: "Solar Wind Density", desc: "The amount of particles in the solar wind. More particles create brighter, more vibrant auroras. Normal is ~3-5 p/cm³. Above 10 p/cm³ is very good." },
                cloud: { title: "Local Cloud Cover", desc: "You need clear skies to see the aurora! Even a massive solar storm won't be visible through thick clouds. Look for cloud cover values under 30%." },
                kp: { title: "Kp Index (Geomagnetic Activity)", desc: "A 0-9 scale of global geomagnetic activity. For Northumberland (approx. 55° N), you typically need a Kp of 4+ to see it on the northern horizon, and Kp 6+ to see it overhead." }
            };

            const toggleAuroraInfo = (key) => {
                setActiveAuroraInfo(prev => prev === key ? null : key);
            };

            const getApproxMoonrise = () => {
                const knownNewMoon = new Date('2024-02-09T22:59:00Z').getTime();
                const now = new Date().getTime();
                const daysSinceNew = (now - knownNewMoon) / (24 * 60 * 60 * 1000);
                const cycle = daysSinceNew % 29.530588;
                let riseHour = 6 + (cycle / 29.530588) * 24;
                if (riseHour >= 24) riseHour -= 24;
                const hours = Math.floor(riseHour);
                const mins = Math.floor((riseHour - hours) * 60);
                return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
            };

            const getMoonIllumination = (timeInMillis) => {
                const knownNewMoon = new Date('2024-02-09T22:59:00Z').getTime();
                const daysSinceNew = (timeInMillis - knownNewMoon) / (24 * 60 * 60 * 1000);
                const cycle = (daysSinceNew % 29.530588 + 29.530588) % 29.530588;
                return Math.round((1 - Math.cos((cycle / 29.530588) * 2 * Math.PI)) * 50);
            };

            const getSolarAzimuths = (latitude, dateObj) => {
                const start = new Date(dateObj.getFullYear(), 0, 0);
                const diff = dateObj - start;
                const oneDay = 1000 * 60 * 60 * 24;
                const dayOfYear = Math.floor(diff / oneDay);
                const declination = -23.44 * Math.cos((360 / 365) * (dayOfYear + 10) * (Math.PI / 180));
                const declRad = declination * (Math.PI / 180);
                const latRad = latitude * (Math.PI / 180);
                const cosAzimuth = Math.sin(declRad) / Math.cos(latRad);
                const azimuthRad = Math.acos(Math.max(-1, Math.min(1, cosAzimuth))); 
                let sunriseAzimuth = azimuthRad * (180 / Math.PI);
                let sunsetAzimuth = 360 - sunriseAzimuth;
                
                const getCompassDir = (degrees) => {
                    const val = Math.floor((degrees / 22.5) + 0.5);
                    const arr = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
                    return arr[(val % 16)];
                };

                return {
                    sunrise: `${Math.round(sunriseAzimuth)}° ${getCompassDir(sunriseAzimuth)}`,
                    sunset: `${Math.round(sunsetAzimuth)}° ${getCompassDir(sunsetAzimuth)}`
                };
            };

            const getTideTimes = () => {
                const epoch = new Date('2024-03-25T15:15:00Z').getTime();
                const tidalPeriod = 44714400; 
                const halfPeriod = tidalPeriod / 2;
                const now = new Date().getTime();
                const periodsSince = Math.floor((now - epoch) / tidalPeriod);
                const lastHigh = epoch + (periodsSince * tidalPeriod);
                let nextHigh = lastHigh + tidalPeriod;
                let nextLow = lastHigh + halfPeriod;
                if (nextLow < now) nextLow += tidalPeriod;

                return {
                    nextHigh: new Date(nextHigh).toLocaleTimeString('en-GB', {timeZone: 'Europe/London', hour: '2-digit', minute:'2-digit'}),
                    nextLow: new Date(nextLow).toLocaleTimeString('en-GB', {timeZone: 'Europe/London', hour: '2-digit', minute:'2-digit'})
                };
            };

            const getBzClass = (bz) => {
                if (bz === null) return "bg-slate-50 text-slate-400 border-slate-100";
                if (bz <= -10) return "bg-purple-50 text-purple-700 border-purple-200"; 
                if (bz <= -2) return "bg-emerald-50 text-emerald-700 border-emerald-200"; 
                if (bz <= 0) return "bg-amber-50 text-amber-700 border-amber-200"; 
                return "bg-rose-50 text-rose-700 border-rose-200"; 
            };
            const getBzLabel = (bz) => {
                if (bz === null) return "--";
                if (bz <= -10) return "Storm";
                if (bz <= -2) return "Good";
                if (bz <= 0) return "Fair";
                return "Poor (North)";
            };

            const getSpeedClass = (s) => {
                if (s === null) return "bg-slate-50 text-slate-400 border-slate-100";
                if (s >= 600) return "bg-purple-50 text-purple-700 border-purple-200";
                if (s >= 450) return "bg-emerald-50 text-emerald-700 border-emerald-200";
                if (s >= 350) return "bg-amber-50 text-amber-700 border-amber-200";
                return "bg-slate-50 text-slate-500 border-slate-200";
            };
            const getSpeedLabel = (s) => {
                if (s === null) return "--";
                if (s >= 600) return "High";
                if (s >= 450) return "Good";
                if (s >= 350) return "Normal";
                return "Slow";
            };

            const getDensityClass = (d) => {
                if (d === null) return "bg-slate-50 text-slate-400 border-slate-100";
                if (d >= 20) return "bg-purple-50 text-purple-700 border-purple-200";
                if (d >= 10) return "bg-emerald-50 text-emerald-700 border-emerald-200";
                if (d >= 5) return "bg-amber-50 text-amber-700 border-amber-200";
                return "bg-slate-50 text-slate-500 border-slate-200";
            };
            const getDensityLabel = (d) => {
                if (d === null) return "--";
                if (d >= 20) return "High";
                if (d >= 10) return "Good";
                if (d >= 5) return "Normal";
                return "Low";
            };

            const getCloudClass = (c) => {
                if (c === null) return "bg-slate-50 text-slate-400 border-slate-100";
                if (c <= 15) return "bg-purple-50 text-purple-700 border-purple-200"; 
                if (c <= 30) return "bg-emerald-50 text-emerald-700 border-emerald-200"; 
                if (c <= 60) return "bg-amber-50 text-amber-700 border-amber-200"; 
                return "bg-rose-50 text-rose-700 border-rose-200"; 
            };
            const getCloudLabel = (c) => {
                if (c === null) return "--";
                if (c <= 15) return "Clear";
                if (c <= 30) return "Fair";
                if (c <= 60) return "Patchy";
                return "Overcast";
            };

            useEffect(() => {
                let isMounted = true;

                const fetchConditions = async (isInitial = true) => {
                    if (isInitial) setLoading(true);
                    if (isInitial) setErrorMsg("");
                    
                    try {
                        const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min,sunrise,sunset&hourly=weathercode,cloudcover&timezone=Europe%2FLondon&windspeed_unit=mph&models=ukmo_seamless`);
                        if (!weatherRes.ok) throw new Error("Weather API Error");
                        const weatherJson = await weatherRes.json();

                        const nowMs = new Date().getTime();
                        let currentCloud = 0;
                        if (weatherJson.hourly && weatherJson.hourly.time) {
                            const idx = weatherJson.hourly.time.findIndex(t => new Date(t).getTime() > nowMs);
                            currentCloud = idx > 0 ? weatherJson.hourly.cloudcover[idx - 1] : weatherJson.hourly.cloudcover[0];
                        }

                        const expectedCoastLng = -1.45 - ((lat - 55.0) * 0.75);
                        const isCoastal = lat >= 54.7 && lat <= 56.0 && lng >= (expectedCoastLng - 0.15);

                        let auroraDays = null;
                        let liveSolar = { bz: null, speed: null, density: null, cloud: currentCloud };
                        let solarHistory = null;

                        try {
                            const [auroraRes, plasmaRes, magRes] = await Promise.all([
                                fetch('https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json'),
                                fetch('https://services.swpc.noaa.gov/products/solar-wind/plasma-1-day.json'),
                                fetch('https://services.swpc.noaa.gov/products/solar-wind/mag-1-day.json')
                            ]);

                            if (auroraRes.ok) {
                                const auroraJson = await auroraRes.json();
                                const now = new Date();
                                const todayStr = now.toISOString().split('T')[0];
                                const tmrw = new Date(now); tmrw.setDate(tmrw.getDate()+1);
                                const tmrwStr = tmrw.toISOString().split('T')[0];
                                const dayAfter = new Date(now); dayAfter.setDate(dayAfter.getDate()+2);
                                const dayAfterStr = dayAfter.toISOString().split('T')[0];

                                const kpMap = { [todayStr]: 0, [tmrwStr]: 0, [dayAfterStr]: 0 };
                                
                                for (let i = 0; i < auroraJson.length; i++) {
                                    const row = auroraJson[i];
                                    let dateStr, kp;
                                    
                                    if (Array.isArray(row)) {
                                        if (i === 0) continue; // Skip old header
                                        if (!row[0]) continue;
                                        dateStr = String(row[0]).substring(0, 10);
                                        kp = parseFloat(row[1]);
                                    } else if (typeof row === 'object') {
                                        const timeTag = row.time_tag || row.time;
                                        if (!timeTag) continue;
                                        dateStr = String(timeTag).substring(0, 10);
                                        
                                        let kpVal = row.predicted_kp;
                                        if (kpVal === undefined) kpVal = row.kp;
                                        if (kpVal === undefined) kpVal = row.estimated_kp;
                                        if (kpVal === undefined) {
                                            const kpKey = Object.keys(row).find(k => k.toLowerCase().includes('kp'));
                                            if (kpKey) kpVal = row[kpKey];
                                        }
                                        kp = parseFloat(kpVal);
                                    } else {
                                        continue;
                                    }

                                    if (kpMap[dateStr] !== undefined && !isNaN(kp)) {
                                        if (kp > kpMap[dateStr]) kpMap[dateStr] = kp;
                                    }
                                }
                                
                                auroraDays = [
                                    { dayName: 'Tonight', kp: kpMap[todayStr] },
                                    { dayName: 'Tomorrow', kp: kpMap[tmrwStr] },
                                    { dayName: dayAfter.toLocaleDateString('en-GB', { weekday: 'short' }), kp: kpMap[dayAfterStr] }
                                ];
                            }

                            if (plasmaRes.ok && magRes.ok) {
                                const plasmaJson = await plasmaRes.json();
                                const magJson = await magRes.json();
                                
                                // Fetch Live Stats directly from the most recent row
                                for (let i = plasmaJson.length - 1; i >= 0; i--) {
                                    const row = plasmaJson[i];
                                    if (Array.isArray(row)) {
                                        if (i === 0) continue;
                                        if (row[1] !== null && row[2] !== null && row[1] !== undefined && row[2] !== undefined) {
                                            liveSolar.density = parseFloat(row[1]);
                                            liveSolar.speed = parseFloat(row[2]);
                                            break;
                                        }
                                    } else if (typeof row === 'object') {
                                        if (row.proton_density !== undefined && row.proton_speed !== undefined && row.proton_density !== null && row.proton_speed !== null) {
                                            liveSolar.density = parseFloat(row.proton_density);
                                            liveSolar.speed = parseFloat(row.proton_speed);
                                            break;
                                        }
                                    }
                                }
                                
                                for (let i = magJson.length - 1; i >= 0; i--) {
                                    const row = magJson[i];
                                    if (Array.isArray(row)) {
                                        if (i === 0) continue;
                                        if (row[3] !== null && row[3] !== undefined) {
                                            liveSolar.bz = parseFloat(row[3]);
                                            break;
                                        }
                                    } else if (typeof row === 'object') {
                                        if (row.bz_gsm !== undefined && row.bz_gsm !== null) {
                                            liveSolar.bz = parseFloat(row.bz_gsm);
                                            break;
                                        }
                                    }
                                }

                                // Build Solar Trend Buckets from History
                                solarHistory = buildSolarBuckets(magJson, plasmaJson);
                            }
                        } catch (err) { console.warn("Aurora/Solar fetch error:", err.message); }

                        if(isMounted) {
                            setData({ weather: weatherJson, tides: isCoastal ? getTideTimes() : null, aurora: auroraDays, liveSolar: liveSolar, solarHistory: solarHistory });
                            if (isInitial) setLoading(false);
                        }
                    } catch (err) {
                        console.warn("Failed to fetch live conditions:", err.message);
                        if(isMounted && isInitial) { setErrorMsg("Failed to connect to weather service."); setLoading(false); }
                    }
                };

                // Load initial data
                fetchConditions(true);
                
                // Keep data fresh in real-time
                const intervalId = setInterval(() => { fetchConditions(false); }, 5 * 60 * 1000); 

                return () => { isMounted = false; clearInterval(intervalId); };
            }, [lat, lng]);

            const renderTrendChart = () => {
                if (!data.solarHistory) return null;
                
                const validData = data.solarHistory.filter(d => d[activeChart] !== null && !isNaN(d[activeChart]));
                if (validData.length < 2) return <div className="h-24 md:h-28 flex items-center justify-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">No recent data</div>;

                const min = Math.min(...validData.map(d => d[activeChart]));
                const max = Math.max(...validData.map(d => d[activeChart]));
                
                // Prevent flatline errors if max === min
                const range = max === min ? (max === 0 ? 1 : Math.abs(max * 0.1)) : (max - min);
                const padding = range * 0.15;
                const paddedMin = min - padding;
                const paddedMax = max + padding;
                const paddedRange = paddedMax - paddedMin;

                // Color adapts to metrics - Red/Amber for Bz, Purple for Speed, Green for Density
                const color = activeChart === 'bz' ? (validData[validData.length-1]?.[activeChart] < 0 ? '#ef4444' : '#f59e0b') : activeChart === 'speed' ? '#8b5cf6' : '#10b981';

                const points = data.solarHistory.map((d, i) => {
                    if (d[activeChart] === null || isNaN(d[activeChart])) return null;
                    const x = (i / (data.solarHistory.length - 1)) * 100;
                    const y = 100 - (((d[activeChart] - paddedMin) / paddedRange) * 100);
                    return { x, y, val: d[activeChart], time: d.timeLabel };
                }).filter(Boolean);

                const polylinePoints = points.map(p => `${p.x},${p.y}`).join(' ');
                const firstX = points[0].x;
                const lastX = points[points.length - 1].x;
                const fillPoints = `${firstX},100 ${polylinePoints} ${lastX},100`;

                let zeroLine = null;
                if (activeChart === 'bz' && paddedMax > 0 && paddedMin < 0) {
                    const zeroY = 100 - (((0 - paddedMin) / paddedRange) * 100);
                    zeroLine = (
                        <g>
                            <line x1="0" y1={zeroY} x2="100" y2={zeroY} stroke="#cbd5e1" strokeWidth="0.5" strokeDasharray="2 2" />
                            <text x="99" y={zeroY - 2} fontSize="5" fill="#94a3b8" fontWeight="bold" textAnchor="end">0</text>
                        </g>
                    );
                }

                const formatVal = (v) => activeChart === 'speed' ? Math.round(v) : v.toFixed(1);

                return (
                    <div className="flex flex-col w-full relative animate-in fade-in mt-3">
                        <div className="h-24 md:h-28 w-full relative mb-2 flex">
                            {/* Y-Axis Labels */}
                            <div className="absolute left-0 top-0 bottom-0 w-8 flex flex-col justify-between items-end text-[8px] font-bold text-slate-400 pb-1 pr-1.5 z-10 pointer-events-none">
                                <span>{formatVal(max)}</span>
                                <span>{formatVal(min)}</span>
                            </div>

                            {/* Chart Area */}
                            <div className="flex-1 ml-8 relative border-b border-l border-slate-200">
                                <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full overflow-visible">
                                    <defs>
                                        <linearGradient id={`grad-${activeChart}`} x1="0" x2="0" y1="0" y2="1">
                                            <stop offset="0%" stopColor={color} stopOpacity="0.25" />
                                            <stop offset="100%" stopColor={color} stopOpacity="0.0" />
                                        </linearGradient>
                                    </defs>
                                    {zeroLine}
                                    
                                    <polygon points={fillPoints} fill={`url(#grad-${activeChart})`} />
                                    <polyline points={polylinePoints} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                                    
                                    {points.map((p, i) => (
                                        <g key={i} className="group">
                                            <circle cx={p.x} cy={p.y} r="2" fill="white" stroke={color} strokeWidth="1.5" className="transition-all cursor-pointer" />
                                            {/* Hover target expansion area */}
                                            <circle cx={p.x} cy={p.y} r="8" fill="transparent" className="cursor-pointer" />
                                            {/* Value on hover */}
                                            <text x={p.x} y={p.y - 4} fontSize="6" fill={color} fontWeight="bold" textAnchor={p.x > 80 ? "end" : p.x < 20 ? "start" : "middle"} className="opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none drop-shadow-md">
                                                {formatVal(p.val)}
                                            </text>
                                        </g>
                                    ))}
                                </svg>
                            </div>
                        </div>
                        
                        {/* X-Axis Labels */}
                        <div className="flex justify-between text-[8px] md:text-[9px] text-slate-400 font-bold uppercase tracking-widest pl-8 pr-1 mt-1">
                            <span>{data.solarHistory[0].timeLabel}</span>
                            <span>{data.solarHistory[4].timeLabel}</span>
                            <span>{data.solarHistory[8].timeLabel}</span>
                        </div>
                    </div>
                );
            };

            if (loading) {
                return (
                    <div className="border-t border-slate-100 pt-6 pb-6 mt-2">
                        <div className="h-56 bg-slate-50 animate-pulse rounded-2xl w-full"></div>
                    </div>
                );
            }

            if (errorMsg || !data.weather || !data.weather.current_weather) {
                return (
                    <div className="p-4 border border-red-100 bg-red-50 rounded-2xl mt-4 text-red-600 text-xs font-bold flex items-center">
                        <Icon name="cloud" size={16} className="mr-2" /> Live conditions temporarily unavailable.
                    </div>
                );
            }

            const getWeatherInfo = (code, isNight = false) => {
                if (code === 0) return { icon: isNight ? "moon" : "sun", text: isNight ? "Clear" : "Sunny" };
                if (code === 1 || code === 2) return { icon: isNight ? "cloudMoon" : "cloudSun", text: isNight ? "P. Cloudy" : "Sunny Intervals" };
                if (code === 3) return { icon: "cloud", text: "Cloudy" };
                if (code >= 45 && code <= 48) return { icon: "cloud", text: "Fog" };
                if (code >= 51 && code <= 67) return { icon: "rain", text: "Light Rain" };
                if (code >= 71 && code <= 77) return { icon: "cloud", text: "Snow" };
                if (code >= 80 && code <= 82) return { icon: "rain", text: "Showers" };
                if (code >= 95 && code <= 99) return { icon: "rain", text: "Storm" };
                return { icon: isNight ? "moon" : "sun", text: "Clear" };
            };

            const cw = data.weather.current_weather;
            const currentInfo = getWeatherInfo(cw.weathercode);
            const daily = data.weather.daily;
            const hourly = data.weather.hourly;

            const todayDate = daily?.sunrise?.[0] ? new Date(daily.sunrise[0]) : new Date();
            const azimuths = getSolarAzimuths(lat, todayDate);

            const todayInfo = {
                sunrise: daily?.sunrise?.[0] ? new Date(daily.sunrise[0]).toLocaleTimeString('en-GB', {timeZone: 'Europe/London', hour: '2-digit', minute:'2-digit'}) : "--:--",
                sunset: daily?.sunset?.[0] ? new Date(daily.sunset[0]).toLocaleTimeString('en-GB', {timeZone: 'Europe/London', hour: '2-digit', minute:'2-digit'}) : "--:--",
                sunriseAzimuth: azimuths.sunrise,
                sunsetAzimuth: azimuths.sunset,
                moonrise: getApproxMoonrise()
            };

            const astroDays = [0, 1, 2].map(dayIndex => {
                if (!daily?.sunset?.[dayIndex] || !daily?.sunrise?.[dayIndex + 1] || !hourly?.time || !hourly?.cloudcover) return null;
                const sunsetTime = new Date(daily.sunset[dayIndex]).getTime();
                const sunriseTime = new Date(daily.sunrise[dayIndex + 1]).getTime();
                const dateObj = new Date(daily.sunset[dayIndex]);
                let dayName = 'Tonight';
                if (dayIndex === 1) dayName = 'Tomorrow Night';
                if (dayIndex === 2) dayName = dateObj.toLocaleDateString('en-GB', { weekday: 'long' }) + ' Night';

                const hourlyData = [];
                for (let i = 0; i < hourly.time.length; i++) {
                    const hourTime = new Date(hourly.time[i]).getTime();
                    if (hourTime >= sunsetTime && hourTime <= sunriseTime) {
                        const date = new Date(hourTime);
                        const timeStr = date.toLocaleTimeString('en-GB', { timeZone: 'Europe/London', hour: '2-digit', minute: '2-digit' });
                        const cloud = hourly.cloudcover[i];
                        const weatherCode = hourly.weathercode[i];
                        
                        let colorClass = "text-red-700 bg-red-50 border-red-200"; 
                        if (cloud <= 20) colorClass = "text-emerald-700 bg-emerald-50 border-emerald-200"; 
                        else if (cloud <= 45) colorClass = "text-lime-700 bg-lime-50 border-lime-200"; 
                        else if (cloud <= 75) colorClass = "text-amber-700 bg-amber-50 border-amber-200"; 

                        hourlyData.push({
                            time: timeStr, cloud: cloud,
                            moonIllumination: getMoonIllumination(hourTime),
                            info: getWeatherInfo(weatherCode, true), 
                            colorClass
                        });
                    }
                }
                return hourlyData.length > 0 ? { dayName, hourlyData } : null;
            }).filter(Boolean);

            const forecastDays = [0, 1, 2].map(i => {
                if (!daily || !daily.time[i]) return null;
                const date = new Date(daily.time[i]);
                const dayName = i === 0 ? 'Today' : date.toLocaleDateString('en-GB', { weekday: 'short' });
                const dateStr = daily.time[i];
                const targetHour = `${dateStr}T13:00`;
                const hourIdx = hourly?.time?.findIndex(t => t === targetHour);
                const codeToUse = (hourIdx !== -1 && hourIdx !== undefined) ? hourly.weathercode[hourIdx] : daily.weathercode[i];
                const info = getWeatherInfo(codeToUse);
                return { dayName, icon: info.icon, max: Math.round(daily.temperature_2m_max[i]), min: Math.round(daily.temperature_2m_min[i]) };
            }).filter(Boolean);

            return (
                <div className="pt-2 pb-6 mt-2">
                    {/* Weather & Astro Widget */}
                    <div className="bg-white border border-slate-200 shadow-sm p-4 md:p-5 rounded-2xl flex flex-col justify-between relative overflow-hidden w-full">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center w-full gap-4 sm:gap-0">
                            <div>
                                <div className="flex items-center text-slate-500 mb-2 z-10">
                                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">Live Weather</span>
                                </div>
                                <div className="flex items-center space-x-3 z-10 my-1">
                                    <Icon name={currentInfo.icon} size={32} className="text-slate-800" />
                                    <span className="text-3xl md:text-4xl font-black tracking-tighter text-slate-900">{Math.round(cw.temperature)}°</span>
                                </div>
                                <div className="flex items-center text-slate-500 text-[11px] md:text-xs font-bold tracking-wide z-10">
                                    <span className="mr-3">{currentInfo.text}</span>
                                    <Icon name="wind" size={12} className="mr-1" />
                                    <span>{cw.windspeed} mph</span>
                                </div>
                            </div>
                            
                            {forecastDays.length > 0 && (
                                <div className="flex gap-4 md:gap-5 mt-1 sm:mt-0 w-full sm:w-auto justify-between sm:justify-end border-t border-slate-100 sm:border-0 pt-3 sm:pt-0">
                                    {forecastDays.map((day, idx) => (
                                        <div key={idx} className="flex flex-col items-center">
                                            <span className="text-[9px] md:text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">{day.dayName}</span>
                                            <Icon name={day.icon} size={24} className="text-slate-600 mb-1" />
                                            <span className="text-[10px] md:text-[11px] font-bold text-slate-800">{day.max}° <span className="text-slate-400 font-medium">{day.min}°</span></span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="grid grid-cols-3 gap-2 mt-4 pt-4 border-t border-slate-100">
                            <div className="flex flex-col items-center text-center">
                                <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Sunrise</span>
                                <span className="text-[10px] md:text-[11px] font-bold text-amber-600">{todayInfo.sunrise}</span>
                                <span className="text-[8px] font-bold text-slate-400 mt-0.5">{todayInfo.sunriseAzimuth}</span>
                            </div>
                            <div className="flex flex-col items-center text-center">
                                <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Sunset</span>
                                <span className="text-[10px] md:text-[11px] font-bold text-orange-600">{todayInfo.sunset}</span>
                                <span className="text-[8px] font-bold text-slate-400 mt-0.5">{todayInfo.sunsetAzimuth}</span>
                            </div>
                            <div className="flex flex-col items-center text-center">
                                <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Moonrise</span>
                                <span className="text-[10px] md:text-[11px] font-bold text-indigo-600">~{todayInfo.moonrise}</span>
                                <span className="text-[8px] font-bold text-transparent mt-0.5">-</span>
                            </div>
                        </div>

                        {data.tides && (
                            <div className="mt-4 pt-4 border-t border-slate-100">
                                <div className="flex justify-between items-center bg-sky-50 rounded-xl p-3 px-4 border border-sky-100">
                                    <div className="flex items-center text-sky-800">
                                        <Icon name="waves" size={16} className="mr-2" />
                                        <span className="text-[10px] md:text-xs font-black uppercase tracking-widest">Coastal Tide</span>
                                    </div>
                                    <div className="flex gap-4 md:gap-6 text-sky-900">
                                        <div className="flex flex-col text-right">
                                            <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest text-sky-600/70 mb-0.5">Next High</span>
                                            <span className="text-[10px] md:text-[11px] font-bold">{data.tides.nextHigh || '--:--'}</span>
                                        </div>
                                        <div className="flex flex-col text-right">
                                            <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest text-sky-600/70 mb-0.5">Next Low</span>
                                            <span className="text-[10px] md:text-[11px] font-bold">{data.tides.nextLow || '--:--'}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {data.aurora && data.liveSolar && (
                            <div className="mt-4 pt-4 border-t border-slate-100">
                                <div className="flex items-center justify-between mb-3">
                                    <div className="flex items-center">
                                        <Icon name="sparkles" size={16} className="text-emerald-600 mr-2 shrink-0" />
                                        <span className="text-[10px] md:text-xs font-bold text-slate-800 uppercase tracking-widest">Live Solar & Aurora</span>
                                    </div>
                                </div>
                                
                                {activeAuroraInfo && (
                                    <div className="mb-3 bg-sky-50 border border-sky-100 rounded-xl p-3 relative animate-in text-sky-900 shadow-sm">
                                        <button onClick={() => setActiveAuroraInfo(null)} className="absolute top-1 right-1 p-2 text-sky-400 hover:text-sky-600 transition-colors">
                                            <Icon name="x" size={16} />
                                        </button>
                                        <h4 className="font-black text-[10px] md:text-[11px] uppercase tracking-widest mb-1.5 pr-6">{auroraInfoData[activeAuroraInfo].title}</h4>
                                        <p className="text-[11px] md:text-xs leading-relaxed opacity-90">{auroraInfoData[activeAuroraInfo].desc}</p>
                                    </div>
                                )}

                                <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-3">
                                    <div className={`relative flex flex-col items-center justify-center p-2 rounded-xl border ${getBzClass(data.liveSolar.bz)}`}>
                                        <button onClick={() => toggleAuroraInfo('bz')} className="absolute top-0 right-0 p-2.5 opacity-40 hover:opacity-100 transition-opacity" title="What is IMF Bz?">
                                            <Icon name="info" size={14} />
                                        </button>
                                        <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest mb-0.5 opacity-80 mt-1">IMF Bz</span>
                                        <span className="text-sm md:text-base font-black">{data.liveSolar.bz !== null ? `${data.liveSolar.bz.toFixed(1)} nT` : '--'}</span>
                                        <span className="text-[8px] font-bold uppercase mt-0.5">{getBzLabel(data.liveSolar.bz)}</span>
                                    </div>
                                    <div className={`relative flex flex-col items-center justify-center p-2 rounded-xl border ${getSpeedClass(data.liveSolar.speed)}`}>
                                        <button onClick={() => toggleAuroraInfo('speed')} className="absolute top-0 right-0 p-2.5 opacity-40 hover:opacity-100 transition-opacity" title="What is Solar Wind Speed?">
                                            <Icon name="info" size={14} />
                                        </button>
                                        <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest mb-0.5 opacity-80 mt-1">Speed</span>
                                        <span className="text-sm md:text-base font-black">{data.liveSolar.speed !== null ? `${Math.round(data.liveSolar.speed)} km/s` : '--'}</span>
                                        <span className="text-[8px] font-bold uppercase mt-0.5">{getSpeedLabel(data.liveSolar.speed)}</span>
                                    </div>
                                    <div className={`relative flex flex-col items-center justify-center p-2 rounded-xl border ${getDensityClass(data.liveSolar.density)}`}>
                                        <button onClick={() => toggleAuroraInfo('density')} className="absolute top-0 right-0 p-2.5 opacity-40 hover:opacity-100 transition-opacity" title="What is Solar Wind Density?">
                                            <Icon name="info" size={14} />
                                        </button>
                                        <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest mb-0.5 opacity-80 mt-1">Density</span>
                                        <span className="text-sm md:text-base font-black">{data.liveSolar.density !== null ? `${data.liveSolar.density.toFixed(1)} p/cm³` : '--'}</span>
                                        <span className="text-[8px] font-bold uppercase mt-0.5">{getDensityLabel(data.liveSolar.density)}</span>
                                    </div>
                                    <div className={`relative flex flex-col items-center justify-center p-2 rounded-xl border ${getCloudClass(data.liveSolar.cloud)}`}>
                                        <button onClick={() => toggleAuroraInfo('cloud')} className="absolute top-0 right-0 p-2.5 opacity-40 hover:opacity-100 transition-opacity" title="What is Local Cloud Cover?">
                                            <Icon name="info" size={14} />
                                        </button>
                                        <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest mb-0.5 opacity-80 mt-1">Local Cloud</span>
                                        <span className="text-sm md:text-base font-black">{data.liveSolar.cloud !== null ? `${data.liveSolar.cloud}%` : '--'}</span>
                                        <span className="text-[8px] font-bold uppercase mt-0.5">{getCloudLabel(data.liveSolar.cloud)}</span>
                                    </div>
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    {data.aurora.map((day, idx) => {
                                        let colorClass = "bg-slate-50 text-slate-500 border-slate-200";
                                        if (day.kp >= 6) colorClass = "bg-purple-50 text-purple-700 border-purple-200";
                                        else if (day.kp >= 4.6) colorClass = "bg-emerald-50 text-emerald-700 border-emerald-200";
                                        else if (day.kp >= 3) colorClass = "bg-amber-50 text-amber-700 border-amber-200";
                                        
                                        return (
                                            <div key={idx} className={`relative flex flex-col items-center justify-center p-2 rounded-xl border ${colorClass}`}>
                                                <button onClick={() => toggleAuroraInfo('kp')} className="absolute top-0 right-0 p-2.5 opacity-40 hover:opacity-100 transition-opacity" title="What is the Kp Index?">
                                                    <Icon name="info" size={14} />
                                                </button>
                                                <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest mb-0.5 opacity-80 text-center mt-1">{day.dayName}</span>
                                                <span className="text-xs md:text-sm font-black">Kp {day.kp.toFixed(1)}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                {/* 2-HOUR TREND CHART */}
                                {data.solarHistory && (
                                    <div className="mt-4 bg-slate-50 border border-slate-100 rounded-xl p-3 pt-3">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-[9px] md:text-[10px] font-black uppercase tracking-widest text-slate-500">2-Hour Trend (15m)</span>
                                            <div className="flex gap-1 bg-slate-200/80 p-0.5 rounded-lg border border-slate-200">
                                                <button onClick={() => setActiveChart('bz')} className={`text-[9px] md:text-[10px] font-bold px-2 py-1 rounded-md transition-colors ${activeChart === 'bz' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>Bz</button>
                                                <button onClick={() => setActiveChart('speed')} className={`text-[9px] md:text-[10px] font-bold px-2 py-1 rounded-md transition-colors ${activeChart === 'speed' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>Speed</button>
                                                <button onClick={() => setActiveChart('density')} className={`text-[9px] md:text-[10px] font-bold px-2 py-1 rounded-md transition-colors ${activeChart === 'density' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>Density</button>
                                            </div>
                                        </div>
                                        {renderTrendChart()}
                                    </div>
                                )}
                            </div>
                        )}

                        {astroDays.length > 0 && (
                            <div className="mt-4 pt-4 border-t border-slate-100">
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-2 sm:gap-0">
                                    <div className="flex items-center">
                                        <Icon name="moon" size={16} className="text-indigo-600 mr-2 shrink-0" />
                                        <span className="text-[10px] md:text-xs font-bold text-slate-800 uppercase tracking-widest">Astro Forecast (Sunset to Sunrise)</span>
                                    </div>
                                    <div className="flex flex-col items-center text-[8px] md:text-[9px] font-black text-slate-500 uppercase tracking-widest bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm w-fit shrink-0 leading-tight gap-0.5">
                                        <span>Cloud %</span>
                                        <span className="text-slate-400">Moon %</span>
                                    </div>
                                </div>
                                
                                <div className="flex flex-col gap-5">
                                    {astroDays.map((astroDay, idx) => (
                                        <div key={idx} className="flex flex-col">
                                            <span className="text-[9px] font-black text-slate-400 mb-2 uppercase tracking-widest">{astroDay.dayName}</span>
                                            <div className="flex overflow-x-auto gap-2 pb-2 custom-scrollbar overscroll-x-contain">
                                                {astroDay.hourlyData.map((hour, hIdx) => (
                                                    <div key={hIdx} className={`flex flex-col items-center justify-center px-3 py-2 rounded-xl border min-w-[64px] shrink-0 ${hour.colorClass}`}>
                                                        <span className="text-[10px] font-black mb-1.5 opacity-80">{hour.time}</span>
                                                        <Icon name={hour.info.icon} size={16} className="mb-1.5" />
                                                        <span className="text-[11px] font-black" title="Cloud Cover">{hour.cloud}%</span>
                                                        <span className="text-[10px] font-black opacity-90 mt-1.5 flex items-center bg-white/40 px-1.5 py-0.5 rounded-md w-full justify-center" title="Moon Illumination">
                                                            <Icon name="moon" size={10} className="mr-1 opacity-70" /> {hour.moonIllumination}%
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [selectedLoc, setSelectedLoc] = useState(null);
            const [selectedWebcam, setSelectedWebcam] = useState(null);
            const [isLocating, setIsLocating] = useState(false);
            const [layerMode, setLayerMode] = useState('standard');
            const [showLayers, setShowLayers] = useState(false);
            
            // Saved Spots feature
            const [savedSpots, setSavedSpots] = useState(() => JSON.parse(localStorage.getItem('northernPixlSaved')) || []);
            const [showSaved, setShowSaved] = useState(false);
            
            // Radar Playback State
            const [radarFrames, setRadarFrames] = useState([]);
            const [currentFrame, setCurrentFrame] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            
            // Toast notification
            const [toastMsg, setToastMsg] = useState(null);

            const mapContainerRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const clickMarkerRef = useRef(null);
            const userMarkerRef = useRef(null);
            
            const lightLayerRef = useRef(null);
            const darkMapLayerRef = useRef(null);
            const astroLayerRef = useRef(null);
            const darkLabelsLayerRef = useRef(null);
            
            const radarLayerDictRef = useRef({}); 

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(null), 3000);
            };

            const reverseGeocodeAndSelect = async (lat, lng, isUserLocation = false) => {
                const defaultName = isUserLocation ? "Your Location" : "Custom Location";
                setSelectedLoc({ lat, lng, name: "Loading...", type: isUserLocation ? "Current Location" : "Custom Pin" });
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
                    const data = await res.json();
                    let locName = defaultName;
                    if (data && data.name) {
                        locName = data.name;
                    } else if (data && data.address) {
                        locName = data.address.village || data.address.town || data.address.city || data.address.county || data.address.state || defaultName;
                    }
                    setSelectedLoc({ lat, lng, name: locName, type: isUserLocation ? "Current Location" : "Custom Pin" });
                } catch (err) {
                    setSelectedLoc({ lat, lng, name: defaultName, type: isUserLocation ? "Current Location" : "Custom Pin" });
                }
                
                if (clickMarkerRef.current) {
                    clickMarkerRef.current.setLatLng([lat, lng]);
                } else if (mapInstanceRef.current) {
                    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#0ea5e9" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 32px; height: 32px; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.25));"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3" fill="#ffffff" stroke="none"></circle></svg>`;
                    clickMarkerRef.current = L.marker([lat, lng], {
                        icon: L.divIcon({ className: 'custom-map-marker', html: svg, iconSize: [32, 32], iconAnchor: [16, 32] })
                    }).addTo(mapInstanceRef.current);
                }
            };

            const getSafeUrl = (url) => {
                if (!url) return "";
                let safeUrl = url;
                try {
                    if (url.includes('youtube.com/watch?v=')) {
                        const urlObj = new URL(url);
                        const videoId = urlObj.searchParams.get('v');
                        safeUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1`;
                    } else if (url.includes('youtu.be/')) {
                        const videoId = url.split('youtu.be/')[1].split('?')[0];
                        safeUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1`;
                    }
                } catch (e) {
                    console.error("URL parsing error", e);
                }
                return safeUrl;
            };

            const getOriginalUrl = (url) => {
                if (!url) return "#";
                if (url.includes('/embed/')) {
                    const videoId = url.split('/embed/')[1].split('?')[0];
                    return `https://www.youtube.com/watch?v=${videoId}`;
                }
                return url;
            };

            useEffect(() => {
                const onPopState = () => {
                    setSelectedLoc(null);
                    setSelectedWebcam(null);
                };
                window.addEventListener('popstate', onPopState);
                return () => window.removeEventListener('popstate', onPopState);
            }, []);

            // Setup Map Base Layers
            useEffect(() => {
                const timer = setTimeout(() => {
                    if (mapContainerRef.current && !mapInstanceRef.current) {
                        const map = L.map(mapContainerRef.current, { zoomControl: false }).setView([55.35, -2.0], 9);
                        mapInstanceRef.current = map;
                        
                        lightLayerRef.current = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap, &copy; CARTO' });
                        darkMapLayerRef.current = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' });
                        
                        // NASA Black Marble (True Light Pollution) + Dark Labels
                        astroLayerRef.current = L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_CityLights_2012/default/2012-05-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.jpg', { 
                            attribution: '&copy; NASA',
                            maxNativeZoom: 8,
                            maxZoom: 18
                        });
                        darkLabelsLayerRef.current = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', { 
                            attribution: '&copy; CARTO',
                            maxZoom: 18
                        });

                        lightLayerRef.current.addTo(map);

                        // --- Add Webcams to map ---
                        WEBCAMS.forEach(cam => {
                            const cameraIconHtml = `<div class="bg-slate-900 text-white rounded-full p-2 shadow-lg border-2 border-white flex items-center justify-center w-8 h-8"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg></div>`;
                            const camIcon = L.divIcon({
                                className: 'custom-webcam-marker',
                                html: cameraIconHtml,
                                iconSize: [32, 32],
                                iconAnchor: [16, 16]
                            });
                            const marker = L.marker([cam.lat, cam.lng], { icon: camIcon, zIndexOffset: 500 }).addTo(map);
                            marker.on('click', () => {
                                setSelectedWebcam(cam);
                            });
                        });
                        // --------------------------
                        
                        map.on('click', async (e) => {
                            reverseGeocodeAndSelect(e.latlng.lat, e.latlng.lng, false);
                        });

                        const params = new URLSearchParams(window.location.search);
                        const urlLat = parseFloat(params.get('lat'));
                        const urlLng = parseFloat(params.get('lng'));
                        if (!isNaN(urlLat) && !isNaN(urlLng)) {
                             reverseGeocodeAndSelect(urlLat, urlLng, false);
                        }
                    }
                }, 100);

                return () => {
                    clearTimeout(timer);
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.remove();
                        mapInstanceRef.current = null;
                    }
                };
            }, []);

            // Handle Layer Switching (Robust Async/Await dual-provider system)
            useEffect(() => {
                if (!mapInstanceRef.current) return;
                const map = mapInstanceRef.current;
                let isCancelled = false;
                
                const safeRemove = (layerRef) => {
                    if (layerRef.current && map.hasLayer(layerRef.current)) map.removeLayer(layerRef.current);
                };
                const safeAdd = (layerRef) => {
                    if (layerRef.current && !map.hasLayer(layerRef.current)) layerRef.current.addTo(map);
                };

                const fetchMapData = async () => {
                    if (layerMode === 'dark') {
                        safeRemove(lightLayerRef);
                        safeRemove(darkMapLayerRef);
                        safeAdd(astroLayerRef);
                        safeAdd(darkLabelsLayerRef);
                        setIsPlaying(false);
                        setRadarFrames([]);
                        
                    } else if (layerMode === 'cloud') {
                        safeRemove(lightLayerRef);
                        safeRemove(astroLayerRef);
                        safeRemove(darkLabelsLayerRef);
                        safeAdd(darkMapLayerRef); 
                        
                        let frames = [];
                        
                        try {
                            // Primary Attempt: Try to load RainViewer's Animated Satellite Timeline
                            const res = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                            const data = await res.json();
                            if (isCancelled) return;
                            
                            const satData = data?.satellite?.infrared || [];
                            
                            if (satData.length > 1) {
                                frames = satData.slice(-8).map(f => ({
                                    time: f.time,
                                    path: f.path,
                                    type: 'past',
                                    provider: 'rainviewer_sat'
                                }));
                            }
                        } catch (err) {
                            console.warn("Rainviewer satellite API unavailable.", err);
                        }

                        // BULLETPROOF FALLBACK: If Rainviewer returned 0 or 1 frames, mathematically generate an 8-frame EUMETSAT WMS Timeline
                        if (frames.length <= 1) {
                            const now = new Date();
                            // Round down to nearest 15 mins
                            const buffer = new Date(now.getTime() - 45 * 60000); 
                            buffer.setUTCMinutes(Math.floor(buffer.getUTCMinutes() / 15) * 15, 0, 0);

                            for (let i = 7; i >= 0; i--) {
                                const t = new Date(buffer.getTime() - i * 15 * 60000);
                                frames.push({
                                    time: Math.floor(t.getTime() / 1000),
                                    timeStr: t.toISOString(), // EUMETSAT requires strictly formatted ISO 8601 timestamps
                                    type: 'past',
                                    provider: 'eumetsat_wms'
                                });
                            }
                        }

                        if (isCancelled) return;

                        setRadarFrames(frames);
                        
                        if (radarLayerDictRef.current) {
                            Object.values(radarLayerDictRef.current).forEach(layer => {
                                if (map.hasLayer(layer)) map.removeLayer(layer);
                            });
                        }
                        radarLayerDictRef.current = {};

                        setCurrentFrame(frames.length - 1);
                        setIsPlaying(true); // Guaranteed to animate because we forced frames.length to 8

                    } else if (layerMode === 'radar') {
                        safeRemove(lightLayerRef);
                        safeRemove(astroLayerRef);
                        safeRemove(darkLabelsLayerRef);
                        safeAdd(darkMapLayerRef); 
                        
                        try {
                            const res = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                            const data = await res.json();
                            if (isCancelled) return;
                            
                            const past = data?.radar?.past || [];
                            const nowcast = data?.radar?.nowcast || [];
                            const frames = [
                                ...past.map(f => ({ ...f, type: 'past', provider: 'rainviewer_radar' })),
                                ...nowcast.map(f => ({ ...f, type: 'future', provider: 'rainviewer_radar' }))
                            ];
                            
                            if (frames.length === 0) {
