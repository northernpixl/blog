    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

        .custom-map-marker:hover svg { transform: scale(1.15) translateY(-4px); }

<body class="bg-slate-50 text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONS COMPONENT ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>,

                cloudSun: <><path d="M12 2v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="M20 12h2"/><path d="m19.07 4.93-1.41 1.41"/><path d="M15.947 12.65a4 4 0 0 0-5.925-4.128"/><path d="M13 22H7a5 5 0 1 1 4.9-6H13a3 3 0 0 1 0 6Z"/></>,
                cloud: <><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></>,
                rain: <><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M16 14v6"/><path d="M8 14v6"/><path d="M12 16v6"/></>,
                wind: <><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></>,
                waves: <><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.6 2 5 2 2.3 0 2.3-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.6 2 5 2 2.3 0 2.3-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.6 2 5 2 2.3 0 2.3-2 5-2 1.3 0 1.9.5 2.5 1"/></>,
                alertTriangle: <><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></>,
                checkCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
                xCircle: <><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></>,
                moon: <><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></>,
                cloudMoon: <><path d="M13 16a3 3 0 1 1 0 6H7a5 5 0 1 1 4.9-6Z"/><path d="M10.1 9A6 6 0 0 1 16 4a4.24 4.24 0 0 0 6 6 6 6 0 0 1-3 5.197"/></>,
                locate: <><line x1="2" x2="5" y1="12" y2="12"/><line x1="19" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="5"/><line x1="12" x2="12" y1="19" y2="22"/><circle cx="12" cy="12" r="7"/></>,
                sparkles: <><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3l1.9 5.8 1.9-5.8a2 2 0 0 1 1.3-1.3l5.8-1.9-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // --- COMPONENTS ---
        const Navbar = () => {
            const [isOpen, setIsOpen] = useState(false);

            const toggleMenu = () => setIsOpen(!isOpen);

            const links = [
                { name: 'Home', url: 'index.html', active: false },
                { name: 'Explore', url: 'explore.html', active: false },
                { name: 'Weather', url: 'weather.html', active: true },
                { name: 'Routes', url: 'routes.html', active: false },
                { name: 'Tuition', url: 'tuition.html', active: false }
            ];

            return (
                <nav className="fixed top-0 w-full z-[1000] bg-white/90 backdrop-blur-md border-b border-slate-100 shadow-sm">
                    <div className="flex items-center justify-between px-4 md:px-8 h-20 max-w-7xl mx-auto w-full">
                        <div className="flex items-center space-x-3 cursor-pointer" onClick={() => window.location.href='index.html'}>
                            <div className="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center shadow-md">
                                <Icon name="camera" className="text-white" size={18} />
                            </div>
                            <span className="font-black text-lg md:text-xl tracking-tighter uppercase hidden md:inline">NorthernPixl</span>
                            <span className="font-black text-lg md:text-xl tracking-tighter uppercase md:hidden">NorthernPixl</span>
                        </div>
                        
                        <div className="hidden md:flex space-x-10 text-[11px] font-black uppercase tracking-widest text-slate-400">
                            {links.map((link) => (
                                <a key={link.name} href={link.url} className={link.active ? "text-slate-900 border-b-2 border-slate-900 pb-1" : "hover:text-slate-900 transition-colors"}>
                                    {link.name}
                                </a>
                            ))}
                        </div>

                        <div className="md:hidden">
                            <button onClick={toggleMenu} className="p-2 text-slate-900 focus:outline-none">
                                <Icon name={isOpen ? "x" : "menu"} size={24} />
                            </button>
                        </div>
                    </div>

                    {isOpen && (
                        <div className="md:hidden bg-white border-b border-slate-100 absolute w-full left-0 top-20 shadow-xl fade-in">
                            <div className="flex flex-col p-6 space-y-6">
                                {links.map((link) => (
                                    <a key={link.name} href={link.url} className={`text-sm font-black uppercase tracking-widest ${link.active ? "text-slate-900" : "text-slate-400"}`}>
                                        {link.name}
                                    </a>
                                ))}
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        const HolyIslandCrossingWidget = () => {
            const [crossingSchedule, setCrossingSchedule] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(false);

            // A helper to map HTML table visually with rowspans/colspans into a 2D Array
            const parseTableToGrid = (table) => {
                const rows = Array.from(table.querySelectorAll('tr'));
                const grid = [];
                for (let i = 0; i < rows.length; i++) grid[i] = [];
                
                for (let r = 0; r < rows.length; r++) {
                    const cells = Array.from(rows[r].querySelectorAll('td, th'));
                    let c = 0;
                    for (const cell of cells) {
                        while (grid[r][c] !== undefined) c++;
                        
                        const rowspan = parseInt(cell.getAttribute('rowspan') || 1, 10);
                        const colspan = parseInt(cell.getAttribute('colspan') || 1, 10);
                        const text = cell.textContent.replace(/\s+/g, ' ').trim().toLowerCase();
                        
                        // Treat <th> elements or cells in the very top rows as headers
                        const isHeader = cell.tagName === 'TH' || r < 2; 
                        
                        for (let rr = 0; rr < rowspan; rr++) {
                            if (!grid[r + rr]) grid[r + rr] = [];
                            for (let cc = 0; cc < colspan; cc++) {
                                grid[r + rr][c + cc] = { text, isHeader };
                            }
                        }
                    }
                }
                return grid;
            };

            useEffect(() => {
                let isMounted = true;
                
                const fetchCrossing = async () => {
                    try {
                        const targetUrl = 'https://holyislandcrossingtimes.northumberland.gov.uk/';
                        let htmlText = '';
                        
                        const proxies = [
                            `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`,
                            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
                            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
                        ];

                        for (const proxy of proxies) {
                            try {
                                const res = await fetch(proxy);
                                if (!res.ok) continue;
                                
                                if (proxy.includes('allorigins')) {
                                    const data = await res.json();
                                    htmlText = data.contents;
                                } else {
                                    htmlText = await res.text();
                                }
                                
                                if (htmlText && htmlText.toLowerCase().includes('crossing')) break; 
                            } catch (e) {
                                continue;
                            }
                        }
                        
                        if (!htmlText || !htmlText.toLowerCase().includes('crossing')) {
                            throw new Error("Could not retrieve valid HTML from proxies.");
                        }

                        const doc = new DOMParser().parseFromString(htmlText, 'text/html');
                        
                        // Find the table that contains the safety schedule
                        const tables = Array.from(doc.querySelectorAll('table'));
                        const crossingTable = tables.find(t => t.textContent.toLowerCase().includes('safe'));
                        if (!crossingTable) throw new Error("No crossing table found in the HTML.");

                        const grid = parseTableToGrid(crossingTable);
                        const numCols = grid[0] ? grid[0].length : 0;
                        const colTypes = [];
                        
                        // Step 1: Identify which columns represent Safe times vs Unsafe times vs Dates
                        for (let c = 0; c < numCols; c++) {
                            let headerText = "";
                            for (let r = 0; r < grid.length; r++) {
                                if (grid[r][c] && grid[r][c].isHeader) {
                                    headerText += grid[r][c].text + " ";
                                }
                            }
                            
                            // Map Unsafe (Red) and Safe (Green) columns strictly by their council header text
                            if (headerText.includes('unsafe') || headerText.includes('do not cross')) {
                                colTypes[c] = 'unsafe';
                            } else if (headerText.includes('safe')) {
                                colTypes[c] = 'safe';
                            } else {
                                colTypes[c] = 'other'; // E.g., Day/Date columns or High Tide columns
                            }
                        }

                        // Step 2 & 3: Mathematically parse absolute Date ranges for Yesterday -> Tomorrow
                        const today = new Date();
                        today.setHours(0,0,0,0);
                        const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
                        const tmrw = new Date(today); tmrw.setDate(tmrw.getDate() + 1);
                        const dayAfter = new Date(today); dayAfter.setDate(dayAfter.getDate() + 2);

                        const targetDates = [yesterday, today, tmrw, dayAfter];
                        const allSafePeriods = [];

                        // Strict Date matcher helper
                        const getRowForDate = (dateObj) => {
                            const dNum = dateObj.getDate();
                            const dayRegex = new RegExp(`\\b0?${dNum}(?:st|nd|rd|th)?\\b`, 'i');
                            
                            for (let r = 0; r < grid.length; r++) {
                                if (grid[r][0] && grid[r][0].isHeader) continue;
                                
                                let rowDateText = "";
                                for (let c = 0; c < grid[r].length; c++) {
                                    if (colTypes[c] === 'other' && grid[r][c]) {
                                        rowDateText += grid[r][c].text + " ";
                                    }
                                }
                                if (dayRegex.test(rowDateText)) return r;
                            }
                            return -1;
                        };

                        for (const tDate of targetDates) {
                            const rIdx = getRowForDate(tDate);
                            if (rIdx === -1) continue;

                            let cursorDate = new Date(tDate);
                            cursorDate.setHours(0,0,0,0);
                            let lastTimeMins = -1;

                            for (let c = 0; c < grid[rIdx].length; c++) {
                                if (colTypes[c] === 'safe' || colTypes[c] === 'unsafe') {
                                    const cellText = grid[rIdx][c] ? grid[rIdx][c].text : "";
                                    const matches = cellText.match(/\b\d{1,2}[:.]\d{2}\b/g);
                                    if (!matches) continue;

                                    const cellDates = [];
                                    for (const m of matches) {
                                        const parts = m.split(/[:.]/);
                                        const h = parseInt(parts[0], 10);
                                        const min = parseInt(parts[1], 10);
                                        const timeMins = h * 60 + min;

                                        // Midnight wrap detection (allow 2 hour buffer for DST fallbacks)
                                        if (timeMins < lastTimeMins - 120) {
                                            cursorDate.setDate(cursorDate.getDate() + 1);
                                        }
                                        
                                        const absDate = new Date(cursorDate);
                                        absDate.setHours(h, min, 0, 0);
                                        cellDates.push(absDate.getTime());
                                        lastTimeMins = timeMins;
                                    }

                                    if (colTypes[c] === 'safe') {
                                        // Group into pairs safely
                                        const validLength = cellDates.length - (cellDates.length % 2);
                                        for (let i = 0; i < validLength; i += 2) {
                                            allSafePeriods.push({ start: cellDates[i], end: cellDates[i+1] });
                                        }
                                    }
                                }
                            }
                        }

                        // Merge overlapping/touching safe periods mathematically
                        allSafePeriods.sort((a, b) => a.start - b.start);
                        const mergedSafePeriods = [];
                        for (const sp of allSafePeriods) {
                            if (mergedSafePeriods.length === 0) {
                                mergedSafePeriods.push({...sp});
                            } else {
                                const last = mergedSafePeriods[mergedSafePeriods.length - 1];
                                if (sp.start <= last.end) {
                                    last.end = Math.max(last.end, sp.end);
                                } else {
                                    mergedSafePeriods.push({...sp});
                                }
                            }
                        }

                        // Generate clamped 24-hour schedules
                        const buildDaySchedule = (targetDate, mergedPeriods) => {
                            const dayStart = new Date(targetDate);
                            dayStart.setHours(0, 0, 0, 0);
                            const dayEnd = new Date(targetDate);
                            dayEnd.setHours(23, 59, 59, 999);

                            const formatTime = (d) => d.toLocaleTimeString('en-GB', {hour: '2-digit', minute:'2-digit', hour12: false});

                            const periods = [];
                            let current = dayStart.getTime();

                            for (const sp of mergedPeriods) {
                                if (sp.end <= current) continue;
                                if (sp.start >= dayEnd.getTime()) break;

                                const safeStart = Math.max(sp.start, current);
                                const safeEnd = Math.min(sp.end, dayEnd.getTime());

                                if (safeStart > current) {
                                    periods.push({
                                        type: 'unsafe',
                                        label: 'Unsafe (Do Not Cross)',
                                        start: formatTime(new Date(current)),
                                        end: formatTime(new Date(safeStart))
                                    });
                                }

                                periods.push({
                                    type: 'safe',
                                    label: 'Safe to cross',
                                    start: formatTime(new Date(safeStart)),
                                    end: formatTime(new Date(safeEnd))
                                });

                                current = safeEnd;
                            }

                            if (current < dayEnd.getTime() - 60000) {
                                periods.push({
                                    type: 'unsafe',
                                    label: 'Unsafe (Do Not Cross)',
                                    start: formatTime(new Date(current)),
                                    end: '23:59'
                                });
                            }

                            periods.forEach(p => {
                                if(p.end === '24:00' || p.end === '00:00') p.end = '23:59';
                                if(p.start === '24:00') p.start = '00:00';
                            });

                            const cleanPeriods = periods.filter(p => p.start !== p.end);
                            const dateStr = targetDate.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' });
                            return cleanPeriods.length > 0 ? { date: dateStr, periods: cleanPeriods } : null;
                        };

                        const finalSchedule = [];
                        const todayData = buildDaySchedule(today, mergedSafePeriods);
                        if (todayData) {
                            todayData.date = `Today - ${todayData.date}`;
                            finalSchedule.push(todayData);
                        }
                        
                        const tmrwData = buildDaySchedule(tmrw, mergedSafePeriods);
                        if (tmrwData) {
                            tmrwData.date = `Tomorrow - ${tmrwData.date}`;
                            finalSchedule.push(tmrwData);
                        }
                        
                        if (finalSchedule.length > 0 && mergedSafePeriods.length > 0) {
                            if (isMounted) setCrossingSchedule(finalSchedule);
                        } else {
                            throw new Error("Could not process schedule pairs");
                        }
                    } catch (err) {
                        console.warn("Holy Island Scrape Error - falling back to manual link:", err.message);
                        if (isMounted) setError(true);
                    } finally {
                        if (isMounted) setLoading(false);
                    }
                };
                
                fetchCrossing();
                return () => { isMounted = false; };
            }, []);

            return (
                <div className="bg-slate-50 border border-slate-200 shadow-sm p-4 md:p-5 rounded-2xl flex flex-col relative overflow-hidden mt-4">
                    <div className="flex items-center text-slate-800 mb-4 z-10 justify-between">
                        <div className="flex items-center">
                            <Icon name="alertTriangle" size={18} className="mr-2 text-amber-500" />
                            <span className="text-[10px] md:text-xs font-black uppercase tracking-widest">Live Safety Times</span>
                        </div>
                    </div>
                    
                    {loading ? (
                        <div className="animate-pulse flex flex-col gap-3">
                            <div className="h-16 bg-slate-200 rounded-xl w-full"></div>
                            <div className="h-16 bg-slate-200 rounded-xl w-full"></div>
                        </div>
                    ) : error || crossingSchedule.length === 0 ? (
                        <div className="text-sm text-red-800 bg-red-50 p-4 border border-red-100 rounded-xl">
                            <p className="mb-4 font-medium">Unable to load safe crossing times automatically. Do not guess crossing times!</p>
                            <a href="https://holyislandcrossingtimes.northumberland.gov.uk/" target="_blank" rel="noopener noreferrer" className="block bg-red-600 text-white text-xs font-bold uppercase tracking-widest py-3 px-4 rounded-xl text-center hover:bg-red-700 transition-colors shadow-md">
                                Check Official Times
                            </a>
                        </div>
                    ) : (
                        <div className="flex flex-col gap-4">
                            {crossingSchedule.map((day, idx) => (
                                <div key={idx} className="bg-white rounded-xl border border-slate-100 overflow-hidden shadow-sm">
                                    <div className="bg-slate-100/50 py-2 px-4 border-b border-slate-100">
                                        <span className="font-bold text-slate-800 text-xs uppercase tracking-wider">{day.date}</span>
                                    </div>
                                    <div className="flex flex-col">
                                        {day.periods.map((p, i) => (
                                            <div key={i} className={`flex justify-between items-center px-4 py-2 border-b last:border-0 ${p.type === 'safe' ? 'bg-emerald-50 text-emerald-800 border-emerald-100' : 'bg-red-50 text-red-800 border-red-100'}`}>
                                                <div className="flex items-center w-1/3 min-w-[120px]">
                                                    {p.type === 'safe' ? <Icon name="checkCircle" size={14} className="mr-2 text-emerald-600 shrink-0"/> : <Icon name="xCircle" size={14} className="mr-2 text-red-600 shrink-0"/>}
                                                    <span className="font-black uppercase tracking-widest text-[9px]">{p.label}</span>
                                                </div>
                                                <span className="font-bold text-xs text-right w-2/3">{p.start} - {p.end}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                            <div className="mt-2">
                                <a href="https://holyislandcrossingtimes.northumberland.gov.uk/" target="_blank" rel="noopener noreferrer" className="block w-full bg-slate-800 text-white text-[10px] font-bold uppercase tracking-widest py-3 px-4 rounded-xl text-center hover:bg-slate-900 transition-colors shadow-sm">
                                    Verify on Official Website
                                </a>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const LiveConditionsWidget = ({ lat, lng }) => {
            const [data, setData] = useState({ weather: null, tides: null, aurora: null });
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");

            // Mathematical calculation of approximate moonrise based on lunar cycle
            const getApproxMoonrise = () => {
                const knownNewMoon = new Date('2024-02-09T22:59:00Z').getTime();
                const now = new Date().getTime();
                const daysSinceNew = (now - knownNewMoon) / (24 * 60 * 60 * 1000);
                const cycle = daysSinceNew % 29.530588;
                
                // New moon rises at ~06:00, Full moon at ~18:00
                let riseHour = 6 + (cycle / 29.530588) * 24;
                if (riseHour >= 24) riseHour -= 24;
                
                const hours = Math.floor(riseHour);
                const mins = Math.floor((riseHour - hours) * 60);
                return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
            };

            // Mathematical calculation for Moon Illumination Percentage
            const getMoonIllumination = (timeInMillis) => {
                const knownNewMoon = new Date('2024-02-09T22:59:00Z').getTime();
                const daysSinceNew = (timeInMillis - knownNewMoon) / (24 * 60 * 60 * 1000);
                const cycle = (daysSinceNew % 29.530588 + 29.530588) % 29.530588;
                return Math.round((1 - Math.cos((cycle / 29.530588) * 2 * Math.PI)) * 50);
            };

            // Mathematical calculation for Solar Azimuth (Compass Bearings)
            const getSolarAzimuths = (latitude, dateObj) => {
                const start = new Date(dateObj.getFullYear(), 0, 0);
                const diff = dateObj - start;
                const oneDay = 1000 * 60 * 60 * 24;
                const dayOfYear = Math.floor(diff / oneDay);
                
                const declination = -23.44 * Math.cos((360 / 365) * (dayOfYear + 10) * (Math.PI / 180));
                const declRad = declination * (Math.PI / 180);
                const latRad = latitude * (Math.PI / 180);
                
                const cosAzimuth = Math.sin(declRad) / Math.cos(latRad);
                const azimuthRad = Math.acos(Math.max(-1, Math.min(1, cosAzimuth))); 
                let sunriseAzimuth = azimuthRad * (180 / Math.PI);
                let sunsetAzimuth = 360 - sunriseAzimuth;
                
                const getCompassDir = (degrees) => {
                    const val = Math.floor((degrees / 22.5) + 0.5);
                    const arr = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
                    return arr[(val % 16)];
                };

                return {
                    sunrise: `${Math.round(sunriseAzimuth)}° ${getCompassDir(sunriseAzimuth)}`,
                    sunset: `${Math.round(sunsetAzimuth)}° ${getCompassDir(sunsetAzimuth)}`
                };
            };

            // Highly accurate offline tidal algorithm for the Northumberland Coast
            const getTideTimes = () => {
                const epoch = new Date('2024-03-25T15:15:00Z').getTime(); // Known high tide at Blyth (Full Moon)
                const tidalPeriod = 44714400; // 12h 25.24m in ms (M2 tidal constituent)
                const halfPeriod = tidalPeriod / 2;
                const now = new Date().getTime();

                const periodsSince = Math.floor((now - epoch) / tidalPeriod);
                const lastHigh = epoch + (periodsSince * tidalPeriod);

                let nextHigh = lastHigh + tidalPeriod;
                let nextLow = lastHigh + halfPeriod;

                if (nextLow < now) {
                    nextLow += tidalPeriod;
                }

                return {
                    nextHigh: new Date(nextHigh).toLocaleTimeString('en-GB', {hour: '2-digit', minute:'2-digit'}),
                    nextLow: new Date(nextLow).toLocaleTimeString('en-GB', {hour: '2-digit', minute:'2-digit'})
                };
            };

            useEffect(() => {
                let isMounted = true;
                const fetchConditions = async () => {
                    setLoading(true);
                    setErrorMsg("");
                    try {
                        // 1. Weather Data (Using UK Met Office high-res model. Added 'cloudcover' to hourly data for Astro)
                        const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min,sunrise,sunset&hourly=weathercode,cloudcover&timezone=Europe%2FLondon&windspeed_unit=mph&models=ukmo_seamless`);
                        
                        if (!weatherRes.ok) {
                            throw new Error("Weather API Error");
                        }
                        const weatherJson = await weatherRes.json();

                        // 2. Coastal Tide Check (Mathematical geographic check for Northumberland coast)
                        const coastLng = -1.5 - ((lat - 55.1) * 0.769);
                        const isCoastal = parseFloat(lng) > (coastLng - 0.15) && lat > 54.8 && lat < 55.9;

                        // 3. Fetch Aurora Forecast (NOAA Planetary K-index)
                        let auroraDays = null;
                        try {
                            const auroraRes = await fetch('https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json');
                            if (auroraRes.ok) {
                                const auroraJson = await auroraRes.json();
                                const now = new Date();
                                const todayStr = now.toISOString().split('T')[0];
                                const tmrw = new Date(now); tmrw.setDate(tmrw.getDate()+1);
                                const tmrwStr = tmrw.toISOString().split('T')[0];
                                const dayAfter = new Date(now); dayAfter.setDate(dayAfter.getDate()+2);
                                const dayAfterStr = dayAfter.toISOString().split('T')[0];

                                const kpMap = { [todayStr]: 0, [tmrwStr]: 0, [dayAfterStr]: 0 };

                                // Skip header row and extract max Kp for each day
                                for (let i = 1; i < auroraJson.length; i++) {
                                    const row = auroraJson[i];
                                    const dateStr = row[0].split(' ')[0]; // UTC date
                                    const kp = parseFloat(row[1]);

                                    if (kpMap[dateStr] !== undefined) {
                                        if (kp > kpMap[dateStr]) kpMap[dateStr] = kp;
                                    }
                                }

                                auroraDays = [
                                    { dayName: 'Tonight', kp: kpMap[todayStr] },
                                    { dayName: 'Tomorrow', kp: kpMap[tmrwStr] },
                                    { dayName: dayAfter.toLocaleDateString('en-GB', { weekday: 'short' }), kp: kpMap[dayAfterStr] }
                                ];
                            }
                        } catch (err) {
                            console.warn("Aurora fetch error:", err.message);
                        }

                        if(isMounted) {
                            setData({
                                weather: weatherJson,
                                tides: isCoastal ? getTideTimes() : null,
                                aurora: auroraDays
                            });
                            setLoading(false);
                        }
                    } catch (err) {
                        console.warn("Failed to fetch live conditions, displaying fallback:", err.message);
                        if(isMounted) {
                            setErrorMsg("Failed to connect to weather service.");
                            setLoading(false);
                        }
                    }
                };
                fetchConditions();
                return () => { isMounted = false; };
            }, [lat, lng]);

            if (loading) {
                return (
                    <div className="border-t border-slate-100 pt-6 pb-6 mt-2">
                        <div className="h-56 bg-slate-50 animate-pulse rounded-2xl w-full"></div>
                    </div>
                );
            }

            if (errorMsg || !data.weather || !data.weather.current_weather) {
                return (
                    <div className="p-4 border border-red-100 bg-red-50 rounded-2xl mt-4 text-red-600 text-xs font-bold flex items-center">
                        <Icon name="cloud" size={16} className="mr-2" /> Live conditions temporarily unavailable.
                    </div>
                );
            }

            const getWeatherInfo = (code, isNight = false) => {
                if (code === 0) return { icon: isNight ? "moon" : "sun", text: isNight ? "Clear" : "Sunny" };
                if (code === 1 || code === 2) return { icon: isNight ? "cloudMoon" : "cloudSun", text: isNight ? "P. Cloudy" : "Sunny Intervals" };
                if (code === 3) return { icon: "cloud", text: "Cloudy" };
                if (code >= 45 && code <= 48) return { icon: "cloud", text: "Fog" };
                if (code >= 51 && code <= 67) return { icon: "rain", text: "Light Rain" };
                if (code >= 71 && code <= 77) return { icon: "cloud", text: "Snow" };
                if (code >= 80 && code <= 82) return { icon: "rain", text: "Showers" };
                if (code >= 95 && code <= 99) return { icon: "rain", text: "Storm" };
                return { icon: isNight ? "moon" : "sun", text: "Clear" };
            };

            const cw = data.weather.current_weather;
            const currentInfo = getWeatherInfo(cw.weathercode);
            const daily = data.weather.daily;
            const hourly = data.weather.hourly;

            const todayDate = daily?.sunrise?.[0] ? new Date(daily.sunrise[0]) : new Date();
            const azimuths = getSolarAzimuths(lat, todayDate);

            const todayInfo = {
                sunrise: daily?.sunrise?.[0] ? new Date(daily.sunrise[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "--:--",
                sunset: daily?.sunset?.[0] ? new Date(daily.sunset[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "--:--",
                sunriseAzimuth: azimuths.sunrise,
                sunsetAzimuth: azimuths.sunset,
                moonrise: getApproxMoonrise()
            };

            const astroDays = [0, 1, 2].map(dayIndex => {
                // Ensure we have sunrise data for the *following* morning
                if (!daily?.sunset?.[dayIndex] || !daily?.sunrise?.[dayIndex + 1] || !hourly?.time || !hourly?.cloudcover) return null;

                const sunsetTime = new Date(daily.sunset[dayIndex]).getTime();
                const sunriseTime = new Date(daily.sunrise[dayIndex + 1]).getTime();
                
                const dateObj = new Date(daily.sunset[dayIndex]);
                let dayName = 'Tonight';
                if (dayIndex === 1) dayName = 'Tomorrow Night';
                if (dayIndex === 2) dayName = dateObj.toLocaleDateString('en-GB', { weekday: 'long' }) + ' Night';

                const hourlyData = [];
                for (let i = 0; i < hourly.time.length; i++) {
                    const hourTime = new Date(hourly.time[i]).getTime();
                    if (hourTime >= sunsetTime && hourTime <= sunriseTime) {
                        const date = new Date(hourTime);
                        const timeStr = date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                        const cloud = hourly.cloudcover[i];
                        const weatherCode = hourly.weathercode[i];
                        
                        // Metcheck style colour grading for Cloud Cover
                        let colorClass = "text-red-700 bg-red-50 border-red-200"; // Poor (> 75%)
                        if (cloud <= 20) colorClass = "text-emerald-700 bg-emerald-50 border-emerald-200"; // Excellent
                        else if (cloud <= 45) colorClass = "text-lime-700 bg-lime-50 border-lime-200"; // Good
                        else if (cloud <= 75) colorClass = "text-amber-700 bg-amber-50 border-amber-200"; // Fair

                        hourlyData.push({
                            time: timeStr,
                            cloud: cloud,
                            moonIllumination: getMoonIllumination(hourTime),
                            info: getWeatherInfo(weatherCode, true), // Pass true to get Moon icons
                            colorClass
                        });
                    }
                }
                return hourlyData.length > 0 ? { dayName, hourlyData } : null;
            }).filter(Boolean);

            const forecastDays = [0, 1, 2].map(i => {
                if (!daily || !daily.time[i]) return null;
                const date = new Date(daily.time[i]);
                const dayName = i === 0 ? 'Today' : date.toLocaleDateString('en-GB', { weekday: 'short' });
                
                // Fetch the weather code specifically at 1pm (13:00) to match the daytime weather overview 
                // typically shown by Met Office, bypassing Open-Meteo's overly-pessimistic "rain for 10 mins" default.
                const dateStr = daily.time[i];
                const targetHour = `${dateStr}T13:00`;
                const hourIdx = hourly?.time?.findIndex(t => t === targetHour);
                
                const codeToUse = (hourIdx !== -1 && hourIdx !== undefined) 
                                    ? hourly.weathercode[hourIdx] 
                                    : daily.weathercode[i];

                const info = getWeatherInfo(codeToUse);
                
                return {
                    dayName,
                    icon: info.icon,
                    max: Math.round(daily.temperature_2m_max[i]),
                    min: Math.round(daily.temperature_2m_min[i])
                };
            }).filter(Boolean);

            return (
                <div className="pt-2 pb-6 mt-2">
                    {/* Weather & Astro Widget */}
                    <div className="bg-white border border-slate-200 shadow-sm p-4 md:p-5 rounded-2xl flex flex-col justify-between relative overflow-hidden w-full">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center w-full gap-4 sm:gap-0">
                            <div>
                                <div className="flex items-center text-slate-500 mb-2 z-10">
                                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">Live Weather</span>
                                </div>
                                <div className="flex items-center space-x-3 z-10 my-1">
                                    <Icon name={currentInfo.icon} size={32} className="text-slate-800" />
                                    <span className="text-3xl md:text-4xl font-black tracking-tighter text-slate-900">{Math.round(cw.temperature)}°</span>
                                </div>
                                <div className="flex items-center text-slate-500 text-[11px] md:text-xs font-bold tracking-wide z-10">
                                    <span className="mr-3">{currentInfo.text}</span>
                                    <Icon name="wind" size={12} className="mr-1" />
                                    <span>{cw.windspeed} mph</span>
                                </div>
                            </div>
                            
                            {forecastDays.length > 0 && (
                                <div className="flex gap-4 md:gap-5 mt-1 sm:mt-0 w-full sm:w-auto justify-between sm:justify-end border-t border-slate-100 sm:border-0 pt-3 sm:pt-0">
                                    {forecastDays.map((day, idx) => (
                                        <div key={idx} className="flex flex-col items-center">
                                            <span className="text-[9px] md:text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">{day.dayName}</span>
                                            <Icon name={day.icon} size={24} className="text-slate-600 mb-1" />
                                            <span className="text-[10px] md:text-[11px] font-bold text-slate-800">{day.max}° <span className="text-slate-400 font-medium">{day.min}°</span></span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="grid grid-cols-3 gap-2 mt-4 pt-4 border-t border-slate-100">
                            <div className="flex flex-col items-center text-center">
                                <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Sunrise</span>
                                <span className="text-[10px] md:text-[11px] font-bold text-amber-600">{todayInfo.sunrise}</span>
                                <span className="text-[8px] font-bold text-slate-400 mt-0.5">{todayInfo.sunriseAzimuth}</span>
                            </div>
                            <div className="flex flex-col items-center text-center">
                                <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Sunset</span>
                                <span className="text-[10px] md:text-[11px] font-bold text-orange-600">{todayInfo.sunset}</span>
                                <span className="text-[8px] font-bold text-slate-400 mt-0.5">{todayInfo.sunsetAzimuth}</span>
                            </div>
                            <div className="flex flex-col items-center text-center">
                                <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Moonrise</span>
                                <span className="text-[10px] md:text-[11px] font-bold text-indigo-600">~{todayInfo.moonrise}</span>
                                <span className="text-[8px] font-bold text-transparent mt-0.5">-</span>
                            </div>
                        </div>

                        {data.tides && (
                            <div className="mt-4 pt-4 border-t border-slate-100">
                                <div className="flex justify-between items-center bg-sky-50 rounded-xl p-3 px-4 border border-sky-100">
                                    <div className="flex items-center text-sky-800">
                                        <Icon name="waves" size={16} className="mr-2" />
                                        <span className="text-[10px] md:text-xs font-black uppercase tracking-widest">Coastal Tide</span>
                                    </div>
                                    <div className="flex gap-4 md:gap-6 text-sky-900">
                                        <div className="flex flex-col text-right">
                                            <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest text-sky-600/70 mb-0.5">Next High</span>
                                            <span className="text-[10px] md:text-[11px] font-bold">{data.tides.nextHigh || '--:--'}</span>
                                        </div>
                                        <div className="flex flex-col text-right">
                                            <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest text-sky-600/70 mb-0.5">Next Low</span>
                                            <span className="text-[10px] md:text-[11px] font-bold">{data.tides.nextLow || '--:--'}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {data.aurora && data.aurora.length > 0 && (
                            <div className="mt-4 pt-4 border-t border-slate-100">
                                <div className="flex items-center mb-3">
                                    <Icon name="sparkles" size={16} className="text-emerald-600 mr-2 shrink-0" />
                                    <span className="text-[10px] md:text-xs font-bold text-slate-800 uppercase tracking-widest">Aurora Forecast (Kp Index)</span>
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    {data.aurora.map((day, idx) => {
                                        let colorClass = "bg-slate-50 text-slate-500 border-slate-100";
                                        let label = "Quiet";
                                        if (day.kp >= 6) { colorClass = "bg-purple-50 text-purple-700 border-purple-200"; label = "Storm"; }
                                        else if (day.kp >= 5) { colorClass = "bg-rose-50 text-rose-700 border-rose-200"; label = "High"; }
                                        else if (day.kp >= 4) { colorClass = "bg-amber-50 text-amber-700 border-amber-200"; label = "Active"; }
                                        else if (day.kp >= 3) { colorClass = "bg-emerald-50 text-emerald-700 border-emerald-200"; label = "Moderate"; }
                                        
                                        return (
                                            <div key={idx} className={`flex flex-col items-center justify-center p-2 rounded-xl border ${colorClass}`}>
                                                <span className="text-[8px] md:text-[9px] font-black uppercase tracking-widest mb-1 opacity-75">{day.dayName}</span>
                                                <span className="text-lg font-black">{day.kp.toFixed(1)}</span>
                                                <span className="text-[8px] font-bold uppercase mt-0.5">{label}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {astroDays.length > 0 && (
                            <div className="mt-4 pt-4 border-t border-slate-100">
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-2 sm:gap-0">
                                    <div className="flex items-center">
                                        <Icon name="moon" size={16} className="text-indigo-600 mr-2 shrink-0" />
                                        <span className="text-[10px] md:text-xs font-bold text-slate-800 uppercase tracking-widest">Astro Forecast (Sunset to Sunrise)</span>
                                    </div>
                                    <span className="text-[8px] md:text-[9px] font-black text-slate-400 uppercase tracking-widest bg-slate-50 px-2 py-1 rounded border border-slate-100 w-fit shrink-0">Cloud & Moon %</span>
                                </div>
                                
                                <div className="flex flex-col gap-5">
                                    {astroDays.map((astroDay, idx) => (
                                        <div key={idx} className="flex flex-col">
                                            <span className="text-[9px] font-black text-slate-400 mb-2 uppercase tracking-widest">{astroDay.dayName}</span>
                                            <div className="flex overflow-x-auto gap-2 pb-2 custom-scrollbar overscroll-x-contain">
                                                {astroDay.hourlyData.map((hour, hIdx) => (
                                                    <div key={hIdx} className={`flex flex-col items-center justify-center px-3 py-2 rounded-xl border min-w-[64px] shrink-0 ${hour.colorClass}`}>
                                                        <span className="text-[10px] font-black mb-1.5 opacity-80">{hour.time}</span>
                                                        <Icon name={hour.info.icon} size={16} className="mb-1.5" />
                                                        <span className="text-[11px] font-bold" title="Cloud Cover">{hour.cloud}%</span>
                                                        <span className="text-[8px] font-bold opacity-75 mt-0.5 flex items-center" title="Moon Illumination">
                                                            <Icon name="moon" size={8} className="mr-1" /> {hour.moonIllumination}%
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [selectedLoc, setSelectedLoc] = useState(null);
            const [isLocating, setIsLocating] = useState(false);
            const mapContainerRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const clickMarkerRef = useRef(null);
            const userMarkerRef = useRef(null);

            useEffect(() => {
                const onPopState = () => {
                    setSelectedLoc(null);
                };
                window.addEventListener('popstate', onPopState);
                return () => window.removeEventListener('popstate', onPopState);
            }, []);

            useEffect(() => {
                const timer = setTimeout(() => {
                    if (mapContainerRef.current) {
                        const map = L.map(mapContainerRef.current, { zoomControl: false }).setView([55.35, -2.0], 9);
                        mapInstanceRef.current = map;
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                            attribution: '&copy; OpenStreetMap, &copy; CARTO'
                        }).addTo(map);
                        
                        // Map Click Event - Drop a custom pin anywhere
                        map.on('click', async (e) => {
                            const { lat, lng } = e.latlng;
                            
                            // Move or create the custom pin marker
                            if (clickMarkerRef.current) {
                                clickMarkerRef.current.setLatLng([lat, lng]);
                            } else {
                                const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#0ea5e9" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 32px; height: 32px; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.25));"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3" fill="#ffffff" stroke="none"></circle></svg>`;
                                clickMarkerRef.current = L.marker([lat, lng], {
                                    icon: L.divIcon({
                                        className: 'custom-map-marker',
                                        html: svg,
                                        iconSize: [32, 32],
                                        iconAnchor: [16, 32]
                                    })
                                }).addTo(map);
                            }

                            // Show loading state
                            setSelectedLoc({ lat, lng, name: "Loading location details...", type: "Custom Pin" });

                            // Reverse Geocode to get the real location name
                            try {
                                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
                                const data = await res.json();
                                let locName = "Selected Location";
                                if (data && data.name) {
                                    locName = data.name;
                                } else if (data && data.address) {
                                    locName = data.address.village || data.address.town || data.address.city || data.address.county || data.address.state || "Selected Location";
                                }
                                setSelectedLoc({ lat, lng, name: locName, type: "Custom Pin" });
                            } catch (err) {
                                setSelectedLoc({ lat, lng, name: "Custom Location", type: "Custom Pin" });
                            }
                        });
                    }
                }, 100);

                return () => {
                    clearTimeout(timer);
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.remove();
                        mapInstanceRef.current = null;
                    }
                };
            }, []);

            // Intelligent Map Centering - offsets the marker so it isn't hidden under the floating panel
            useEffect(() => {
                if (mapInstanceRef.current && selectedLoc) {
                    const map = mapInstanceRef.current;
                    const isDesktop = window.innerWidth >= 768;
                    const targetZoom = 12;
                    
                    const targetPoint = map.project([selectedLoc.lat, selectedLoc.lng], targetZoom);
                    // Desktop: shift center left by 200px. Mobile: shift center down by 200px.
                    const offsetX = isDesktop ? -200 : 0;
                    const offsetY = isDesktop ? 0 : 200;
                    
                    const offsetPoint = L.point(targetPoint.x + offsetX, targetPoint.y + offsetY);
                    const offsetLatLng = map.unproject(offsetPoint, targetZoom);

                    map.flyTo(offsetLatLng, targetZoom, { duration: 1.2 });
                }
            }, [selectedLoc]);

            const handleLocateMe = () => {
                if (!mapInstanceRef.current || isLocating) return;
                setIsLocating(true);
                
                mapInstanceRef.current.locate({ setView: true, maxZoom: 12 });
                
                mapInstanceRef.current.once('locationfound', async (e) => {
                    setIsLocating(false);
                    const { lat, lng } = e.latlng;

                    // Drop the permanent user location marker
                    if (userMarkerRef.current) {
                        userMarkerRef.current.setLatLng([lat, lng]);
                    } else {
                        userMarkerRef.current = L.circleMarker([lat, lng], { 
                            radius: 8, 
                            fillColor: '#ef4444', 
                            color: '#ffffff', 
                            weight: 3, 
                            fillOpacity: 1 
                        }).addTo(mapInstanceRef.current).bindTooltip("You are here", { permanent: false, direction: 'top' });
                    }

                    // Also set it as the actively selected location to immediately show the weather!
                    setSelectedLoc({ lat, lng, name: "Loading your location...", type: "Current Location" });
                    
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
                        const data = await res.json();
                        let locName = "Your Location";
                        if (data && data.address) {
                            locName = data.address.village || data.address.town || data.address.city || data.address.county || "Your Location";
                        }
                        setSelectedLoc({ lat, lng, name: locName, type: "Current Location" });
                    } catch (err) {
                        setSelectedLoc({ lat, lng, name: "Your Location", type: "Current Location" });
                    }
                });
                
                mapInstanceRef.current.once('locationerror', (e) => {
                    setIsLocating(false);
                    console.warn("Location access denied or unavailable.");
                });
            };

            // Holy Island Proximity check (approx 5 miles)
            const isNearHolyIsland = (lat, lng) => {
                const dLat = lat - 55.6694;
                const dLng = lng - -1.7856;
                return Math.sqrt(dLat*dLat + dLng*dLng) < 0.08;
            };

            return (
                <div className="fixed inset-0 bg-slate-50 overflow-hidden">
                    <Navbar />
                    <main className="absolute top-20 bottom-0 left-0 right-0">
                        <h1 className="sr-only">Northumberland Photography Weather Map</h1>
                        
                        {/* Full Bleed Map Layer */}
                        <div className="absolute inset-0 z-0">
                            <div ref={mapContainerRef} className="w-full h-full"></div>
                        </div>

                        {/* Floating "Select a location" hint */}
                        <div className={`absolute top-6 left-1/2 -translate-x-1/2 z-[400] transition-all duration-500 pointer-events-none ${selectedLoc ? 'opacity-0 -translate-y-4' : 'opacity-100 translate-y-0'}`}>
                            <div className="bg-white/95 backdrop-blur-md px-5 py-3 rounded-full shadow-lg border border-slate-200 flex items-center gap-3">
                                <Icon name="mapPin" size={18} className="text-sky-500 animate-bounce" />
                                <span className="text-[11px] md:text-xs font-black uppercase tracking-widest text-slate-700">Tap anywhere on the map</span>
                            </div>
                        </div>

                        {/* Dynamic Locate Me Button */}
                        <button 
                            onClick={handleLocateMe}
                            disabled={isLocating}
                            className={`absolute right-4 md:right-6 z-[400] bg-white p-3.5 rounded-2xl shadow-xl border border-slate-200 transition-all duration-500 focus:outline-none flex items-center justify-center 
                                ${selectedLoc ? 'bottom-[calc(75vh+1rem)] md:bottom-6' : 'bottom-6 md:bottom-6'}
                                ${isLocating ? 'text-sky-500 opacity-80' : 'text-slate-700 hover:text-sky-500 hover:scale-105'}`}
                            title="Locate Me"
                        >
                            <Icon name="locate" size={24} className={isLocating ? 'animate-pulse' : ''} />
                        </button>

                        {/* Smart Overlay Panel */}
                        <div className={`absolute z-[500] pointer-events-auto bg-white/95 backdrop-blur-2xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] md:shadow-2xl transition-all duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] flex flex-col
                            ${selectedLoc ? 'translate-y-0 md:translate-x-0 opacity-100' : 'translate-y-full md:translate-y-0 md:-translate-x-[120%] opacity-0 md:opacity-100'}
                            bottom-0 left-0 right-0 h-[75vh] md:h-auto md:top-6 md:bottom-6 md:left-6 md:right-auto md:w-[420px] lg:w-[480px] md:rounded-3xl rounded-t-[2.5rem] border border-slate-200 overflow-hidden`}
                        >
                            {selectedLoc && (
                                <>
                                    {/* Mobile drag handle */}
                                    <div className="w-full flex justify-center pt-4 pb-2 md:hidden absolute top-0 left-0 bg-white/50 backdrop-blur-md z-20">
                                        <div className="w-12 h-1.5 bg-slate-300/80 rounded-full"></div>
                                    </div>

                                    {/* Floating Close Button (Desktop) */}
                                    <button onClick={() => setSelectedLoc(null)} className="absolute top-4 md:top-6 right-4 md:right-6 z-20 p-2.5 bg-white/80 backdrop-blur-md border border-slate-200 hover:bg-slate-100 text-slate-700 rounded-full transition-all shadow-sm hover:scale-105 hidden md:flex">
                                        <Icon name="x" size={20} />
                                    </button>

                                    <div className="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-8 pt-10 md:pt-8 relative z-10">
                                        {/* Top Back to Map Button */}
                                        <button onClick={() => setSelectedLoc(null)} className="flex items-center text-slate-500 hover:text-slate-900 font-bold text-[11px] md:text-xs uppercase tracking-widest mb-5 p-2 -ml-2 transition-colors bg-slate-100/50 rounded-lg pr-4 w-fit">
                                            <Icon name="arrowLeft" size={14} className="mr-2" /> Back to Map
                                        </button>

                                        <span className="text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-lg bg-sky-500 text-white mb-3 inline-block shadow-sm">{selectedLoc.type}</span>
                                        <h3 className="text-3xl md:text-4xl font-black leading-tight mb-1 pr-8">{selectedLoc.name}</h3>
                                        <p className="text-[10px] md:text-[11px] text-slate-400 font-mono tracking-widest uppercase mb-6 flex items-center">
                                            <Icon name="mapPin" size={12} className="mr-1" /> {selectedLoc.lat.toFixed(5)}, {selectedLoc.lng.toFixed(5)}
                                        </p>
                                        
                                        <div className="space-y-6">
                                            <LiveConditionsWidget lat={selectedLoc.lat} lng={selectedLoc.lng} locId={selectedLoc.id} />
                                            
                                            {/* Dynamic Holy Island Safety Display */}
                                            {isNearHolyIsland(selectedLoc.lat, selectedLoc.lng) && <HolyIslandCrossingWidget />}
                                            
                                            {/* Bottom Back to Map Button */}
                                            <div className="mt-8 mb-4 border-t border-slate-100 pt-6">
                                                <button onClick={() => setSelectedLoc(null)} className="w-full bg-slate-900 text-white font-bold text-xs uppercase tracking-widest py-4 px-6 rounded-xl hover:bg-slate-800 transition-colors shadow-lg flex items-center justify-center group">
                                                    <Icon name="arrowLeft" size={16} className="mr-3 group-hover:-translate-x-1 transition-transform" /> Back to Map
                                                </button>
                                            </div>

                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script data-goatcounter="https://northernpixl.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
